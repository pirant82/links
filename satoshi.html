<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satoshi: The Cypherpunk Legacy</title>
  <style>
    :root {
      --green:       #2D5A27;
      --green-light: #4A7C43;
      --gold:        #8B6914;
      --gold-light:  #C49A1E;
      --orange:      #F7931A;
      --bg:          #FAFAF7;
      --card-bg:     #FFFFFF;
      --text:        #1A1A1A;
      --sub:         #6B7280;
      --border:      #E5E7EB;
      --shadow:      0 2px 8px rgba(0,0,0,.08);
      --font-serif:  'Georgia', 'Times New Roman', serif;
      --font-mono:   'Courier New', Courier, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      overflow-x: hidden;
    }

    .lang-switch {
      position: fixed; top: 20px; right: 20px; z-index: 1000;
      background: rgba(255, 255, 255, 0.9); padding: 5px; border-radius: 30px;
      box-shadow: var(--shadow); display: flex; gap: 5px; border: 1px solid var(--border);
      backdrop-filter: blur(4px);
    }
    .lang-btn {
      padding: 6px 16px; border: none; background: none; cursor: pointer;
      border-radius: 20px; font-size: 0.85rem; font-weight: 600; color: var(--sub);
    }
    .lang-btn.active { background: var(--green); color: white; }

    .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }
    header { padding: 80px 0 60px; text-align: center; border-bottom: 1px solid var(--border); margin-bottom: 60px; }
    header h1 { font-family: var(--font-serif); font-size: 3rem; line-height: 1.1; margin-bottom: 20px; font-weight: 900; letter-spacing: -1px; }
    header .meta { font-size: 0.85rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; }

    .article-body { font-size: 1.15rem; color: #333; }
    .article-body p { margin-bottom: 1.8rem; text-align: justify; }
    .drop-cap::first-letter {
      float: left; font-family: var(--font-serif); font-size: 4.5rem;
      line-height: 0.8; padding-right: 12px; padding-top: 8px; color: var(--green);
    }

    h2 { font-family: var(--font-serif); font-size: 2.2rem; margin: 5rem 0 2rem; border-top: 4px solid var(--text); padding-top: 1.5rem; font-weight: 800; }
    h3 { font-family: var(--font-serif); font-size: 1.6rem; margin: 3rem 0 1.5rem; color: var(--green); border-bottom: 1px solid #eee; padding-bottom: 5px; }

    /* Email UI */
    .email-block {
      background: #f8f9fa; border-left: 4px solid var(--orange); padding: 24px; margin: 3rem 0;
      font-family: var(--font-mono); font-size: 0.9rem; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
    }
    .email-header { border-bottom: 1px solid #eee; margin-bottom: 15px; padding-bottom: 10px; color: #666; }
    .email-header div { margin-bottom: 4px; }
    .email-header b { color: #000; width: 85px; display: inline-block; font-size: 0.8rem; text-transform: uppercase; }

    /* Takeaways Box */
    .takeaways {
      background: #fff; border: 1px solid var(--border); padding: 32px; margin: 4rem 0; border-radius: 4px; border-top: 4px solid var(--orange);
    }
    .takeaways h4 { font-family: var(--font-serif); font-size: 1.4rem; margin-bottom: 20px; }
    .takeaways ul { list-style: none; }
    .takeaways li { margin-bottom: 15px; padding-left: 20px; position: relative; font-size: 1rem; color: #444; }
    .takeaways li::before { content: "•"; color: var(--orange); position: absolute; left: 0; font-weight: bold; }

    /* Figure & Images */
    figure { margin: 4rem -40px; text-align: center; }
    figure img { max-width: 100%; height: auto; border-radius: 2px; box-shadow: var(--shadow); }
    figcaption { padding: 15px 60px; font-size: 0.85rem; color: var(--sub); text-align: left; line-height: 1.5; background: #fff; border-bottom: 1px solid var(--border); }

    /* Profiles */
    .profiles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin: 4rem 0; }
    .profile-card { text-align: center; background: #fff; padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
    .profile-card img { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; filter: grayscale(100%); transition: 0.3s; margin-bottom: 15px; border: 2px solid var(--border); }
    .profile-card:hover img { filter: grayscale(0%); transform: scale(1.05); border-color: var(--green); }
    .profile-card b { display: block; font-size: 1.1rem; margin-bottom: 5px; }
    .profile-card span { font-size: 0.85rem; color: var(--sub); line-height: 1.4; display: block; }

    .back-link { margin: 60px 0; text-align: center; }
    .back-link a { color: var(--green); text-decoration: none; font-weight: 600; border: 1px solid var(--green); padding: 12px 32px; border-radius: 30px; transition: 0.3s; }
    .back-link a:hover { background: var(--green); color: white; }

    @media (max-width: 800px) {
      figure { margin: 3rem -24px; }
      figcaption { padding: 15px 24px; }
      header h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body class="lang-ko">

  <div class="lang-switch">
    <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">KO</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>

  <div class="container">
    <header id="article-header"></header>
    <article class="article-body" id="article-content"></article>
    <div class="back-link">
      <a href="index.html">← Back to Portal</a>
    </div>
  </div>

  <script>
    // [무결성 100% 매핑 데이터]
    // ko와 en의 배열 길이가 완벽하게 일치해야 스크롤 동기화가 작동합니다.
    const bodyContent = [
      {
        id: "intro-1", type: "p", dropCap: true,
        ko: "2024년 가을 어느 날 저녁, 아내와 나는 롱아일랜드 고속도로에서 교통 체증에 갇혀 있었다. 운전할 때 자주 듣던 재즈 펑크 라디오 방송에 질린 아내가 팟캐스트로 채널을 돌렸다.",
        en: "One evening in the fall of 2024, my wife and I were sitting in traffic on the Long Island Expressway when, tired of listening to the jazz-funk station I often played on our drives, she switched to a podcast."
      },
      {
        id: "intro-2", type: "p",
        ko: "뉴욕타임스의 기술 쇼인 \"하드 포크(Hard Fork)\"였고, 진행자들은 비트코인의 익명 발명가 사토시 나카모토의 정체를 밝혔다고 주장하는 새로운 HBO 다큐멘터리에 대해 논의하고 있었다.",
        en: "It was “Hard Fork,” the New York Times tech show, and the hosts were discussing a new HBO documentary claiming to have unmasked Bitcoin’s pseudonymous inventor, Satoshi Nakamoto."
      },
      {
        id: "intro-3", type: "p",
        ko: "나는 즉시 귀를 쫑긋 세웠다. 오랫동안 사토시의 진짜 정체를 우리 시대의 가장 큰 수수께끼 중 하나로 여겨왔고, 전에도 이 문제를 파헤쳐보려 했으나 성공하지 못했다.",
        en: "I was instantly riveted. I had long considered the question of Satoshi’s true identity one of our age’s great enigmas and had poked at it before without success."
      },
      {
        id: "intro-4", type: "p",
        ko: "2년 전에는 이 주제로 책을 쓰기 위해 몇 달 동안 조사하기도 했다. 하지만 곧 내 능력 밖의 일이라는 것을 깨닫고 마지못해 포기했다.",
        en: "Two years earlier, I had even spent several months researching a book on the subject. But I soon realized I was out of my depth and reluctantly gave up."
      },
      {
        id: "intro-5", type: "p",
        ko: "금융에 혁명을 일으키고 2조 4천억 달러 규모의 산업을 탄생시켰으며, 단 한 번의 경이로운 천재적 발상으로 세계 최대 재산 중 하나를 축적한 베일에 싸인 그 인물을 마침내 누군가가 찾아냈을지도 모른다는 소식에 나는 감탄과 질투가 뒤섞인 감정을 느꼈다.",
        en: "Hearing that someone else might have finally identified the shadowy figure who had revolutionized finance, spawned a $2.4 trillion industry and amassed one of the world’s biggest fortunes in one stroke of staggering genius aroused in me a mixture of admiration and envy."
      },
      {
        id: "intro-6", type: "p",
        ko: "다큐멘터리가 너무 보고 싶었다. 그날 밤 집에 도착하자마자 HBO Max 앱에 로그인해 재생 버튼을 눌렀다.",
        en: "I couldn’t wait to watch the film. As soon as we got home that night, I logged in to the HBO Max app and pressed play."
      },
      {
        id: "intro-7", type: "p",
        ko: "결국 \"머니 일렉트릭: 비트코인 미스터리\"의 결론은 설득력이 없었다. HBO는 매우 빈약해 보이는 증거를 바탕으로 캐나다의 한 소프트웨어 개발자를 지목했다.",
        en: "In the end, I found the conclusion of “Money Electric: The Bitcoin Mystery” unconvincing: HBO singled out a Canadian software developer based on what seemed like very thin evidence."
      },
      {
        id: "intro-8", type: "p",
        ko: "하지만 암호화폐 세계를 유쾌하게 훑어보는 그 다큐멘터리를 보던 중, 한 장면이 내 눈길을 끌었다.",
        en: "But as I watched what was an otherwise entertaining romp through the world of crypto, one scene caught my attention."
      },
      {
        id: "intro-9", type: "p",
        ko: "영국의 암호학자이자 비트코인 운동의 주요 인물인 아담 백(Adam Back)이 라트비아 리가의 공원 벤치에 갈색 코트를 입고 셔츠를 꺼내 입은 채 앉아 있었다.",

        en: "The filmmaker casually rattled off the names of several Satoshi suspects. At the mention of his own name, Mr. Back tensed up, strenuously denied he was Satoshi and asked that the conversation be kept off the record."

      {

        ko: "거짓말쟁이들을 꽤 많이 겪어왔고, 그들의 거짓말 신호(tell)를 읽어내는 데 나름의 전문성을 쌓은 내게 백 씨의 태도—불안하게 흔들리는 눈빛, 어색한 웃음, 왼손의 경련적인 움직임—는 수상쩍게 느껴졌다. 엔딩 크레딧이 올라갈 때 나는 TV에서 그 장면을 여러 번 다시 돌려보았다.",
        en: "Having encountered my share of liars and developed something of an expertise in their tells, Mr. Back’s demeanor — his shifty eyes, his awkward chuckle, the jerky movement of his left hand — struck me as fishy. When the credits rolled up, I replayed the sequence several times on my TV."
      },
      {
        id: "img-1", type: "img", src: "docs/satoshi/original/00cypher-bars-02-articleLarge.jpg",
        ko: "검은 셔츠, 재킷, 바지를 입은 아담 백이 공원의 조각상 기단에 올라서는 모습.",

      },
      {
        id: "img-2", type: "img", src: "docs/satoshi/original/Biz-Cypher-01-vtgp-articleLarge.jpg",
        ko: "2월 마이애미에서의 영국 암호학자 아담 백. 출처... Amir Hamja / 뉴욕타임스",
        en: "Adam Back, the British cryptographer, in Miami in February. Credit... Amir Hamja for The New York Times"
      },
      {
        id: "intro-12", type: "p",
        ko: "백 씨의 반응을 곱씹다가 또 다른 생각이 떠올랐다. 자신이 사토시라고 거짓 주장을 해온 호주의 한 사기꾼이 소송을 당한 적이 있었다. 몇 달 전 런던에서 열렸던 그 민사 재판에서 공개된 증거가 이 미스터리를 푸는 데 도움이 되지 않을까?",
        en: "While I pondered Mr. Back’s reaction, another thought occurred to me. An Australian impostor had been sued for falsely claiming he was Satoshi. What if the evidence disclosed in that court case, which had been tried in London a few months earlier, could help me unravel the mystery?"
      },
      {
        id: "intro-13", type: "p",
        ko: "비트코인 지식에 정통한 사람이라면 누구나 알겠지만, 사토시는 인터넷에서 익명성을 유지하는 데 있어 달인이었으며 디지털 발자국을 거의, 혹은 전혀 남기지 않았다.",
        en: "As anyone steeped in Bitcoin lore will tell you, Satoshi was a master at the art of maintaining anonymity on the internet, leaving few, if any, digital footprints behind."
      },
      {
        id: "intro-14", type: "p",
        ko: "하지만 사토시는 자신의 발명품을 개략적으로 설명한 9페이지짜리 백서와, 사용자들이 디지털 통화의 소프트웨어·경제·철학에 대해 논의하기 위해 모인 온라인 게시판 '비트코인톡(Bitcointalk)'의 수많은 게시물 등 방대한 글을 남겼다.",

      {

      {

      {
        id: "sec1-25", type: "p",
        ko: "너무 딴길로 샌 탓에 대학에서의 마지막 6개월 동안 비행기를 불시착시키는 조종사처럼 논문을 벼락치기로 써야 했다고 회상했다. 나는 그때쯤 P.G.P.가 공개 키 암호화(public-key cryptography)에 의존한다는 사실을 충분히 이해하고 있었다. 비트코인도 마찬가지다.",
        en: "He got so sidetracked, he recalled, that he had to cram his thesis into his last six months at the university, comparing himself to a pilot crash-landing a plane. I’d learned enough by then to know that P.G.P. relies on public-key cryptography. So does Bitcoin."
      },
      {
        id: "sec1-26", type: "p",
        ko: "비트코인 사용자는 두 개의 키를 갖는다. 디지털 안전 금고 역할을 하는 주소가 파생되는 공개 키(public key)와, 그 금고를 열고 안의 코인을 꺼내 쓰는 데 필요한 비밀 조합인 개인 키(private key)다. 어떻게 이렇게 우연히도 백 씨의 대학원 시절 취미가 사토시가 용도를 변경해 활용한 바로 그 암호화 기술과 관련이 있을까.",
        en: "A Bitcoin user has two keys: a public key, from which an address is derived that acts as a digital safe deposit box; and a private key, which is the secret combination used to unlock that box and spend the coins it contains. How interesting, I thought, that Mr. Back’s grad-school hobby involved the same cryptographic technique that Satoshi had repurposed."
      },
      {
        id: "sec1-27", type: "p",
        ko: "그는 박사 논문 주제가 분산 컴퓨터 시스템이었다고 밝혔다. 컴퓨터 용어로 \"노드(nodes)\"라고 불리는 독립적인 컴퓨터들의 망에 의존해 소프트웨어를 함께 구동하는 프로그램이다. 이것은 비트코인의 또 다른 핵심 기술적 토대였다. 그리고 백 씨의 논문 프로젝트는 C++에 초점을 맞췄다. 사토시가 비트코인 소프트웨어 첫 버전을 코딩할 때 사용한 바로 그 프로그래밍 언어다.",
        en: "The topic of Mr. Back’s Ph.D. thesis, he told me, was distributed computer systems: Programs that rely on a web of independent computers known in computer parlance as “nodes” to work together to run their software. This was another technological pillar of Bitcoin. And Mr. Back’s thesis project focused on C++ — the same programming language Satoshi used to code the first version of the Bitcoin software."
      },
      {
        id: "sec1-28", type: "p",
        ko: "거의 2시간이 지나자 백 씨는 그날 저녁 다른 일정이 있다고 정중하게 알렸고, 우리는 화기애애하게 헤어졌다. 다른 질문이 생기면 연락하겠다고 말했다.",
        en: "After nearly two hours, Mr. Back politely signaled that he had other commitments that evening, so we cordially parted ways. I told him I would be in touch if I had other questions."
      },
      { id: "h3-3", type: "h3", ko: "사이퍼펑크가 되다", en: "Becoming a Cypherpunk" },
      {
        id: "sec1-29", type: "p",
        ko: "라스베이거스로 떠나기 전, 나는 사토시를 탄생시킨 기이한 지하 세계를 더 깊이 이해하기 위해 사이퍼펑크 메일링 리스트 아카이브에 몰두하기 시작했다. 뉴욕으로 돌아와서는 다시 그 속으로 빠져들었다. 페이스북 같은 소셜 미디어 플랫폼과 달리 사이퍼펑크 리스트는 탈중앙화된 소통의 장이었다.",
        en: "Before my trip to Las Vegas, I had begun to immerse myself in the archives of the Cypherpunks mailing list to learn more about the strange underground world that had produced Satoshi. When I returned to New York, I plunged back in. Unlike a social-media platform like Facebook, the Cypherpunks list was a decentralized communication forum."
      },
      {
        id: "sec1-30", type: "p",
        ko: "사생활을 중시하는 암호학 괴짜들이 검열에 대한 두려움 없이 전복적인 아이디어를 자유롭게 나누기 위해 그곳에 모였다. 그 과정에서 그들은 금융 역사의 흐름을 바꿀 혁신의 씨앗을 뿌렸다. 그들의 메시지는 여러 잘 알려지지 않은 웹사이트에 후세를 위해 보존되었다.",
        en: "Privacy-minded cryptography geeks gathered there to bat around subversive ideas without fear of being censored. In the process, they planted the seeds for innovations that would change the course of financial history. Their messages were preserved for posterity on several obscure websites."
      },
      {
        id: "sec1-31", type: "p",
        ko: "그중 한 곳에는 해골과 엇갈린 뼈다귀 로고와 “일어나라, 잃을 것이라고는 철조망뿐이다!”라는 슬로건이 적혀 있었다. 내가 거의 이해하지 못하는 암호학 전문 용어로 빽빽한 수천 통의 이메일이 눈앞에 펼쳐졌다. 백 씨는 대학원 생활이 끝나가던 1995년 여름에 리스트에 가입했다.",
        en: "One of them greeted me with a skull-and-crossbones logo and the slogan, “Arise, you have nothing to lose but your barbed wire fences!” I found myself staring at thousands of emails dense with crypto speak I barely grasped. Mr. Back joined the list in the summer of 1995, toward the end of his graduate studies."
      },
      {
        id: "sec1-32", type: "p",
        ko: "그는 디지털 프라이버시부터 자신의 알뜰한 소비 습관에 이르기까지 다양한 주제로 글을 쏟아내며 빠르게 존재감을 드러냈다. 초기 게시물 중 하나에서 그는 P.G.P. 개발에 참여했던 캘리포니아 출신 사이퍼펑크 할 피니(Hal Finney)가 올린 암호학적 난제, 즉 일종의 수학적 수수께끼를 풀어냈다.",
        en: "He quickly became a vocal participant, churning out posts on topics ranging from digital privacy to his miserly spending habits. In one of his first posts, he solved a cryptographic challenge, a sort of mathematical riddle, posted by Hal Finney, a Cypherpunk from California who had worked on P.G.P."
      },
      {
        id: "sec1-33", type: "p",
        ko: "이것이 온라인 우정의 시작이었다. 수십 년이 지나 백 씨는 트윗을 통해 피니 씨와 리스트 안팎에서 수없이 교류했으며 그의 집중력과 코딩 실력에 감탄했다고 밝혔다. 사토시 역시 피니 씨와 친분이 있었다. 사토시가 백서를 공개하자 피니 씨는 칭찬을 보냈다.",
        en: "It marked the beginning of an online friendship: Decades later, Mr. Back tweeted that he and Mr. Finney had interacted numerous times on and off the list and he admired Mr. Finney’s focus and coding chops. Satoshi, too, was friendly with Mr. Finney. When Satoshi unveiled his white paper, Mr. Finney complimented it."
      },
      {
        id: "sec1-34", type: "p",
        ko: "나중에 피니 씨는 세계 최초의 비트코인 거래에서 자원해 비트코인을 받았다. 피니 씨가 사토시의 정체를 알았다는 증거는 없었지만, 그들의 교류 중 하나는 사토시가 피니 씨와 인연이 있었음을 시사했다. 2010년 12월, 피니 씨는 비트코인톡에 비트코인 코드를 칭찬하는 글을 올렸다.",
        en: "Later, Mr. Finney volunteered to receive some bitcoins in what became the world’s first Bitcoin transaction. There was no evidence that Mr. Finney knew who Satoshi was, but one of their interactions suggested Satoshi was familiar with Mr. Finney. In December 2010, Mr. Finney wrote a post on Bitcointalk praising the Bitcoin code."
      },
      {
        id: "sec1-35", type: "p",
        ko: "두 시간 후, 사토시가 답글을 달았다. “할, 당신이 그렇게 말해주니 저에겐 큰 의미가 있습니다.” 사토시와 피니 씨가 과거의 인연을 공유했다고 생각하게 만든 또 다른 단서도 있었다. 말미에게 보낸 이메일 중 하나에서 사토시는 피니 씨가 고안한 전자 현금 시스템인 '재사용 가능한 작업 증명(Reusable Proofs of Work, R.P.O.W.)'을 언급했다.",
        en: "Two hours later, Satoshi responded, “That means a lot coming from you, Hal.” There was something else that made me think Satoshi and Mr. Finney shared a history. In one of his emails to Mr. Malmi, Satoshi made a reference to an electronic cash system Mr. Finney had invented called Reusable Proofs of Work."
      },
      {
        id: "sec1-36", type: "p",
        ko: "비트코인처럼 R.P.O.W.도 해시캐시를 설계에 통합했지만, 비트코인과 달리 암호학 커뮤니티의 관심을 거의 끌지 못했다. 사이퍼펑크 및 크립토그래피 리스트에서 이에 대해 언급한 사람은 극소수였다. 그 극소수 중 한 명이 바로 백 씨였다.",
        en: "Like Bitcoin, R.P.O.W. incorporated Hashcash into its design but, unlike Bitcoin, it had attracted virtually no interest from the cryptographic community. Only a handful of people had commented on it on the Cypherpunks and Cryptography lists. One of the few who had was Mr. Back."
      },
      { id: "h3-4", type: "h3", ko: "금괴", en: "A Gold Nugget" },
      {
        id: "sec1-37", type: "p",
        ko: "사이퍼펑크에서 백 씨는 이념적 동지들을 찾았다. 퇴근 후 런던 집에서 전화 접속 모뎀으로 인터넷에 접속해 지구 반대편의 다른 그룹 멤버들과 철학 논쟁을 벌이며 밤을 지새우는 그의 모습이 눈앞에 그려졌다. 새로운 펜팔들 중 상당수처럼 백 씨도 '암호 무정부주의(crypto anarchy)'를 받아들였다.",
        en: "In the Cypherpunks, Mr. Back had found his ideological soul mates. I pictured him in his home in London logging onto the internet with a dial-up modem after work and whiling the nights away in philosophical arguments with other group members half a world away. Like many of his new pen pals, Mr. Back embraced “crypto anarchy.”"
      },
      {
        id: "email-1", type: "email", from: "Adam Back <aba@dcs.ex.ac.uk>", to: "cypherpunks@toad.com", date: "Mon, 23 Sep 1996 08:15:19 +0800",
        ko: "저에게 암호 무정부주의는 더 자유주의적인(libertarian) 정부를 실현하기 위한 수단이자 정부 권력을 줄이고 자유와 프라이버시를 가능케 하는 핵심 도구입니다. 자유주의적 정부란 덜 강력한 정부, 더 낮은 세금, 덜 가혹한 법률, 더 많은 자유를 의미합니다.",
        en: "To me, crypto anarchy is a means to achieve a more libertarian government, it is a pivotal tool to reduce government power, and enable freedom and privacy. A libertarian government means a less powerful government, less taxes, less onerous laws, more freedoms."
      },
      {
        id: "sec1-38", type: "p",
        ko: "이 글은 사토시가 비트코인을 소개할 때 한 말을 떠올리게 했다.",
        en: "That reminded me of what Satoshi said when he introduced Bitcoin."
      },
      {
        id: "email-2", type: "email", from: "Satoshi Nakamoto <satoshi@vistomail.com>", date: "Fri Nov 14 13:55:35 EST 2008",
        ko: "제대로 설명할 수만 있다면 자유주의적 관점에서 매우 매력적일 겁니다. 저는 글보다는 코드를 다루는 데 더 능숙하지만요. 사토시 나카모토",
        en: "It's very attractive to the libertarian viewpoint if we can explain it properly. I'm better with code than with words though. Satoshi Nakamoto"
      },
      {
        id: "sec1-39", type: "p",
        ko: "클린턴 행정부가 P.G.P. 창시자에 대한 형사 조사를 개시했을 때 자유주의자인 백 씨는 격분했다. 당시 미국 정부는 암호화 프로그램이 국가 안보에 필수적이라고 보았으며, P.G.P.의 소스 코드를 온라인에 공개하는 것은 금지된 군수품을 수출하는 것과 같다고 여겼다.",
        en: "As a Libertarian, Mr. Back was incensed when the Clinton administration opened a criminal investigation into P.G.P.’s founder. At the time, the U.S. government considered encryption programs vital to national security and believed that the release of P.G.P.’s source code online was tantamount to exporting banned munitions."
      },
      {
        id: "sec1-40", type: "p",
        ko: "항의의 표시로, 백 씨는 강력한 암호화 알고리즘이 인쇄된 티셔츠를 만들어 다른 나라의 사이퍼펑크들에게 우편으로 보냈다. 민감한 암호화 기술 수출을 금지한 미국의 조치는 언론의 자유 원칙에 위배되며 집행될 수 없다는 것이 그의 요지였다.",
        en: "In protest, Mr. Back made T-shirts with a strong encryption algorithm printed on them and mailed them to Cypherpunks in other countries. His point was that the U.S. ban on the export of sensitive cryptography violated free-speech principles and couldn’t be enforced."
      },
      {
        id: "sec1-41", type: "p",
        ko: "백 씨의 재치 있는 장난을 즐기다가, 사토시 역시 코드를 통해 정치적 메시지를 전했다는 사실이 떠올랐다. 사토시가 비트코인의 첫 번째 거래 블록에 런던 타임스 헤드라인을 새겨 넣은 것도 당시 맹위를 떨치던 금융 위기 속에 영국 정부의 은행 구제금융을 비판하려는 정치적 메시지였을 것이다.",
        en: "As I delighted in the cleverness of Mr. Back’s prank, it dawned on me that Satoshi, too, had used code to send political messages. Satoshi had likely embedded that Times of London headline in the first block of transactions in part to decry the British government’s bank bailouts during the financial crisis, which was raging at the time."
      },
      {
        id: "sec1-42", type: "p",
        ko: "사토시는 탈중앙화 기술 애호가들 사이에서 인기 있는 웹사이트에 또 다른 정치적 메시지를 심어두었다. 그는 자신의 생일이 1975년 4월 5일이라고 주장했다. 4월 5일은 1933년 프랭클린 D. 루스벨트 대통령이 대공황 기간 중 달러 가치를 떨어뜨리기 위해 개인의 금 소유를 금지한 날이었고,",
        en: "Satoshi had planted another political message on a website popular with fans of decentralized technologies. He claimed that his date of birth was April 5, 1975. April 5 was the day in 1933 when President Franklin D. Roosevelt had banned the private ownership of gold to allow the government to devalue the dollar during the Great Depression."
      },
      {
        id: "sec1-43", type: "p",
        ko: "1975년은 그 금지가 해제된 해였다. 금융 평론가 도미닉 프리스비(Dominic Frisby)는 10여 년 전 이 이스터 에그를 발견하고 그 의미를 간파했다. 비트코인은 국가가 불법화하거나 가치를 떨어뜨릴 수 없는 금의 디지털 버전이라는 것이다. 하지만 아무도 2002년 백 씨가 남긴 이 짧은 게시물은 눈치채지 못한 것 같았다.",
        en: "The financial commentator Dominic Frisby had spotted this Easter egg more than a decade ago and recognized its meaning: Bitcoin was a digital version of gold that the state could neither outlaw nor devalue. But no one seemed to have noticed this short post from Mr. Back in 2002:"
      },
      {
        id: "sec1-44", type: "p",
        ko: "“Just curious, but what was the rationale under which private possession of gold was made illegal in the US? It boggles the mind ...”",
        en: "“Just curious, but what was the rationale under which private possession of gold was made illegal in the US? It boggles the mind ...”"
      },
      { id: "h3-5", type: "h3", ko: "스팸에 대한 집착", en: "Spam on the Brain" },
      {
        id: "sec1-45", type: "p",
        ko: "이 기묘한 우연을 곱씹다가 사토시와 백 씨의 또 다른 공통점을 발견했다. 바로 스팸에 대한 기이한 집착이었다. 백 씨의 여러 사이퍼펑크 취미 중에는 리메일러(remailer) 운영이 있었다. 리메일러는 이메일을 전달하기 전 식별 데이터를 제거해 사용자가 익명으로 소통할 수 있도록 해주는 서비스다.",
        en: "As I chewed on this odd coincidence, I noticed something else Satoshi and Mr. Back had in common: a weird preoccupation with spam. Among his various Cypherpunk hobbies, Mr. Back ran a remailer, a service that enabled its users to communicate anonymously by stripping identifying data from their emails before forwarding them on."
      },
      {
        id: "sec1-46", type: "p",
        ko: "스패머들은 이를 악용해 사람들에게 쓰레기 메일을 퍼부었고, 백 씨는 이에 엄청난 짜증을 느꼈다. 백 씨는 이에 맞서기 위해 1997년 3월 해시캐시를 발명했다. 아이디어는 리메일러 통해 전송되는 모든 이메일에 우편 요금을 부과하는 것이었다.",
        en: "To his great annoyance, spammers took advantage of it to bombard people with garbage. Mr. Back invented Hashcash in March 1997 as a way to fight back. The idea was to impose a postage fee on every email sent through his remailer."
      },
      {
        id: "sec1-47", type: "p",
        ko: "우편 요금은 사용자가 많은 계산이 필요한 소규모 수학 문제를 풀어 생성하는 해시캐시로 지불됐다. 수학 문제를 푸는 데 컴퓨터로는 몇 초밖에 걸리지 않지만, 한 번에 수십만 통의 이메일을 보내는 스패머들에게는 엄청난 컴퓨터 자원 부담을 안겨주었다.",
        en: "The postage fees were paid in Hashcash, which users generated by solving little mathematical problems requiring lots of calculations. The math problems took a computer only a few seconds to solve, but they imposed a costly computer-resource burden on spammers who were sending hundreds of thousands of emails at a time."
      },
      {
        id: "sec1-48", type: "p",
        ko: "사토시의 글을 두 번, 세 번 읽다 보니 사방에서 “스팸”이라는 단어가 눈에 띄기 시작했다. 헤아려 보니 사토시는 이를 24번 언급했으며, 종종 백 씨와 동일한 아이디어를 표현했다. 해시캐시를 공개한 지 5개월 후, 백 씨는 사이퍼펑크 리스트에서 자신의 발명품이 유명인들의 이메일을 필터링하는 데 유용할 수 있다고 제안했다.",
        en: "While reading through the Satoshi corpus a second and then a third time, I began seeing the word “spam” everywhere. By my count, Satoshi mentioned it 24 times, and he often expressed ideas identical to Mr. Back’s. Five months after unveiling Hashcash, Mr. Back suggested on the Cypherpunks list that his invention could be useful to celebrities as a way to filter their emails."
      },
      {
        id: "email-3", type: "email", from: "Adam Back <aba@dcs.ex.ac.uk>", date: "Sat, 9 Aug 1997 06:16:40 +0800", to: "cypherpunks@cyberpass.net",
        ko: "만약 당신이 어떤 미디어 유명인사이고 이메일을 너무 많이 받는다면 -- 그냥 볼륨을 높이고, 요구되는 우편 요금을 인상한 다음, 원하는 사람들을 무료 발송 목록에 추가하면 됩니다.",
        en: "If you're some media celebrity and you get too much email -- just turn up the squech, increase the postage required rate, and add people you do want to your no-postage list."
      },
      {
        id: "email-4", type: "email", from: "Satoshi Nakamoto <satoshi@vistomail.com>", date: "Fri Jan 16 11:03:14 EST 2009",
        ko: "유명한 사람이 읽을 수 있는 것보다 더 많은 이메일을 받고 있지만 여전히 팬들이 자신에게 연락할 수 있는 방법을 원한다면, 비트코인을 설정하고 웹사이트에 IP 주소를 알려줄 수 있습니다. 'Send X bitcoins to my priority hotline at this IP and I’ll read the message personally.'",
        en: "If someone famous is getting more e-mail than they can read, but would still like to have a way for fans to contact them, they could set up Bitcoin and give out the IP address on their website. 'Send X bitcoins to my priority hotline at this IP and I’ll read the message personally.'"
      },
      {
        id: "sec1-49", type: "p",
        ko: "백 씨처럼 10년 이상 스팸 차단을 머릿속에 담고 살아온 사람이 아니었다면, 사토시의 새로운 전자 화폐의 활용법으로서 자연스럽게 떠올릴 수 없는 아이디어였다. 사토시는 비트코인이 스팸 전반의 감소로 이어질 수 있다고도 믿었다.",
        en: "It wasn’t an obvious use case for Satoshi’s new electronic money unless filtering junk email was on your brain, as it had been on Mr. Back’s for more than a decade. Satoshi also believed that Bitcoin could lead to an overall reduction in spam."
      },
      {
        id: "sec1-50", type: "p",
        ko: "백서를 발표한 지 며칠 후, 그는 해커들이 이메일 수신함을 폭주시키기 위해 동원한 좀비 컴퓨터 부대가 자신의 발명품 덕분에 “대신 비트코인을 생성하는” 새로운 목적을 갖게 될 수 있다고 주장했다. 그의 주장은 큰 호응을 얻지 못했고 스팸은 계속 늘어났다.",
        en: "Days after releasing his white paper, he argued that his creation might give the armies of zombie computers commandeered by hackers to flood email inboxes a new purpose: “generating bitcoins instead.” His argument didn’t gain any traction and spam continued to proliferate."
      },
      {
        id: "sec1-51", type: "p",
        ko: "하지만 백 씨는 4년 후 비트코인톡에서 똑같은 주장을 펼쳤다. \"해시캐시 CPU/GPU 채굴이 스패밍보다 더 수익성 있는 시장이라면 아마도 스팸이 줄어들 수도 있습니다. 제 생각에는 그럴 가능성이 매우 높아 보입니다.\"라고 썼다.",
        en: "Yet Mr. Back would make the very same point on Bitcointalk four years later: “Maybe spam would even fall if Hashcash CPU/GPU mining is a more profitable market than spamming. It seems to me highly likely that it would be,” he wrote."
      },
      { id: "h3-6", type: "h3", ko: "미스터 애버리지(평범한 사람)", en: "Mr. Average" },
      {
        id: "sec1-52", type: "p",
        ko: "결정적 증거로 이어질 만한 사토시의 철통같은 위장 속 틈새를 찾는 데는 운이 따르지 않았다. 통념상 그는 두 가지 실수를 저질렀다. 첫 번째는 비트코인 소프트웨어를 출시했을 때 그가 남부 캘리포니아에 있었음을 시사하는 유출된 IP 주소였다.",
        en: "I was having less luck finding cracks in Satoshi’s deep cover that might lead to a true smoking gun. Conventional wisdom was that he had made two mistakes. The first one involved a leaked I.P. address that appeared to place him in Southern California when he launched the Bitcoin software."
      },
      {
        id: "sec1-53", type: "p",
        ko: "다른 하나는 그의 이메일 계정 중 하나가 해킹된 것이었다. 두 단서를 모두 쫓아 몇 주를 보낸 끝에, 그것들이 막다른 골목일 뿐만 아니라 애초에 실수가 아니었을 가능성이 높다는 결론에 이르렀다. 흔적을 이토록 철저히 지우는 사람을 어떻게 찾을 수 있을까?",
        en: "The other involved a hack of one of his email addresses. After weeks pursuing both leads, I concluded that not only were they dead ends, they probably weren’t mistakes in the first place. How was I going to find someone so good at hiding his tracks?"
      },
      {
        id: "sec1-54", type: "p",
        ko: "이 문제와 씨름하다 보니, 백 씨 역시 인터넷에서 익명으로 활동하는 데 능숙하다는 사실이 떠올랐다. 정부 감시에 극도로 예민했던 그는 이를 피할 방법을 끊임없이 궁리했다. 사실, 사토시처럼 백 씨도 가명 사용을 매우 즐겼다.",
        en: "As I wrestled with this question, it occurred to me that Mr. Back, too, was adept at operating anonymously on the internet. Deeply paranoid about government monitoring, he constantly gamed out ways to elude it. In fact, like Satoshi, Mr. Back was a big fan of using pseudonyms."
      },
      {
        id: "sec1-55", type: "p",
        ko: "“레이더망 아래에 있어야 합니다. 사실상 정부에 보이지 않아야 하고, 당신에 대한 정보기관의 파일은 '미스터 애버리지'처럼 읽혀야 하며 완전히 무해해야 합니다. 그런 다음 실제 관심사를 위해 하나 이상의 또 다른 자아(alter-egos)를 가져야 합니다.”라고 그는 1998년 1월에 썼다.",
        en: "“You must be below the radar belt, you must be essentially invisible to the government, the spooks dossier on you must read Mr Average and be entirely wholesome. Then you must have one or more alter-egos, for your real interests,” he wrote in January 1998."
      },
      {
        id: "sec1-56", type: "p",
        ko: "사토시가 선택한 또 다른 자아는 일본 출신이었다. 공교롭게도 백 씨는 1997년 한 일본인 사이퍼펑크가 리스트에 일본 최초의 리메일러 개설을 알리는 글을 올렸을 때 일본이라는 나라에 관심을 표명한 적이 있었다. 백 씨는 이렇게 답했다.",
        en: "Satoshi’s chosen alter ego was from Japan. As it happened, Mr. Back had expressed interest in the country in 1997, when a Japanese Cypherpunk posted to the list about the creation of Japan’s first remailer. Mr. Back responded:"
      },
      {
        id: "sec1-57", type: "p",
        ko: "“새로운 관할권에서 리메일러를 시작하신 것을 축하합니다! 관할권 쇼핑도 좋은 방법인데, 일본이 관할권 측면에서 어떤 기회를 제공하는지 궁금하네요. 유럽이나 미국에서는 불법이지만 일본에서는 합법인 것들이 있나요?”",
        en: "“Jurisdiction shopping is good, too — wonder what Japan offers as a jurisdiction opportunity — are there things legal in Japan which are not legal in Europe, or US?” The Japanese Cypherpunk didn’t answer. But that wouldn’t have prevented Mr. Back from later conducting a little research on his own."
      },
      {
        id: "sec1-58", type: "p",
        ko: "그 일본인 사이퍼펑크는 답하지 않았다. 하지만 그렇다고 백 씨가 나중에 스스로 조사를 해보는 것을 막지는 못했을 것이다. 그랬다면, 익명 이메일과 웹 호스팅을 제공하는 도쿄 주소의 Anonymousspeech L.L.C.라는 회사를 우연히 발견했을지도 모른다.",
        en: "If he did, he might have come across a company with a Tokyo address called Anonymousspeech L.L.C. that offered anonymous email and web hosting. Satoshi used its services to register the bitcoin.org website and to create two untraceable email accounts."
      },
      {
        id: "sec1-59", type: "p",
        ko: "사토시는 bitcoin.org 웹사이트를 등록하고 추적이 불가능한 두 개의 이메일 계정을 만들기 위해 이 회사의 서비스를 이용했다. 1999년 백 씨는 프라이버시 소프트웨어 전문 스타트업에 취직하기 위해 몬트리올로 이주했다.",
        en: "In 1999, Mr. Back moved to Montreal to take a job with a start-up that specialized in privacy software. There, he helped build a privacy system called the Freedom Network that allowed its users to browse the internet anonymously. It was a precursor to the Onion Router, better known as Tor."
      },
      {
        id: "sec1-60", type: "p",
        ko: "그곳에서 그는 사용자가 익명으로 인터넷을 탐색할 수 있게 해주는 프라이버시 시스템 '자유 네트워크(Freedom Network)'를 구축하는 데 힘을 보탰다. 이것은 인터넷 트래픽을 익명화하는 양파 라우터(Onion Router), 즉 Tor의 전신이었다.",
        en: "Like Bitcoin, the Freedom Network was a distributed computer system. Mr. Back and his colleagues tried to make it impervious to government and corporate monitoring. That was another trait he shared with Satoshi."
      },
      {
        id: "sec1-61", type: "p",
        ko: "비트코인 커뮤니티에는 사토시가 자신의 발자취를 숨기기 위해 Tor를 사용했다는 데 폭넓은 공감대가 형성되어 있다. 비트코인처럼 자유 네트워크도 분산 컴퓨터 시스템이었다. 백 씨와 그의 동료들은 이를 정부와 기업의 감시에 영향을 받지 않도록 만들려 했다.",
        en: "whose Bitcointalk posts displayed a deep knowledge of network security and how to guard against vulnerabilities. The Bitcoin network is widely admired for how well it has withstood hacking attempts."
      },
      { id: "h3-7", type: "h3", ko: "냅스터 대 그누텔라", en: "Napster vs. Gnutella" },
      {
        id: "sec1-62", type: "p",
        ko: "사이퍼펑크 리스트 아카이브 깊숙이 수개월을 파고들다 보니, 이따금 연구가 어디까지 진행됐는지 갈피를 잃고 엉뚱한 단서를 따라 이상한 막다른 골목으로 빠져들기도 했다. 자신의 백서에 대한 첫 번째 비판 중 하나에 답하면서 사토시는 크립토그래피 리스트에 이렇게 썼다. \"그 주장을 충분히 강하게 표현하지 못했군요.\"",
        en: "After several months in the depths of the Cypherpunks list archives, I sometimes lost track of where I was in my research and followed false leads down bizarre cul-de-sacs. While responding to one of the first criticisms of his white paper on the Cryptography list, Satoshi had written: “I didn’t really make that statement as strong as I could have.”"
      },
      {
        id: "sec1-63", type: "p",
        ko: "나는 그 문구를 전에 본 것 같아, 이미 읽은 수백 개의 1990년대 메일링 리스트 게시물을 다시 뒤지는 데 여러 날 밤을 보냈다. 결국 내가 착각한 것이 분명해졌다. 하지만 다시 읽는 것이 완전히 헛수고는 아니었다. 백 씨와 사토시 사이의 또 다른 공통점들이 눈에 들어오기 시작했다.",
        en: "I thought I had seen that phrase before and spent several evenings wading through hundreds of 1990s mailing-list posts I’d already read. It soon became clear I had imagined it. But my rereading wasn’t all in vain. Other parallels between Mr. Back and Satoshi started to become apparent."
      },
      {
        id: "sec1-64", type: "p",
        ko: "이를테면, 두 사람은 저작권에 대한 반감을 공유했다. \"특허와 저작권을 없애라\"고 백 씨는 1997년 9월에 썼다. 이 신념에 따라 백 씨는 스팸 차단 소프트웨어인 해시캐시를 오픈소스로 공개했다. 사토시도 마찬가지였다.",
        en: "For instance, Mr. Back and Satoshi shared a dislike for copyright. “Scrap patents and copyright,” Mr. Back wrote in September 1997. In keeping with this belief, Mr. Back made his Hashcash spam-throttling software open source. Satoshi did a similar thing."
      },
      {
        id: "sec1-65", type: "p",
        ko: "비트코인 소프트웨어를 M.I.T.의 오픈소스 라이선스로 배포해 누구나 제한 없이 사용·수정·배포할 수 있도록 했다. 공공재를 만든다는 정신에 따라, 백 씨와 사토시 모두 자신의 창작물 전용 인터넷 메일링 리스트(해시캐시 리스트와 Bitcoin-dev 리스트)를 개설했다.",
        en: "He released the Bitcoin software under M.I.T.’s open-source license, which allowed anyone to use, modify and distribute it without restrictions. In the spirit of building something in the public domain, Mr. Back and Satoshi also both created internet mailing lists dedicated to their creations."
      },
      {
        id: "sec1-66", type: "p",
        ko: "놀랍도록 유사한 형식과 문체로 새 기능과 버그 수정 목록을 담은 소프트웨어 업데이트를 게시했다. 사토시의 저작권 반대 성향은 다른 방식으로도 드러났다. 그는 비트코인톡에서 직접 디자인한 비트코인 로고 이미지를 공유할 때 저작권을 명시적으로 포기했다.",
        en: "the Hashcash list and the Bitcoin-dev list — where they posted software updates listing new features and bug fixes in a format and style that looked strikingly similar. Satoshi’s Back-like bias against copyright surfaced in other ways."
      },
      {
        id: "sec1-67", type: "p",
        ko: "이를 개선하려는 사람들에게 \"자신의 그래픽을 퍼블릭 도메인으로 만들 것\"을 권장했다. 2000년대 초, 인기 있는 파일 공유 서비스 냅스터(Napster)가 대형 음반사들에게 소송을 당해 폐쇄되면서 저작권 집행이 주류 뉴스로 떠올랐다.",
        en: "He expressly waived copyright when he shared images of a Bitcoin logo he had designed on Bitcointalk, and he encouraged people who wanted to improve upon it to “make their graphics public domain.” In the early 2000s, copyright enforcement became mainstream news when the popular file-sharing service Napster shut down."
      },
      {
        id: "sec1-68", type: "p",
        ko: "냅스터는 사용자들이 중개자 없이 서로 직접 콘텐츠를 공유하는 P2P(peer-to-peer) 소프트웨어였다. 백 씨는 경악했다. 그는 지식재산권 변호사가 쓴, P2P 소프트웨어 제작자들이 직면한 모든 법적 위협을 상세히 설명한 논문을 사이퍼펑크 리스트에 공유했다.",
        en: "Napster was what’s known as peer-to-peer software, where users share content with one another directly. Mr. Back was appalled. He shared with the Cypherpunks list a paper written by an intellectual property lawyer that detailed all the legal threats that makers of peer-to-peer software now faced."
      },
      {
        id: "sec1-69", type: "p",
        ko: "“이 글을 읽고 내린 결론은,” 백 씨는 썼다. “가장 안전하고 간단한 방법은 그런 소프트웨어를 익명으로 배포하는 것입니다.” 비트코인도 냅스터와 마찬가지로 P2P 소프트웨어였다. 음악 산업 자리에 정부를 대입하면 비슷한 시나리오가 벌어질 수 있었다.",
        en: "“My conclusion after reading this,” Mr. Back wrote, “is that the safest and simplest thing to do is to just publish such software anonymously.” Bitcoin, like Napster, was peer-to-peer software. Substitute the government for the music industry and a similar scenario could unfold."
      },
      {
        id: "sec1-70", type: "p",
        ko: "창시자의 신원이 드러나면 정부 변호사들은 누구를 겨냥해야 할지 알게 된다. 신원이 숨겨져 있다면 고소할 대상이 없다. 백 씨와 사토시가 동일인이라면, 사토시가 자신을 숨기기로 한 이유가 설명된다. 음반사들은 사업적 이익을 지키려 했다. 정부의 의도는 달랐을 것이다. 화폐에 대한 독점권을 지키는 것이 그들의 목표였을 테니까.",
        en: "If its creator’s identity became known, government lawyers would know whom to go after. If it stayed concealed, there would be no one to sue. If Mr. Back and Satoshi were the same person, that would help explain why Satoshi chose to hide. The music companies were protecting their business interests. The government would have had a different agenda — protecting its monopoly over money."
      },
      {
        id: "email-5", type: "email", from: "Satoshi Nakamoto <satoshi@vistomail.com>", date: "Thu Nov 6 15:15:40 EST 2008",
        ko: "정부는 냅스터와 같이 중앙에서 통제되는 네트워크의 머리를 자르는 데는 능숙하지만, 그누텔라(Gnutella)나 토르(Tor) 같은 순수 P2P 네트워크는 건재한 것 같습니다.",
        en: "Governments are good at cutting off the heads of a centrally controlled networks like Napster, but pure P2P networks like Gnutella and Tor seem to be holding their own."
      },
      {
        id: "sec1-71", type: "p",
        ko: "그는 냅스터가 사용자들끼리 노래를 직접 교환하면서도 여전히 중앙 서버를 통해 누가 어떤 노래를 보유하고 있는지 목록을 관리했다는 사실을 지적하고 있었다. 반면 또 다른 파일 공유 서비스인 그누텔라는 비트코인처럼 전 세계에 분산된 독립 컴퓨터 네트워크 위에서 작동했다.",
        en: "He was alluding to the fact that, even though its users exchanged songs directly, Napster still used a central server to keep a list of who had what songs. By contrast, Gnutella ran on a network of independent computers, just like Bitcoin."
      },
      {
        id: "sec1-72", type: "p",
        ko: "여기서 또 하나의 놀라운 우연이 탄생했다. 2000년 5월 게시물에서 백 씨도 냅스터와 그누텔라를 정확히 같은 방식으로 비교했다.",
        en: "This made for yet another fascinating coincidence. In a May 2000 post, Mr. Back had drawn the exact same comparison:"
      },
      {
        id: "email-6", type: "email", from: "Adam Back <adam@cypherspace.org>", subject: "napster vs gnutella -- why distributed systems win", date: "2000-05-10 16:40:11",
        ko: "냅스터 서버는 중앙화되어 있어 폐쇄될 수 있기 때문에 그누텔라가 성공할 가능성이 훨씬 높습니다. 그누텔라는 기본적으로 폐쇄될 수 없습니다.",
        en: "Gnutella stands a much better chance of success because Napster servers being central can be closed down. Gnutella basically can’t be shutdown."
      },
      {
        id: "sec1-73", type: "p",
        ko: "백 씨는 이 비교를 한 번만 한 것이 아니었다. 사이퍼펑크 리스트에서 무려 세 차례나 같은 비교를 했다.",
        en: "Mr. Back hadn’t made this comparison just once. He had made it three separate times on the Cypherpunks list."
      },
      { id: "h2-2", type: "h2", ko: "II. 숨겨진 로드맵", en: "II. Buried Road Map" },
      { id: "h3-8", type: "h3", ko: "비트코인 탄생 10년 전에 비트코인의 윤곽을 그리다", en: "Outlining Bitcoin a Decade Before Bitcoin" },
      {
        id: "sec2-1", type: "p",
        ko: "이 모든 유사점은 흥미로웠지만, 아담 백과 비트코인 창조를 직접 연결하는 증거는 없었다. 그러다 비트코인이 출시되기 10년 전인 1997년부터 1999년 사이에 백 씨가 쓴 사이퍼펑크 게시물 묶음을 발견하면서 상황이 달라졌다.",
        en: "All these similarities were intriguing, but I didn’t have anything that tied Mr. Back directly to the creation of Bitcoin. That changed when I discovered a cluster of Cypherpunks posts Mr. Back had written between 1997 and 1999, a decade before Bitcoin was launched."
      },
      {
        id: "sec2-2", type: "p",
        ko: "1997년 4월 30일, 그는 현대 은행 시스템과 \"완전히 단절된\" 4가지 핵심 속성을 가진 전자 현금 시스템 구축을 제안했다. 지불인과 수취인 모두의 프라이버시를 보존하고, 중단이 어렵도록 컴퓨터 네트워크 전반에 분산시키며, 과도한 인플레이션을 막기 위한 내재적 희소성을 갖췄다.",
        en: "On April 30, 1997, he suggested creating an electronic cash system “entirely disconnected” from modern banking that would have four key attributes: It would preserve the privacy of both payer and payee; it would be distributed across a network of computers to make it hard to shut down; it would have some built-in scarcity to prevent excessive inflation."
      },
      {
        id: "sec2-3", type: "p",
        ko: "어떤 개인이나 은행도 신뢰할 필요가 없어야 한다는 것이었다. 마지막 목표를 달성하기 위해 이틀 후 다섯 번째 요소인 공개적으로 검증 가능한 프로토콜을 제안했다. 이 5가지 요소는 모두 훗날 비트코인의 핵심이 됐다.",
        en: "and it wouldn’t require trust in any individual or bank. To achieve the latter, he suggested a fifth component two days later: a publicly verifiable protocol. All five of these elements later became core to Bitcoin."
      },
      {
        id: "sec2-4", type: "p",
        ko: "4개월 후 백 씨는 게임 이론에 뿌리를 둔 새로운 기능을 도입하며 다시 전자 현금 주제로 돌아왔다. \"제가 약간 고민해 본 적용 분야는 분산 은행 시스템을 만드는 아이디어입니다.\"라고 그는 썼다.",
        en: "Four months later, Mr. Back returned to the topic of electronic cash, introducing a new feature rooted in game theory. “An application I have put a bit of thought into is the idea of creating a distributed banking system,” he wrote."
      },
      {
        id: "sec2-5", type: "p",
        ko: "“이상적으로는 모든 노드가 동등하고, 그 중 n개 중 k개가 공모해야만 은행 운영을 손상시킬 수 있는 시스템입니다.” 백 씨는 탈중앙화 시스템을 괴롭히는 컴퓨터 과학 난제인 비잔틴 장군 문제(Byzantine Generals Problem)를 암시하고 있었다.",
        en: "“Ideally it is a system where all nodes are equivalent, and k of n of those nodes have to collude before they can compromise the operation of the bank.” Mr. Back was alluding to the Byzantine Generals Problem, a computer science problem that bedevils decentralized systems."
      },
      {
        id: "sec2-6", type: "p",
        ko: "비유하자면, \"n\"명의 장군이 비잔티움과 전쟁 중인 적의 도시를 포위하고 있다. 성공적인 침공을 위해서는 모두 같은 시간에 공격하기로 합의해야 하지만, 그 중 \"k\"명은 배신자여서 계획을 망칠 수도 있다.",
        en: "In the analogy, “n” number of generals surround an enemy city at war with Byzantium. To invade successfully, they must all agree to attack at the same time, but a subset of “k” generals may be traitors."
      },
      {
        id: "sec2-7", type: "p",
        ko: "분산 컴퓨터 네트워크에서도 마찬가지다. 네트워크 내 악의적인 참여자, 즉 노드에 의해 파괴될 수 있다. 백 씨는 너무나 많은 곳에 수많은 노드가 분산되어 있어 시스템을 파괴하려는 자가 충분한 공모자를 찾을 수 없는 전자 현금 네트워크를 만들고자 했다.",
        en: "This is also true of distributed computer networks: They can be sabotaged by malicious participants, or nodes, in the network. Mr. Back wanted to create an electronic cash network with so many nodes in so many different places that no one in the mood to sabotage it would be able to find enough conspirators."
      },
      {
        id: "sec2-8", type: "p",
        ko: "이는 11년 후 사토시가 백서에서 설명한 시스템과 놀랍도록 흡사했다. 비트코인은 \"네트워크를 공격하기 위해 협력하지 않는 노드들이 CPU 파워의 과반수를 통제하는 한\" 작동할 것이라고 사토시는 적었다.",
        en: "That sounded a lot like the system Satoshi described in his white paper 11 years later: Bitcoin would work, Satoshi wrote, “as long as a majority of CPU power is controlled by nodes that are not cooperating to attack the network.”"
      },
      {
        id: "sec2-9", type: "p",
        ko: "1997년 사이퍼펑크 리스트 게시물에서 백 씨는 네트워크 운영에 영향을 미치지 않고 \"왔다 갔다(come and go)\" 할 수 있는 노드에 대해 썼다. 백서에서 사토시는 노드들이 \"원할 때 네트워크를 떠났다가 다시 합류할 수 있다(leave and rejoin the network at will)\"고 적었다.",
        en: "In his 1997 Cypherpunks list post, Mr. Back wrote of nodes that could “come and go” without affecting the network’s operations. In his white paper, Satoshi wrote that nodes could “leave and rejoin the network at will.”"
      },
      {
        id: "sec2-10", type: "p",
        ko: "표현은 약간 달랐지만, 뛰어난 암호학자가 아니더라도 백 씨와 사토시가 완전히 동일한 개념을 제안했음을 알 수 있었다. 1998년 12월 6일, 또 다른 사이퍼펑크 웨이 다이(Wei Dai)가 비머니(b-money)라는 자체 아이디어를 내놓자 백 씨는 다시 전자 현금 주제로 돌아왔다.",
        en: "The phrasing was slightly different, but it didn’t require a crack cryptographer to see that Mr. Back and Satoshi had proposed the exact same concepts. On Dec. 6, 1998, Mr. Back returned once more to the topic of electronic cash after another Cypherpunk, Wei Dai, floated his own idea, called b-money."
      },
      {
        id: "sec2-11", type: "p",
        ko: "유튜버 Barely Sociable이 2020년 영상에서 지적했듯, 백 씨는 다이 씨의 제안을 적극 수용했다. 비머니는 백 씨가 구상했던 것처럼 공개 키 암호화를 통해 사용자 계정을 익명화함으로써 지불인과 수취인의 프라이버시를 보존했다.",
        en: "As the YouTuber Barely Sociable pointed out in his 2020 video, Mr. Back seized on Mr. Dai’s proposal. B-money used public-key cryptography to anonymize users’ accounts, preserving the privacy of payer and payee as Mr. Back had envisioned."
      },
      {
        id: "sec2-12", type: "p",
        ko: "백 씨가 마음에 들어 한 또 다른 기능도 있었다. 디지털 화폐를 만들려는 사람이라면 누구나 맞닥뜨리는 난제 중 하나는 화폐를 발행하는 방법이다. 다이 씨는 연산 문제를 푼 사용자에게 새로 발행된 비머니 코인을 보상으로 지급하는 시스템을 제안했다.",
        en: "And it had another feature Mr. Back liked. One problem that confronts anyone trying to create a digital currency is how to mint coins. Mr. Dai proposed a system in which users who solved a computational problem would be rewarded with newly minted b-money coins."
      },
      {
        id: "sec2-13", type: "p",
        ko: "백 씨의 해시캐시도 이와 매우 유사한 방식으로 작동했다. 연산 문제를 푼 사용자에게 이메일 전송 권한을 보상으로 주었다. 그는 해시캐시를 변용해 다이 씨의 전자 화폐를 발행하는 메커니즘으로 삼을 것을 제안했다.",
        en: "Mr. Back’s Hashcash invention did something very similar: It rewarded users who solved computational problems with permission to send emails. He suggested repurposing Hashcash and making it the mechanism to mint Mr. Dai’s electronic coins."
      },
      {
        id: "sec2-14", type: "p",
        ko: "이것은 의미심장한 대목이었다. 사토시가 백서에서 다이 씨를 인용했고, 훗날 비트코인을 \"웨이 다이의 비머니 제안을 구현한 것\"이라고 묘사했기 때문이다. 잠시 멈춰 생각해 보니 정말 경이로웠다.",
        en: "This was significant because Satoshi had cited Mr. Dai in his white paper and later described Bitcoin as “an implementation of Wei Dai’s b-money proposal.” When I stopped to think about it, it was uncanny."
      },
      {
        id: "sec2-15", type: "p",
        ko: "Just like Mr. Back proposed to do in 1998, Satoshi combined the Hashcash and b-money concepts to create Bitcoin. What were the chances of that? That wasn’t all.",
        en: "Just like Mr. Back proposed to do in 1998, Satoshi combined the Hashcash and b-money concepts to create Bitcoin. What were the chances of that? That wasn’t all."
      },
      {
        id: "sec2-16", type: "p",
        ko: "1998년 12월 비머니를 논하면서 백 씨는 사토시의 인플레이션 해법까지 미리 예견했다. 연산 문제를 풀어 발행되는 모든 전자 화폐는 통제 불능의 인플레이션에 빠질 수밖에 없었다.",
        en: "In the comments he made about b-money in December 1998, Mr. Back anticipated Satoshi’s inflation solution. Any electronic coin minted by solving computational problems was bound to suffer from runaway inflation."
      },
      {
        id: "sec2-17", type: "p",
        ko: "컴퓨터 칩이 강력해질수록 문제를 풀고 새 화폐를 주조하기가 더 쉬워지기 때문이다. 이 문제를 피하기 위해 백 씨는 비머니 코인을 주조하는 데 \"시간이 지날수록 더 많은 연산 노력\"이 필요하도록 해야 한다고 제안했다.",
        en: "because, as computer chips got more powerful, it would become easier for computers to solve the problems and mint new coins. To get around this issue, Mr. Back suggested that minting a b-money coin should “require more computational effort over time.”"
      },
      {
        id: "sec2-18", type: "p",
        ko: "그것이 바로 사토시가 비트코인 소프트웨어를 설계한 방식이었다. 새로운 비트코인 거래 블록을 채굴하는 데 평균 10분이 걸리도록 프로그래밍하고, 더 빠른 컴퓨터 칩이 그 시간 간격을 줄이기 시작하면 문제 해결 난이도를 높이는 알고리즘을 만들었다.",
        en: "That’s exactly how Satoshi designed the Bitcoin software. New Bitcoin blocks are programmed to take 10 minutes to mine on average, and an algorithm adjusts the difficulty of solving the problems if faster computer chips start to shrink that interval."
      },
      {
        id: "sec2-19", type: "p",
        ko: "이 모든 선견지명에서 멈추지 않고, 백 씨는 1999년 4월 또 다른 핵심 개념을 제안했다. 분산 전자 현금이 작동하려면 모든 거래에 공개적이고 변조 불가능한 타임스탬프가 필요했다.",
        en: "As if all these prescient insights were not enough, Mr. Back proposed another crucial concept in April 1999. For distributed electronic cash to work, there needed to be a public, immutable time stamp of every transaction."
      },
      {
        id: "sec2-20", type: "p",
        ko: "그렇지 않으면 사용자 한 명이 코인 하나를 두 번 써서 시스템 전체를 혼란에 빠뜨릴 수 있었다. 백 씨의 해결책은 해시 트리(대량의 데이터를 단일 디지털 지문으로 압축하는 방식)를 이용하고 그 지문을 뉴욕타임스 광고란에 게재하는 것이었다.",
        en: "Mr. Back’s solution involved using hash trees — which condense large amounts of data into a single digital fingerprint — and publishing those fingerprints in New York Times classified ads."
      },
      {
        id: "sec2-21", type: "p",
        ko: "사토시는 비트코인에 같은 아이디어를 적용했지만, 광고란 게재 방식은 백 씨의 해시캐시로 대체했다. 해시캐시는 거래를 블록으로 묶는 데 사용되는 집약적 연산을 위조하기에 너무 비용이 많이 들고 시간이 걸리도록 만들어 타임스탬프를 구현했다.",
        en: "Satoshi used the same idea for Bitcoin but replaced the classified ads component with Mr. Back’s Hashcash, which time-stamped transactions by making the computations used to forge them too expensive."
      },
      {
        id: "sec2-22", type: "p",
        ko: "백 씨는 나중에 비트코인에 쏟아질 주요 비판 중 하나인 막대한 전력 사용에 대한 사토시의 반응까지 예고했다. 그는 1998년과 1999년에 해시캐시와 비머니의 결합으로 소모되는 에너지는 은행 시스템이 소비하는 것보다 적을 것이라고 주장했다.",
        en: "Mr. Back even foreshadowed Satoshi’s response to electricity use concerns. He argued in 1998 and 1999 that the energy consumed by the combination of Hashcash and b-money would be less than the energy consumed by the banking system."
      },
      {
        id: "sec2-23", type: "p",
        ko: "10년 후 비트코인 백서의 초기 독자가 이 문제를 제기했을 때 사토시도 비슷한 주장을 펼쳤다.",
        en: "Ten years later, when an early reader of the Bitcoin white paper raised the issue, Satoshi made a similar point."
      },
      {
        id: "email-7", type: "email", from: "Adam Back <aba@dcs.ex.ac.uk>", date: "1999-04-17 17:45:04",
        ko: "낭비가 법정 화폐(fiat money)의 비용보다 적은 한, 그것은 이득입니다.",
        en: "As long as the wastage is lower than the costs of fiat money it's a win."
      },
      {
        id: "email-8", type: "email", from: "Satoshi Nakamoto <satoshin@gmx.com>", date: "Sun, 03 May 2009, 23:32:26 +0100", to: "mmalmi@cc.hut.fi",
        ko: "[만약 비트코인이] 상당한 에너지를 소비할 만큼 성장하더라도, 그것이 대체할 노동집약적이고 자원집약적인 전통 은행 활동보다는 덜 낭비적일 것이라고 생각합니다.",
        en: "[If Bitcoin] did grow to consume significant energy, I think it would still be less wasteful than the labour and resource intensive conventional banking activity it would replace."
      },
      {
        id: "sec2-24", type: "p",
        ko: "요컨대, 백 씨는 비트코인이 탄생하기 10년 전에 그 거의 모든 면을 구상했을 뿐만 아니라, 비트코인의 가장 큰 결함을 해명하기 위해 사토시와 동일한 논리를 사용했다.",
        en: "In short, Mr. Back envisioned nearly every facet of Bitcoin — and used the same rationalization as Satoshi to excuse its main flaw — a decade before Bitcoin was created."
      },
      { id: "h3-9", type: "h3", ko: "무응답", en: "Radio Silence" },
      {
        id: "sec2-25", type: "p",
        ko: "라스베이거스 만남으로부터 한 달 후, 나는 백 씨에게 그의 경력과 2009년 몰타로 이주한 이유를 묻는 이메일을 보냈다. 질문의 의도는 밝히지 않았지만, 비트코인 커뮤니티 일부 회원들은 이 유럽 조세 도피처가 사토시와 그의 비트코인 재산을 보관하기에 이상적인 장소라고 지적해왔다.",
        en: "A month after our meeting in Vegas, I emailed Mr. Back some questions about his work history, and about why he had moved to Malta in 2009. I didn’t say why I was asking, but some members of the Bitcoin community had pointed out that the European tax haven would make an ideal home for Satoshi and his trove of bitcoins."
      },
      {
        id: "sec2-26", type: "p",
        ko: "백 씨는 다음 날 예의 바르게, 하지만 내 질문의 의도를 확실히 간파한 듯한 답장을 보냈다. 생활비, 날씨, 그리고 세금 등 여러 이유로 몰타로 이주했다고 썼다.",
        en: "Mr. Back replied the next day — politely, but seemingly with a firm grasp of the implication of my question. He moved to Malta for several reasons, including cost of living, weather and, yes, taxes, he wrote."
      },
      {
        id: "sec2-27", type: "p",
        ko: "“비트코인 팬들은 탐정 놀이를 좋아하지만, 우연은 일어나게 마련이고 그것이 반드시 무언가를 의미하지는 않습니다.” 그가 내 의도를 알아챘음이 분명했다. 나를 괴롭히던 문제를 꺼내 한 걸음 더 밀어붙일 때가 됐다.",
        en: "“Bitcoiners love sleuthing but coincidences do happen and don’t necessarily mean anything.” He had clearly seen what I was getting at. It was time to stop being coy and push a little harder."
      },
      {
        id: "sec2-28", type: "p",
        ko: "사토시는 백서에서 해시캐시와 비머니를 모두 인용했다. 그런데 호주 사기꾼 크레이그 라이트의 재판을 위해 백 씨가 제출한 이메일에 따르면, 사토시가 해시캐시 논문 인용이 정확한지 확인하기 위해 백 씨에게 연락했던 2008년 8월 당시 사토시는 아직 비머니를 모르고 있었던 것처럼 보였다.",
        en: "Satoshi had cited both Hashcash and b-money in his white paper. But the emails Mr. Back produced for the trial of Craig Wright, the Australian impostor, made it seem like Satoshi wasn’t yet aware of b-money as of August 2008."
      },
      {
        id: "sec2-29", type: "p",
        ko: "이메일은 백 씨가 다이 씨의 웹사이트를 알려준 후에야 사토시가 백서에 비머니 인용을 추가했음을 시사했다. 하지만 앞뒤가 맞지 않았다. 백 씨의 해시캐시 논문은 해시캐시의 응용 분야로 비머니를 구체적으로 논의했다.",
        en: "It was only after Mr. Back referred him to Mr. Dai’s website that Satoshi added the b-money citation to his white paper, the emails suggested. But it didn’t add up to me. Mr. Back’s Hashcash paper specifically discussed b-money as an application for Hashcash."
      },
      {
        id: "sec2-30", type: "p",
        ko: "Presuming Satoshi read the paper he was planning to cite, he would have had to know about b-money. Mr. Back acknowledged this contradiction in 2020. After he suggested on X that Satoshi might be an anonymous Cypherpunk, another user questioned his theory.",
        en: "Presuming Satoshi read the paper he was planning to cite, he would have had to know about b-money. Mr. Back acknowledged this contradiction in 2020. After he suggested on X that Satoshi might be an anonymous Cypherpunk, another user questioned his theory."
      },
      {
        id: "sec2-31", type: "p",
        ko: "The anonymous Cypherpunk had mentioned b-money, but Satoshi had only learned about b-money many years later, from Mr. Back. Yes, Mr. Back responded, but Satoshi could have lied to him and pretended not to know about b-money.",
        en: "The anonymous Cypherpunk had mentioned b-money, but Satoshi had only learned about b-money many years later, from Mr. Back. Yes, Mr. Back responded, but Satoshi could have lied to him and pretended not to know about b-money."
      },
      {
        id: "sec2-32", type: "p",
        ko: "“if Satoshi knew some very obscure citation maybe he would not cite it to avoid triangulation?” he wrote. Someone like Mr. Back, who was one of only six named users to have discussed b-money on the mailing lists, might especially want to avoid this sort of triangulation.",
        en: "“if Satoshi knew some very obscure citation maybe he would not cite it to avoid triangulation?” he wrote. Someone like Mr. Back, who was one of only six named users to have discussed b-money on the mailing lists, might especially want to avoid this sort of triangulation."
      },
      {
        id: "sec2-33", type: "p",
        ko: "생각할수록, 백 씨가 자신으로부터 의심을 돌리기 위해 정교한 속임수로 사토시 이메일을 스스로에게 써서 보냈을 것이라는 의심이 짙어졌다. 그래서 백 씨에게 이메일의 메타데이터를 요청하기로 했다.",
        en: "The more I had mulled it over, the more suspicious I had become that Mr. Back had written the Satoshi emails to himself in an elaborate ruse to divert suspicion away from himself. So I decided to ask Mr. Back for the emails’ metadata."
      },
      {
        id: "sec2-34", type: "p",
        ko: "Metadata is to an email what an envelope, postmark and seal are to a physical letter. They show where an email came from, when it was sent and whether it has been tampered with. The copies of the Satoshi emails disclosed in Wright’s trial didn’t include that information.",
        en: "Metadata is to an email what an envelope, postmark and seal are to a physical letter. They show where an email came from, when it was sent and whether it has been tampered with. The copies of the Satoshi emails disclosed in Wright’s trial didn’t include that information."
      },
      {
        id: "sec2-35", type: "p",
        ko: "Presuming Satoshi used an anonymous email service registered in Tokyo, his IP address would have been masked. Moreover, he likely accessed the service via Tor. Still, I wanted to see if there might be some kind of clue. But when I emailed Mr. Back my request, he did not reply.",
        en: "Presuming Satoshi used an anonymous email service registered in Tokyo, his IP address would have been masked. Moreover, he likely accessed the service via Tor. Still, I wanted to see if there might be some kind of clue. But when I emailed Mr. Back my request, he did not reply."
      },
      {
        id: "sec2-36", type: "p",
        ko: "I wasn’t sure if he was ghosting me or just busy. Not wanting to startle him by following up right away, I waited eight days and then emailed him again. Again, radio silence. I had clearly touched a nerve. Why? Short of an error, did Satoshi have anything to hide?",
        en: "I wasn’t sure if he was ghosting me or just busy. Not wanting to startle him by following up right away, I waited eight days and then emailed him again. Again, radio silence. I had clearly touched a nerve. Why? Short of an error, did Satoshi have anything to hide?"
      },
      { id: "h3-10", type: "h3", ko: "사토시가 나타나고, 백 씨는 사라지다", en: "Satoshi Appears, Mr. Back Disappears" },
      {
        id: "sec2-37", type: "p",
        ko: "After unveiling Bitcoin on Halloween 2008, Satoshi spent the next two and a half years improving it with the help of a small, early band of enthusiasts. Satoshi interacted closely with this group, via Bitcointalk and email.",
        en: "After unveiling Bitcoin on Halloween 2008, Satoshi spent the next two and a half years improving it with the help of a small, early band of enthusiasts. Satoshi interacted closely with this group, via Bitcointalk and email."
      },
      {
        id: "sec2-38", type: "p",
        ko: "Then, famously, he disappeared on April 26, 2011. Mr. Back, it turned out, followed that same pattern — but in reverse. For more than a decade, whenever electronic money was discussed on the Cypherpunks or the Cryptography list, Mr. Back had almost always chimed in.",
        en: "Then, famously, he disappeared on April 26, 2011. Mr. Back, it turned out, followed that same pattern — but in reverse. For more than a decade, whenever electronic money was discussed on the Cypherpunks or the Cryptography list, Mr. Back had almost always chimed in."
      },
      {
        id: "sec2-39", type: "p",
        ko: "But when Bitcoin arrived, Mr. Back was nowhere to be found. Years later, in December 2013, he gave a very different version of events on the “Let’s Talk Bitcoin” podcast. Mr. Back told its host that he had been “very interested technically” in Satoshi’s invention and had “participated” in the discussion it sparked.",
        en: "But when Bitcoin arrived, Mr. Back was nowhere to be found. Years later, in December 2013, he gave a very different version of events on the “Let’s Talk Bitcoin” podcast. Mr. Back told its host that he had been “very interested technically” in Satoshi’s invention and had “participated” in the discussion it sparked."
      },
      {
        id: "sec2-40", type: "p",
        ko: "I combed through the list for any trace of such participation in the fall of 2008 and the winter of 2009 and found no evidence of it. In fact, Mr. Back continued to ignore Bitcoin entirely until June 2011, when he made his first public comment about it.",
        en: "I combed through the list for any trace of such participation in the fall of 2008 and the winter of 2009 and found no evidence of it. In fact, Mr. Back continued to ignore Bitcoin entirely until June 2011, when he made his first public comment about it."
      },
      {
        id: "sec2-41", type: "p",
        ko: "That was six weeks after Satoshi vanished. An ardent electronic cash proponent who had come up with many of the same ideas as those in Bitcoin had shown little, if any, interest in it for several years.",
        en: "That was six weeks after Satoshi vanished. An ardent electronic cash proponent who had come up with many of the same ideas as those in Bitcoin had shown little, if any, interest in it for several years."
      },
      {
        id: "sec2-42", type: "p",
        ko: "But when he finally did get fully involved, it coincided with a new development that was sure to get Satoshi’s attention. On April 17, 2013, Sergio Demian Lerner published a blog item revealing Satoshi’s fortune.",
        en: "But when he finally did get fully involved, it coincided with a new development that was sure to get Satoshi’s attention. On April 17, 2013, Sergio Demian Lerner published a blog item revealing Satoshi’s fortune."
      },
      {
        id: "sec2-43", type: "p",
        ko: "That very day, Mr. Back joined Bitcointalk. After Mr. Lerner published a follow-up blog post a week later, Mr. Back wrote in the comments section: “I suppose if it seems to you that you’re getting too close you might want to stop in Nakamoto’s interests…”",
        en: "That very day, Mr. Back joined Bitcointalk. After Mr. Lerner published a follow-up blog post a week later, Mr. Back wrote in the comments section: “I suppose if it seems to you that you’re getting too close you might want to stop in Nakamoto’s interests…”"
      },
      { id: "h3-11", type: "h3", ko: "갑작스러운 올인", en: "Suddenly All In" },
      {
        id: "sec2-44", type: "p",
        ko: "Suddenly, Mr. Back was all in. Within hours of introducing himself on Bitcointalk, he was proposing complicated system improvements. Within two weeks, he was demanding that Wikipedia restore its stand-alone Satoshi Nakamoto page.",
        en: "Suddenly, Mr. Back was all in. Within hours of introducing himself on Bitcointalk, he was proposing complicated system improvements. Within two weeks, he was demanding that Wikipedia restore its stand-alone Satoshi Nakamoto page."
      },
      {
        id: "sec2-45", type: "p",
        ko: "And within 18 months, he had founded a start-up called Blockstream. To staff Blockstream, he poached the top Bitcoin Core developers from their day jobs at companies like Google and Mozilla, giving him tremendous sway over the digital currency.",
        en: "And within 18 months, he had founded a start-up called Blockstream. To staff Blockstream, he poached the top Bitcoin Core developers from their day jobs at companies like Google and Mozilla, giving him tremendous sway over the digital currency."
      },
      {
        id: "sec2-46", type: "p",
        ko: "He also became very wealthy: Over the next dozen years, Blockstream and its affiliates would raise $1 billion in funding and Blockstream would reach a valuation of $3.2 billion.",
        en: "He also became very wealthy: Over the next dozen years, Blockstream and its affiliates would raise $1 billion in funding and Blockstream would reach a valuation of $3.2 billion."
      },
      {
        id: "sec2-47", type: "p",
        ko: "All this seemed consistent with how Satoshi might behave if he had decided to re-emerge under his own name and seize control of his creation. In the fall of 2014, Mr. Back and his Blockstream colleagues published a white paper about an innovation called “pegged sidechains.”",
        en: "All this seemed consistent with how Satoshi might behave if he had decided to re-emerge under his own name and seize control of his creation. In the fall of 2014, Mr. Back and his Blockstream colleagues published a white paper about an innovation called “pegged sidechains.”"
      },
      {
        id: "sec2-48", type: "p",
        ko: "The paper, of which Mr. Back was lead author, mentioned DigiCash. Founded in the late 1980s by David Chaum, DigiCash created a pioneering electronic currency that relied on a central server its company owned and operated.",
        en: "The paper, of which Mr. Back was lead author, mentioned DigiCash. Founded in the late 1980s by David Chaum, DigiCash created a pioneering electronic currency that relied on a central server its company owned and operated."
      },
      {
        id: "sec2-49", type: "p",
        ko: "DigiCash went bankrupt in 1998 and its currency died with it. “The requirement for a central server became the Achilles’ heel of” DigiCash, the paper’s introduction said. That was exactly how Satoshi had described DigiCash’s failings five years earlier.",
        en: "DigiCash went bankrupt in 1998 and its currency died with it. “The requirement for a central server became the Achilles’ heel of” DigiCash, the paper’s introduction said. That was exactly how Satoshi had described DigiCash’s failings five years earlier."
      },
      {
        id: "sec2-50", type: "p",
        ko: "“Of course, the biggest difference is the lack of a central server. That was the Achilles heel of Chaumian systems,” Satoshi wrote. The following year, 2015, the Bitcoin community was torn apart by a proposal to enlarge its block size.",
        en: "“Of course, the biggest difference is the lack of a central server. That was the Achilles heel of Chaumian systems,” Satoshi wrote. The following year, 2015, the Bitcoin community was torn apart by a proposal to enlarge its block size."
      },
      {
        id: "sec2-51", type: "p",
        ko: "A faction led by developers Mike Hearn and Gavin Andresen wanted much larger blocks to process more transactions. But this was controversial. Larger blocks meant users who run Bitcoin nodes would need fast internet connections and powerful hardware.",
        en: "A faction led by developers Mike Hearn and Gavin Andresen wanted much larger blocks to process more transactions. But this was controversial. Larger blocks meant users who run Bitcoin nodes would need fast internet connections and powerful hardware."
      },
      {
        id: "sec2-52", type: "p",
        ko: "If node running became too expensive, users would turn them off and the network would end up in the hands of a few large data centers. They could then collude to seize control of the network, compromising its security. Mr. Back was vociferously opposed to enlarging the blocks.",
        en: "If node running became too expensive, users would turn them off and the network would end up in the hands of a few large data centers. They could then collude to seize control of the network, compromising its security. Mr. Back was vociferously opposed to enlarging the blocks."
      },
      {
        id: "sec2-53", type: "p",
        ko: "He posted message after message to the Bitcoin-dev list warning against Andresen and Hearn’s proposal in increasingly strident tones. Then, out of the blue, Satoshi appeared on the list with an email that neatly dovetailed with Mr. Back’s position.",
        en: "He posted message after message to the Bitcoin-dev list warning against Andresen and Hearn’s proposal in increasingly strident tones. Then, out of the blue, Satoshi appeared on the list with an email that neatly dovetailed with Mr. Back’s position."
      },
      {
        id: "sec2-54", type: "p",
        ko: "It was the first time Satoshi had been heard from in more than four years. Many in the Bitcoin community questioned the new email’s authenticity. But Mr. Back argued that the email sounded real.",
        en: "It was the first time Satoshi had been heard from in more than four years. Many in the Bitcoin community questioned the new email’s authenticity. But Mr. Back argued that the email sounded real."
      },
      {
        id: "sec2-55", type: "p",
        ko: "In a series of tweets, he called Satoshi’s observations “spot on” and took to quoting from the email. The Satoshi email sounded a lot like Mr. Back had in his posts during the preceding weeks.",
        en: "In a series of tweets, he called Satoshi’s observations “spot on” and took to quoting from the email. The Satoshi email sounded a lot like Mr. Back had in his posts during the preceding weeks."
      },
      {
        id: "sec2-56", type: "p",
        ko: "Like Mr. Back, Satoshi called the big block proposal very “dangerous” — the same term Mr. Back had used repeatedly. He also used other words and phrases Mr. Back had used: “widespread consensus,” “consensus rules,” “technical,” “trivial” and “robust.”",
        en: "Like Mr. Back, Satoshi called the big block proposal very “dangerous” — the same term Mr. Back had used repeatedly. He also used other words and phrases Mr. Back had used: “widespread consensus,” “consensus rules,” “technical,” “trivial” and “robust.”"
      },
      {
        id: "sec2-57", type: "p",
        ko: "At the end of the email, Satoshi blasted Hearn and Andresen as two reckless developers trying to hijack Bitcoin with populist tactics, adding: “It is very disappointing to see this unfold.” Four days later, Mr. Back wrote: “Gavin and Mike, so disappointing.”",
        en: "At the end of the email, Satoshi blasted Hearn and Andresen as two reckless developers trying to hijack Bitcoin with populist tactics, adding: “It is very disappointing to see this unfold.” Four days later, Mr. Back wrote: “Gavin and Mike, so disappointing.”"
      },
      { id: "h2-3", type: "h2", ko: "III. 포위망을 좁히며", en: "III. Closing In" },
      { id: "h3-12", type: "h3", ko: "대안 이론들", en: "Alternative Theories" },
      {
        id: "sec3-1", type: "p",
        ko: "나는 내 가설을 검증해볼 필요가 있었다. 밤늦게 침대에 누워서, 혹은 아침에 샤워를 하면서 내가 틀렸을 이유들을 생각해봤다.",
        en: "I needed to stress test my theory. Late at night in bed or in the shower first thing in the morning, I tried to think of reasons I might be wrong."
      },
      {
        id: "sec3-2", type: "p",
        ko: "One argument I’d read in wallace’s book “The Mysterious Mr. Nakamoto” was that Mr. Back was a privacy absolutist and Bitcoin’s privacy features were weak. That had seemed plausible initially.",
        en: "One argument I’d read in wallace’s book “The Mysterious Mr. Nakamoto” was that Mr. Back was a privacy absolutist and Bitcoin’s privacy features were weak. That had seemed plausible initially."
      },
      {
        id: "sec3-3", type: "p",
        ko: "But rather than write Bitcoin off like other privacy-oriented Cypherpunks, Mr. Back had spent the past decade at Blockstream pioneering innovations to strengthen Bitcoin’s privacy. That weakened the argument considerably.",
        en: "But rather than write Bitcoin off like other privacy-oriented Cypherpunks, Mr. Back had spent the past decade at Blockstream pioneering innovations to strengthen Bitcoin’s privacy. That weakened the argument considerably."
      },
      {
        id: "sec3-4", type: "p",
        ko: "On X, Mr. Back has cited another argument for why he can’t be Satoshi: He asked too many dumb questions on the #bitcoin-wizards channel when he first joined the community. I read through the channel’s logs and saw little evidence of a clueless beginner.",
        en: "On X, Mr. Back has cited another argument for why he can’t be Satoshi: He asked too many dumb questions on the #bitcoin-wizards channel when he first joined the community. I read through the channel’s logs and saw little evidence of a clueless beginner."
      },
      {
        id: "sec3-5", type: "p",
        ko: "On the contrary, I was struck by how precisely he reacted to Bitcoin’s vulnerabilities and how focused he was on hardening the system within weeks of joining. Some of his ideas were so sophisticated that other wizards struggled to keep up.",
        en: "On the contrary, I was struck by how precisely he reacted to Bitcoin’s vulnerabilities and how focused he was on hardening the system within weeks of joining. Some of his ideas were so sophisticated that other wizards struggled to keep up."
      },
      {
        id: "sec3-6", type: "p",
        ko: "I was also struck by his vitriolic dismissal of other cryptocurrencies and his statement that he wanted to kill them all one day. What about other leading Satoshi suspects? Was there anyone else who fit the profile better than Mr. Back?",
        en: "I was also struck by his vitriolic dismissal of other cryptocurrencies and his statement that he wanted to kill them all one day. What about other leading Satoshi suspects? Was there anyone else who fit the profile better than Mr. Back?"
      },
      {
        id: "sec3-7", type: "p",
        ko: "A 2015 article in this newspaper put forward the thesis that Satoshi was Nick Szabo, a computer scientist who in 1998 had proposed a Bitcoin-like concept called “bit gold.”",
        en: "A 2015 article in this newspaper put forward the thesis that Satoshi was Nick Szabo, a computer scientist who in 1998 had proposed a Bitcoin-like concept called “bit gold.”"
      },
      {
        id: "sec3-8", type: "p",
        ko: "Mr. Szabo remained at the top of many people’s lists until recently, but a heated debate on X exposed his ignorance of basic technical aspects of Bitcoin. Hal Finney and Len Sassaman were two other oft-cited suspects.",
        en: "Mr. Szabo remained at the top of many people’s lists until recently, but a heated debate on X exposed his ignorance of basic technical aspects of Bitcoin. Hal Finney and Len Sassaman were two other oft-cited suspects."
      },
      {
        id: "sec3-9", type: "p",
        ko: "One problem with the Finney hypothesis was that he was photographed running a 10-mile race in April 2009 at the same time as Satoshi was sending emails and bitcoins to someone else. A bigger problem was that both were dead when Satoshi made his final appearance in 2015.",
        en: "One problem with the Finney hypothesis was that he was photographed running a 10-mile race in April 2009 at the same time as Satoshi was sending emails and bitcoins to someone else. A bigger problem was that both were dead when Satoshi made his final appearance in 2015."
      },
      {
        id: "sec3-10", type: "p",
        ko: "Finney died of A.L.S. in 2014 and Sassaman took his own life in 2011. As for HBO’s pick, Peter Todd, the crux of the documentary’s evidence was a 2010 Bitcointalk thread in which Mr. Todd corrected Satoshi on a technical point.",
        en: "Finney died of A.L.S. in 2014 and Sassaman took his own life in 2011. As for HBO’s pick, Peter Todd, the crux of the documentary’s evidence was a 2010 Bitcointalk thread in which Mr. Todd corrected Satoshi on a technical point."
      },
      {
        id: "sec3-11", type: "p",
        ko: "The documentary speculated that Mr. Todd’s post was actually Satoshi finishing his thought. This required us to believe that Satoshi had made the most basic blunder imaginable: accidentally logging in under his real name.",
        en: "The documentary speculated that Mr. Todd’s post was actually Satoshi finishing his thought. This required us to believe that Satoshi had made the most basic blunder imaginable: accidentally logging in under his real name."
      },
      {
        id: "sec3-12", type: "p",
        ko: "There was also the fact that Mr. Todd would have been just 23 when the Bitcoin white paper was published. That’s young to solve a problem that much older, more experienced cryptographers hadn’t been able to crack.",
        en: "There was also the fact that Mr. Todd would have been just 23 when the Bitcoin white paper was published. That’s young to solve a problem that much older, more experienced cryptographers hadn’t been able to crack."
      },
      {
        id: "sec3-13", type: "p",
        ko: "Moreover, after the documentary aired, Mr. Todd produced photos for Wired magazine that showed him skiing or cave-exploring on the days and at the times Satoshi was posting to Bitcointalk.",
        en: "Moreover, after the documentary aired, Mr. Todd produced photos for Wired magazine that showed him skiing or cave-exploring on the days and at the times Satoshi was posting to Bitcointalk."
      },
      {
        id: "sec3-14", type: "p",
        ko: "Some have speculated that Bitcoin wasn’t created by one person but by a group. I didn’t buy that theory, either. The more people who share a secret, the more likely it is to leak. Satoshi’s secret had remained airtight for 17 years.",
        en: "Some have speculated that Bitcoin wasn’t created by one person but by a group. I didn’t buy that theory, either. The more people who share a secret, the more likely it is to leak. Satoshi’s secret had remained airtight for 17 years."
      },
      { id: "h3-13", type: "h3", ko: "“글보다는 코드를 다루는 데 더 능숙하다”", en: "‘Better With Code Than With Words’" },
      {
        id: "sec3-15", type: "p",
        ko: "백 씨는 여전히 내게 가장 유력한 후보였다. 하지만 이제는 그것만으로는 부족하다는 느낌이 들었다. 더 법의학적인 증거를 찾아 나섰다. 어느 날 사이퍼펑크 아카이브를 뒤지다가 의자에서 벌떡 일어날 뻔할 만큼 놀라운 유사점을 발견했다.",
        en: "Mr. Back still stood out to me as the likeliest candidate. But I felt I needed more than that. I went searching for more forensic evidence. Browsing the Cypherpunks archive one day, I noticed a resemblance that made me nearly jump out of my chair."
      },
      {
        id: "sec3-16", type: "p",
        ko: "When Satoshi told Mr. Finney that Libertarians would find Bitcoin alluring “if we can explain it properly,” he added:",
        en: "When Satoshi told Mr. Finney that Libertarians would find Bitcoin alluring “if we can explain it properly,” he added:"
      },
      {
        id: "email-9", type: "email", from: "Satoshi Nakamoto", date: "Fri Nov 14 13:55:35 EST 2008",
        ko: "저는 글보다는 코드를 다루는 데 더 능숙하지만요.",
        en: "I'm better with code than with words though."
      },
      {
        id: "sec3-17", type: "p",
        ko: "Mr. Back had expressed exactly the same sentiment in similar language while debating anonymity and free speech with another Cypherpunk.",
        en: "Mr. Back had expressed exactly the same sentiment in similar language while debating anonymity and free speech with another Cypherpunk."
      },
      {
        id: "email-10", type: "email", from: "Adam Back <aba@dcs.ex.ac.uk>", date: "Fri, 6 Sep 1996 06:34:59 +0800", to: "mech@eff.org",
        ko: "Personally I think I'm better at coding, than constructing convincing arguments.",
        en: "Personally I think I'm better at coding, than constructing convincing arguments."
      },
      {
        id: "sec3-18", type: "p",

        en: "He had tried to identify Satoshi for Wallace’s book and failed. Thinking he might have missed something, I asked Mr. Cafiero to try again. Mr. Back was one of the suspects Mr. Cafiero had reviewed initially. But analysis was hampered because most of Mr. Back’s papers were co-written."

      {

        ko: "After eight months of reporting and more hours than I could count obsessing over Satoshi’s identity, I thought I was on the verge of solving the mystery. But now it seemed out of reach again.",

      { id: "h3-14", type: "h3", ko: "맞춤법과 문법", en: "Spelling and Grammar" },
      {
        id: "sec3-28", type: "p",
        ko: "For all the disappointment, I had a pretty good idea what the problem was. Mr. Cafiero had told me several times that it was easy for Satoshi to protect himself by changing his prose style if he was aware of the principles of stylometry.",
        en: "For all the disappointment, I had a pretty good idea what the problem was. Mr. Cafiero had told me several times that it was easy for Satoshi to protect himself by changing his prose style if he was aware of the principles of stylometry."
      },
      {
        id: "sec3-29", type: "p",
        ko: "In a 2020 tweet, Mr. Back described Satoshi’s writing as “laconic and focused” and surmised that he had “minimized emotional rhetoric, unnecessary adjectives or off-topic yakking to reduce stylometry risk.” Satoshi and Mr. Back were clearly aware of stylometry.",
        en: "In a 2020 tweet, Mr. Back described Satoshi’s writing as “laconic and focused” and surmised that he had “minimized emotional rhetoric, unnecessary adjectives or off-topic yakking to reduce stylometry risk.” Satoshi and Mr. Back were clearly aware of stylometry."
      },
      {

      {
        id: "sec3-31", type: "p",
