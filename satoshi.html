        en: "He proposed developing a multiple-choice sentence generator where writers pick nouns, verbs and adjectives from pull-down menus so that their personal traits remain hidden. With that in mind, I tried a different approach focused on spelling and grammar."
      },
      {
        id: "sec3-32", type: "p",
        ko: "Mr. Back made a lot of typos and had a rambling style, while Satoshi’s writing was crisp and mostly typo-free. But after reading every known Satoshi text and combing through more than 1,000 of Mr. Back’s posts, I had detected some writing tics they shared.",
        en: "Mr. Back made a lot of typos and had a rambling style, while Satoshi’s writing was crisp and mostly typo-free. But after reading every known Satoshi text and combing through more than 1,000 of Mr. Back’s posts, I had detected some writing tics they shared."
      },
      {
        id: "sec3-33", type: "p",
        ko: "Mr. Back often confused “it’s” and “its,” and he had a habit of putting “also” at the end of sentences. There were five instances of each in Satoshi’s writing. Both also seemed pathologically incapable of using hyphens correctly.",
        en: "Mr. Back often confused “it’s” and its,” and he had a habit of putting “also” at the end of sentences. There were five instances of each in Satoshi’s writing. Both also seemed pathologically incapable of using hyphens correctly."
      },
      {
        id: "sec3-34", type: "p",
        ko: "Like Mr. Back, Satoshi tended to add hyphens when they were unnecessary and to omit them when they were needed. For example, he wrote “double-spending” with a hyphen but the compound adjectives “hand tuned,” “full blown,” “would be” and “file sharing” without hyphens.",
        en: "Like Mr. Back, Satoshi tended to add hyphens when they were unnecessary and to omit them when they were needed. For example, he wrote “double-spending” with a hyphen but the compound adjectives “hand tuned,” “full blown,” “would be” and “file sharing” without hyphens."
      },
      {

        en: "Satoshi and Mr. Back both tended to write compound adjectives in which a noun is combined with “based” without a hyphen, as in this Satoshi quote: “In the mint based model, the mint was aware of all transactions and decided which arrived first.”"
      },
      {

        en: "Both alternated between hyphenating and not hyphenating certain words and expressions. For example, they used “e-mail” and “email,” “built-in” and “built in,” “off-line” and “offline,” “pre-compiled” and “precompiled,” and “to-do list” and “to do list.”"

      },
      {
        id: "sec3-38", type: "p",
        ko: "And both wrote “backup” and “bugfix” as one word (the former when used as a verb) while spelling “half way” and “down side” as two words. Robert Leonard, an expert in forensic linguistics, told me these were precisely the types of traits he looks for.",
        en: "And both wrote “backup” and “bugfix” as one word (the former when used as a verb) while spelling “half way” and “down side” as two words. Robert Leonard, an expert in forensic linguistics, told me these were precisely the types of traits he looks for."
      },
      {
        id: "sec3-39", type: "p",
        ko: "He called them “markers of sociolinguistic variation,” prose fingerprints that help pinpoint a writer’s social background, geographical origin and professional training. Prose markers that are common to only a few people or unique to a writer are the most revealing.",
        en: "He called them “markers of sociolinguistic variation,” prose fingerprints that help pinpoint a writer’s social background, geographical origin and professional training. Prose markers that are common to only a few people or unique to a writer are the most revealing."
      },
      {
        id: "sec3-40", type: "p",

        en: "I had found at least three such markers in Satoshi’s writing. The first two were cryptographic concepts Satoshi spelled in a particular way. One was “proof of work,” a term two cryptographers coined in a 1999 paper to describe puzzle-solving protocols like Hashcash."
      },
      {
        id: "sec3-41", type: "p",
        ko: "Proper grammar dictated that they not use a hyphen, and they didn’t. Satoshi, however, repeatedly wrote “proof-of-work” with hyphens. Until that point, only eight people had ever hyphenated it on the Cypherpunks or Cryptography mailing lists.",
        en: "Proper grammar dictated that they not use a hyphen, and they didn’t. Satoshi, however, repeatedly wrote “proof-of-work” with hyphens. Until that point, only eight people had ever hyphenated it on the Cypherpunks or Cryptography mailing lists."

      {

        en: "I found only two: Mr. Finney and Mr. Back. But there was a key difference. Mr. Finney spelled “preimage” as one word, while Mr. Back, like Satoshi, tended to hyphenate it. The third marker I zeroed in on was the phrase “burning the money.”"

      },
      { id: "h3-15", type: "h3", ko: "34,000명에서 단 한 명으로", en: "From 34,000 Down to One" },
      {
        id: "sec3-46", type: "p",
        ko: "I wanted to find a more systematic way to analyze Satoshi’s writing. I asked for help from Dylan Freedman, a reporter on the New York Times’s artificial-intelligence team who had experience in computer text analysis.",
        en: "I wanted to find a more systematic way to analyze Satoshi’s writing. I asked for help from Dylan Freedman, a reporter on the New York Times’s artificial-intelligence team who had experience in computer text analysis."
      },
      {
        id: "sec3-47", type: "p",
        ko: "My conviction was that Satoshi was part of the cryptographic community that had gathered on the Cypherpunks, Cryptography and Hashcash mailing lists. We collected archives of all three lists and merged them into one huge, searchable database.",
        en: "My conviction was that Satoshi was part of the cryptographic community that had gathered on the Cypherpunks, Cryptography and Hashcash mailing lists. We collected archives of all three lists and merged them into one huge, searchable database."
      },
      {

        en: "Between 1992 and Oct. 30, 2008, the day before Satoshi first appeared, more than 34,000 users had posted to the three lists. We eliminated anyone with fewer than 10 posts. That left a field of 1,615 candidates."

      },
      {
        id: "sec3-51", type: "p",
        ko: "Mr. Back came out on top, sharing 521 non-synonymous words with Satoshi. Several other Cypherpunks followed closely, but they had all written much more than Mr. Back, making his presence even more pronounced.",
        en: "Mr. Back came out on top, sharing 521 non-synonymous words with Satoshi. Several other Cypherpunks followed closely, but they had all written much more than Mr. Back, making his presence even more pronounced."
      },
      {
        id: "sec3-52", type: "p",
        ko: "To get closer to a definitive answer, I devised two additional analyses. The first focused on Satoshi’s hyphenation grammar errors. We used the New York Times stylebook as the standard for correct hyphenation and trained an A.I. model on its hyphenation section.",
        en: "To get closer to a definitive answer, I devised two additional analyses. The first focused on Satoshi’s hyphenation grammar errors. We used the New York Times stylebook as the standard for correct hyphenation and trained an A.I. model on its hyphenation section."

        en: "We then used the A.I. to scan Satoshi’s corpus. It found 325 clear errors. When compared against the posts of the hundreds of suspects, Mr. Back was a massive outlier. He had made 67 of the exact same hyphenation errors as Satoshi. The next closest match had 38."
      },
      {
        id: "sec3-54", type: "p",
        ko: "Returning to the pool of 620 suspects, we looked at how many shared the other writing tics I’d identified in Satoshi’s prose. First, we filtered for posters who, like Satoshi, occasionally used two spaces between sentences. Fifty-eight posters were eliminated, leaving 562.",

        en: "Next, we screened for posters who used British spellings, narrowing the list to 434. We then filtered for posters who confused “it’s” and “its.” That reduced the field to 114. Screening for posters who sometimes ended sentences with “also” reduced it to 56."

        en: "We then asked our database: How many of those remaining eight suspects alternated between using “e-mail” and “email,” “e-cash” and “electronic cash,” “cheque” and “check” and the British and American forms of the word “optimize” like Satoshi did? The answer was just one: Mr. Back."
      },
      { id: "h2-4", type: "h2", ko: "IV. 대면", en: "IV. Confrontation" },
      { id: "h3-16", type: "h3", ko: "엘살바도르", en: "El Salvador" },
      {
        id: "sec4-1", type: "p",

      {

      {

      {

      },
      {

      {

      {

    const meta = {
      ko: { subtitle: "뉴욕타임즈 기술 리포트", title: "사토시 나카모토를 찾아서", author: "By John Carreyrou (With Dylan Freedman)" },
      en: { subtitle: "THE NEW YORK TIMES TECHNOLOGY REPORT", title: "Finding Satoshi Nakamoto", author: "By John Carreyrou (With Dylan Freedman)" }
    };

    function render(lang) {
      // Header
      document.getElementById('article-header').innerHTML = `
        <div class="meta">${meta[lang].subtitle}</div>
        <h1>${meta[lang].title}</h1>
        <div class="meta" style="margin-top:20px;">${meta[lang].author}</div>
      `;

      // Body
      let html = '';
      bodyContent.forEach(item => {
        const idAttr = `data-id="${item.id}"`;
        const text = item[lang] || "";

        if (item.type === 'p') html += `<p ${idAttr} class="${item.dropCap ? 'drop-cap' : ''}">${text}</p>`;
        else if (item.type === 'h2') html += `<h2 ${idAttr}>${text}</h2>`;
        else if (item.type === 'h3') html += `<h3 ${idAttr}>${text}</h3>`;
        else if (item.type === 'email') {
          html += `<div ${idAttr} class="email-block"><div class="email-header">`;
          if (item.from) html += `<div><b>From:</b> ${item.from}</div>`;
          if (item.to) html += `<div><b>To:</b> ${item.to}</div>`;
          if (item.date) html += `<div><b>Date:</b> ${item.date}</div>`;
          html += `</div><div>${text}</div></div>`;
        }
        else if (item.type === 'img') {
          html += `<figure ${idAttr}><img src="${item.src}" alt="Article Image"><figcaption>${text}</figcaption></figure>`;
        }
        else if (item.type === 'takeaways') {
          const t = item[lang];
          html += `<div ${idAttr} class="takeaways"><h4>${t.title}</h4><ul>${t.items.map(li => `<li>${li}</li>`).join('')}</ul></div>`;
        }
        else if (item.type === 'profiles') {
          const p = item[lang];
          let profilesHtml = `<h2 ${idAttr}>${p.title}</h2><div class="profiles-grid">`;
          p.list.forEach(card => {
            profilesHtml += `<div class="profile-card"><img src="${card.img}" alt="${card.name}"><b>${card.name}</b><span>${card.desc}</span></div>`;
          });
          profilesHtml += `</div>`;
          html += profilesHtml;
        }
      });
      document.getElementById('article-content').innerHTML = html;
    }

    function setLang(lang) {
      // 1. 타겟팅 지점 결정: 화면 상단에서 30% 지점 (가장 자연스러운 시선 위치)
      const targetPoint = window.innerHeight * 0.3;
      const elements = document.querySelectorAll('#article-content > *');
      let nearestId = null;
      let minDistance = Infinity;

      elements.forEach(el => {
        const rect = el.getBoundingClientRect();
        const distance = Math.abs(rect.top - targetPoint);
        if (distance < minDistance) {
          minDistance = distance;
          nearestId = el.getAttribute('data-id');
        }
      });

      // 2. 언어 전환
      document.body.className = 'lang-' + lang;
      document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      render(lang);
      localStorage.setItem('satoshi-lang', lang);
      
      // 3. 정밀 스크롤 복구
      if (nearestId) {
        // 즉시 위치를 잡기 위해 중첩 requestAnimationFrame 사용
        requestAnimationFrame(() => {
          const targetEl = document.querySelector(`[data-id="${nearestId}"]`);
          if (targetEl) {
            const bodyRect = document.body.getBoundingClientRect().top;
            const elementRect = targetEl.getBoundingClientRect().top;
            const offsetPosition = (elementRect - bodyRect) - targetPoint;

            window.scrollTo({ top: offsetPosition, behavior: 'instant' });
            
            // 폰트 렌더링 등으로 인한 미세 오차 2차 보정
            setTimeout(() => {
              const reElementRect = targetEl.getBoundingClientRect().top;
              const reOffsetPosition = (reElementRect - bodyRect) - targetPoint;
              window.scrollTo({ top: reOffsetPosition, behavior: 'instant' });
            }, 50);
          }
        });
      }
    }

    setLang(localStorage.getItem('satoshi-lang') || 'ko');
