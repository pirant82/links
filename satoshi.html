<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satoshi: The Cypherpunk Legacy</title>
  <style>
    :root {
      --green:       #2D5A27;
      --green-light: #4A7C43;
      --gold:        #8B6914;
      --gold-light:  #C49A1E;
      --orange:      #F7931A;
      --bg:          #FAFAF7;
      --card-bg:     #FFFFFF;
      --text:        #1A1A1A;
      --sub:         #6B7280;
      --border:      #E5E7EB;
      --shadow:      0 2px 8px rgba(0,0,0,.08);
      --font-serif:  'Georgia', 'Times New Roman', serif;
      --font-mono:   'Courier New', Courier, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      overflow-x: hidden;
    }

    .lang-switch {
      position: fixed; top: 20px; right: 20px; z-index: 1000;
      background: rgba(255, 255, 255, 0.9); padding: 5px; border-radius: 30px;
      box-shadow: var(--shadow); display: flex; gap: 5px; border: 1px solid var(--border);
      backdrop-filter: blur(4px);
    }
    .lang-btn {
      padding: 6px 16px; border: none; background: none; cursor: pointer;
      border-radius: 20px; font-size: 0.85rem; font-weight: 600; color: var(--sub);
    }
    .lang-btn.active { background: var(--green); color: white; }

    .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }
    header { padding: 80px 0 60px; text-align: center; border-bottom: 1px solid var(--border); margin-bottom: 60px; }
    header h1 { font-family: var(--font-serif); font-size: 3rem; line-height: 1.1; margin-bottom: 20px; font-weight: 900; letter-spacing: -1px; }
    header .meta { font-size: 0.85rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; }

    .article-body { font-size: 1.15rem; color: #333; }
    .article-body p { margin-bottom: 1.8rem; text-align: justify; }
    .drop-cap::first-letter {
      float: left; font-family: var(--font-serif); font-size: 4.5rem;
      line-height: 0.8; padding-right: 12px; padding-top: 8px; color: var(--green);
    }

    h2 { font-family: var(--font-serif); font-size: 2.2rem; margin: 5rem 0 2rem; border-top: 4px solid var(--text); padding-top: 1.5rem; font-weight: 800; }
    h3 { font-family: var(--font-serif); font-size: 1.6rem; margin: 3rem 0 1.5rem; color: var(--green); border-bottom: 1px solid #eee; padding-bottom: 5px; }

    /* Email UI */
    .email-block {
      background: #f8f9fa; border-left: 4px solid var(--orange); padding: 24px; margin: 3rem 0;
      font-family: var(--font-mono); font-size: 0.95rem; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
    }
    .email-header { border-bottom: 1px solid #eee; margin-bottom: 15px; padding-bottom: 10px; color: #666; }
    .email-header div { margin-bottom: 4px; }
    .email-header b { color: #000; width: 85px; display: inline-block; font-size: 0.8rem; text-transform: uppercase; }

    /* Takeaways Box */
    .takeaways {
      background: #fff; border: 1px solid var(--border); padding: 32px; margin: 4rem 0; border-radius: 4px; border-top: 4px solid var(--orange);
    }
    .takeaways h4 { font-family: var(--font-serif); font-size: 1.4rem; margin-bottom: 20px; }
    .takeaways ul { list-style: none; }
    .takeaways li { margin-bottom: 15px; padding-left: 20px; position: relative; font-size: 1rem; color: #444; }
    .takeaways li::before { content: "•"; color: var(--orange); position: absolute; left: 0; font-weight: bold; }

    /* Figure & Images */
    figure { margin: 4rem -40px; text-align: center; }
    figure img { max-width: 100%; height: auto; border-radius: 2px; box-shadow: var(--shadow); }
    figcaption { padding: 15px 60px; font-size: 0.85rem; color: var(--sub); text-align: left; line-height: 1.5; background: #fff; border-bottom: 1px solid var(--border); }

    /* Profiles */
    .profiles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin: 4rem 0; }
    .profile-card { text-align: center; background: #fff; padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
    .profile-card img { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; filter: grayscale(100%); transition: 0.3s; margin-bottom: 15px; border: 2px solid var(--border); }
    .profile-card:hover img { filter: grayscale(0%); transform: scale(1.05); border-color: var(--green); }
    .profile-card b { display: block; font-size: 1.1rem; margin-bottom: 5px; }
    .profile-card span { font-size: 0.85rem; color: var(--sub); line-height: 1.4; display: block; }

    .back-link { margin: 60px 0; text-align: center; }
    .back-link a { color: var(--green); text-decoration: none; font-weight: 600; border: 1px solid var(--green); padding: 12px 32px; border-radius: 30px; transition: 0.3s; }
    .back-link a:hover { background: var(--green); color: white; }

    @media (max-width: 800px) {
      figure { margin: 3rem -24px; }
      figcaption { padding: 15px 24px; }
      header h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body class="lang-ko">

  <div class="lang-switch">
    <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">KO</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>

  <div class="container">
    <header id="article-header"></header>
    <article class="article-body" id="article-content"></article>
    <div class="back-link">
      <a href="index.html">← Back to Portal</a>
    </div>
  </div>

  <script>
    const content = {
      ko: {
        title: "사토시 나카모토를 찾아서",
        subtitle: "뉴욕타임즈 기술 리포트",
        author: "By John Carreyrou (With Dylan Freedman)",
        body: [
          { type: 'p', text: '2024년 가을 어느 날 저녁, 아내와 나는 롱아일랜드 고속도로에서 교통 체증에 갇혀 있었다. 운전할 때 자주 듣던 재즈 펑크 라디오 방송에 질린 아내가 팟캐스트로 채널을 돌렸다.', dropCap: true },
          { type: 'p', text: '뉴욕타임스의 기술 쇼인 "하드 포크(Hard Fork)"였고, 진행자들은 비트코인의 익명 발명가 사토시 나카모토의 정체를 밝혔다고 주장하는 새로운 HBO 다큐멘터리에 대해 논의하고 있었다.' },
          { type: 'p', text: '나는 즉시 귀를 쫑긋 세웠다. 오랫동안 사토시의 진짜 정체를 우리 시대의 가장 큰 수수께끼 중 하나로 여겨왔고, 전에도 이 문제를 파헤쳐보려 했으나 성공하지 못했다. 2년 전에는 이 주제로 책을 쓰기 위해 몇 달 동안 조사하기도 했다. 하지만 곧 내 능력 밖의 일이라는 것을 깨닫고 마지못해 포기했다.' },
          { type: 'p', text: '금융에 혁명을 일으키고 2조 4천억 달러 규모의 산업을 탄생시켰으며, 단 한 번의 경이로운 천재적 발상으로 세계 최대 재산 중 하나를 축적한 베일에 싸인 그 인물을 마침내 누군가가 찾아냈을지도 모른다는 소식에 나는 감탄과 질투가 뒤섞인 감정을 느꼈다. 다큐멘터리가 너무 보고 싶었다. 그날 밤 집에 도착하자마자 HBO Max 앱에 로그인해 재생 버튼을 눌렀다.' },
          { type: 'p', text: '결국 "머니 일렉트릭: 비트코인 미스터리"의 결론은 설득력이 없었다. HBO는 매우 빈약해 보이는 증거를 바탕으로 캐나다의 한 소프트웨어 개발자를 지목했다. 하지만 암호화폐 세계를 유쾌하게 훑어보는 그 다큐멘터리를 보던 중, 한 장면이 내 눈길을 끌었다.' },
          { type: 'p', text: '영국의 암호학자이자 비트코인 운동의 주요 인물인 아담 백(Adam Back)이 라트비아 리가의 공원 벤치에 갈색 코트를 입고 셔츠를 꺼내 입은 채 앉아 있었다. 제작자는 무심하게 사토시 용의자 여러 명의 이름을 빠르게 읊었다. 자신의 이름이 언급되자 아담 백은 긴장하며 자신이 사토시라는 사실을 강력히 부인했고, 그 대화를 오프더레코드(비보도)로 해달라고 요청했다.' },
          { type: 'p', text: '거짓말쟁이들을 꽤 많이 겪어왔고, 그들의 거짓말 신호(tell)를 읽어내는 데 나름의 전문성을 쌓은 내게 백 씨의 태도—불안하게 흔들리는 눈빛, 어색한 웃음, 왼손의 경련적인 움직임—는 수상쩍게 느껴졌다. 엔딩 크레딧이 올라갈 때 나는 TV에서 그 장면을 여러 번 다시 돌려보았다.' },
          { type: 'img', src: 'docs/satoshi/original/00cypher-bars-02-articleLarge.jpg', cap: '검은 셔츠, 재킷, 바지를 입은 아담 백이 공원의 조각상 기단에 올라서는 모습.' },
          { type: 'img', src: 'docs/satoshi/original/Biz-Cypher-01-vtgp-articleLarge.jpg', cap: '2월 마이애미에서의 영국 암호학자 아담 백. 출처... Amir Hamja / 뉴욕타임스' },
          { type: 'p', text: '백 씨의 반응을 곱씹다가 또 다른 생각이 떠올랐다. 자신이 사토시라고 거짓 주장을 해온 호주의 한 사기꾼이 소송을 당한 적이 있었다. 몇 달 전 런던에서 열렸던 그 민사 재판에서 공개된 증거가 이 미스터리를 푸는 데 도움이 되지 않을까?' },
          { type: 'p', text: '비트코인 지식에 정통한 사람이라면 누구나 알겠지만, 사토시는 인터넷에서 익명성을 유지하는 데 있어 달인이었으며 디지털 발자국을 거의, 혹은 전혀 남기지 않았다.' },
          { type: 'p', text: "하지만 사토시는 자신의 발명품을 개략적으로 설명한 9페이지짜리 백서와, 사용자들이 디지털 통화의 소프트웨어·경제·철학에 대해 논의하기 위해 모인 온라인 게시판 '비트코인톡(Bitcointalk)'의 수많은 게시물 등 방대한 글을 남겼다. 그 글 모음은 앞서 말한 사기꾼의 민사 재판 과정에서 비트코인 초기 시절 사토시와 협력했던 핀란드 프로그래머 마르티 말미(Martti Malmi)가 사토시와 주고받은 수백 통의 이메일을 공개하면서 크게 확장되었다. 사토시가 다른 초기 비트코인 채택자들에게 보낸 이메일이 이전에도 일부 드러난 적은 있었지만, 말미가 공개한 분량에는 비할 바가 못 되었다. 사토시를 찾아낼 수 있다면, 그 열쇠는 이 텍스트 어딘가에 있을 것이라 확신했다." },
          { type: 'p', text: '물론 나보다 먼저 이 길을 걸은 사람들도 있었을 것이다. 언론인, 학자, 인터넷 탐정들이 16년 동안 사토시의 신원을 밝히려 애써왔다. 그 기간 동안 100명이 넘는 이름이 거론되었고, 그 중에는 아일랜드의 암호학 학생, 실직한 일본계 미국인 엔지니어, 남아프리카공화국의 범죄 두목, 심지어 영화 "뷰티풀 마인드"에 묘사된 수학자도 있었다.' },
          { type: 'p', text: '가장 매력적인 가설들은 특정 코드 작성 스타일, 불가사의한 경력, 비트코인 핵심 기술 개념에 대한 전문성, 반정부 세계관 등 사토시에 대해 알려진 단편적인 정보와 일치하는 우연의 일치에 초점을 맞췄다. 하지만 알리바이나 모순된 반증의 무게에 짓눌려 번번이 좌초됐다. 비트코인 커뮤니티의 많은 이들은 이러한 실패를 고소해하며 즐겼다. 그들이 즐겨 지적하듯, 오직 사토시만이 자신의 코인 일부를 이동시킴으로써 신원을 결정적으로 증명할 수 있다. 그 외의 모든 증거는 정황 증거일 뿐이다.' },
          { type: 'p', text: '다른 많은 이들을 혼란에 빠뜨린 사건을 내가 어떻게든 풀 수 있을 거라 생각하는 건 어리석어 보였다. 하지만 나는 크고 도전적인 이야기가 주는 스릴을 갈망했다. 그래서 비트코인의 미스터리한 창시자의 정체를 다시 한 번 파헤쳐 보기로 결심했다.' },
          
          { type: 'h2', text: 'I. 일련의 단서들' },
          { type: 'h3', text: '두 개의 빈약한 단서' },
          { type: 'p', text: '나는 먼저 범위를 좁힐 방법을 찾기 시작했다.' },
          { type: 'p', text: '사토시가 말미에게 보낸 이메일과 그의 다른 글에서 눈에 띄는 점은 그가 영국식 철자 및 관용구와 미국식 표현을 섞어 썼다는 것이다. 사토시 용의자 중 다수가 미국인이기 때문에 일부는 그가 영국식 표현으로 자신의 문체를 위장했다고 추측했다. 하지만 나는 사토시가 남긴 단서 때문에 그 이론을 믿지 않았다.' },
          { type: 'p', text: '비트코인의 첫 번째 거래 블록에 사토시는 신문 헤드라인 문구를 새겨 넣었다: “The Times 03/Jan/2009 Chancellor on brink of second bailout for banks (더 타임스 2009년 1월 3일, 재무장관이 은행에 대한 두 번째 구제금융 직전에 놓이다).” 문제의 헤드라인은 런던 타임스 영국판 종이 신문에 실린 것이었다. 이는 사토시가 실제로 영국인임을 알리는 신호처럼 느껴졌다.' },
          { type: 'p', text: "사토시는 또한 '사이퍼펑크(Cypherpunks)'의 일원이었을 가능성이 매우 높았다. 사이퍼펑크는 1990년대 초 결성된 무정부주의자 그룹으로, 암호화(코드로 통신을 보호하는 기술)를 이용해 정부의 감시와 검열로부터 개인을 해방시키고자 했다. 사이퍼펑크는 주로 인터넷 메일링 리스트를 통해 소통했다. 오늘날 게시판의 조상 격인 메일링 리스트는 구독자의 수신함으로 전달되는, 옛 타자기 서체로 작성된 대규모 단체 이메일이었다. 구성원들은 전체 회신으로 소통했다." },
          { type: 'p', text: '벤모(Venmo)나 애플페이(Apple Pay) 시대에는 상상하기 어렵지만, 사이퍼펑크의 가장 큰 우려 중 하나는 금융 거래의 디지털화였다. 누군가에게 20달러짜리 지폐를 건넬 때 아무도 그 돈의 출처를 모른다. 하지만 수표나 신용카드로 결제하면 은행에 컴퓨터 기록이 남는다. 사이퍼펑크는 정부가 그 기록을 이용해 사람들의 삶을 추적할 것을 우려했다. 그들은 메일링 리스트에서 실물 화폐의 익명성을 보존할 수 있는 디지털 화폐인 “전자 현금(electronic cash)”을 만드는 방법을 놓고 아이디어를 나눴다. 일부는 자체적인 전자 현금 시스템을 고안해내기도 했지만, 비트코인 이전에는 아무것도 주목을 받지 못했다.' },
          { type: 'p', text: '디지털 현금에 대한 공통된 관심 외에도, 사토시가 이 그룹에 속해 있었다는 다른 징후들이 있었다. 그는 사이퍼펑크 메일링 리스트의 분파인 크립토그래피(Cryptography) 리스트에 자신의 백서를 발표했고, 그룹 멤버 중 두 명과 친분이 있는 듯 보였다.' },
          { type: 'p', text: '1990년대 후반 전성기에 사이퍼펑크는 약 2,000명의 구성원을 거느렸으므로, 여전히 후보군은 넓었다.' },
          { type: 'p', text: '이러한 빈약한 단서를 손에 쥔 채, 나는 사토시가 남긴 글들, 특히 말미가 공개한 이메일을 꼼꼼히 읽으며 눈에 띄는 단어와 구절 목록을 만들었다. 마치 낯선 방언을 해독하려는 시도 같았다. 종종 나는 이것이 쓸데없는 짓이 아닌지 의심했다.' },
          { type: 'p', text: '내 목록은 결국 100개가 넘는 단어와 구절로 늘어나 노트 몇 페이지를 채웠다. 눈길을 끈 것 중에는 “dang”, 동사로 쓰인 “backup”(한 단어로), “human friendly”, “on principle”, “burning the money”, “abandonware”, “hand tuned”, “partial pre-image” 등이 있었다.' },
          { type: 'p', text: '한 구절—“a menace to the network(네트워크에 대한 위협)”—은 공상과학 영화의 대사처럼 들렸다. 나머지는 상류층 영국인, 미국의 시골뜨기(redneck), 컴퓨터 괴짜, 암호학자의 기묘한 조합을 암시했다.' },
          { type: 'p', text: '소셜 미디어 플랫폼 X의 고급 검색 기능을 이용해, 사토시로 가장 자주 거론되는 10여 명 중 내가 추려낸 용어들을 사용하는 사람이 있는지 간략히 검색해 보았다. 모든 사토시 용의자가 X 계정을 갖고 있는 것은 아니었으므로 과학적인 방법은 아니었다. 하지만 바랐던 대로, 한 사람이 내 단어와 구절 거의 모두와 일치했다. 바로 아담 백이었다.' },
          { type: 'p', text: '노트에 그의 이름 아래 빼곡히 적어둔 체크 표시 열을 빤히 쳐다보며 아드레날린이 솟구치는 것을 느꼈다. 직감이 적어도 부분적으로는 근거가 있어 보였다. 백 씨가 사토시와 동일한 용어를 많이 사용한다는 사실이 오랜 세월 이 주제에 매달려온 커뮤니티에 무언가를 증명해 주지는 못하겠지만, 그것이 단순한 우연일 거라는 생각은 들지 않았다.' },
          { type: 'p', text: '아담 백을 자세히 들여다보면서 그가 사토시와 일치하는 몇 가지 특성을 지녔음을 깨달았다. 우선, 그는 영국인이고 사이퍼펑크였다. 더 중요한 사실은 백 씨가 해시캐시(Hashcash)를 발명했다는 점이다. 사토시가 비트코인 채굴에 차용한 바로 그 통계적 퍼즐 해결 시스템이다. 사토시는 자신의 백서에서 아담 백과 해시캐시를 인용했다.' },
          { type: 'p', text: '하지만 백 씨는 호주 사기꾼의 재판에서, 사토시가 비트코인 백서를 발표하기 전인 2008년 8월 백 씨의 해시캐시 논문 인용이 정확한지 확인하기 위해 그에게 연락했음을 보여주는 이메일을 제출했다. 그 이메일들은 백 씨가 사토시일 수 없다는 증거처럼 보였다.' },
          { type: 'p', text: '하지만 곰곰이 생각해보니 다른 가능성이 엿보였다. 백 씨가 알리바이를 만들기 위해 그 이메일을 자기 자신에게 보냈을 수도 있었다.' },

          { type: 'h3', text: '‘암호학 토끼굴 속으로’' },
          { type: 'p', text: '철테 안경에 숱이 적은 회색 머리, 턱수염을 기른 55세의 아담 백은 단정하지 못한 수학자처럼 보인다. 지난 12년 동안 그는 비트코인 관련 회사들의 소왕국을 건설했고, 커뮤니티에서 가장 영향력 있는 인물 중 하나가 됐다.' },
          { type: 'p', text: '백 씨는 오랫동안 최고의 사토시 후보 중 하나였다. 하지만 다른 주요 용의자들과 달리, ‘Barely Sociable’이라는 익명의 유튜버가 2020년에 올린 영상을 제외하고는 언론의 정밀한 검증을 받은 적이 없었다.' },
          { type: 'p', text: '1년 전, 나는 그를 만나기 위해 라스베이거스로 날아갔다. 그는 베네시안 리조트에서 열린 비트코인2025 컨퍼런스에서 연설할 예정이었다. 그가 내가 찾는 그 사람인지 아직 확신할 수 없었기에 정면 대결은 계획하지 않았다. 그저 그를 알아가고 그의 배경에 대해 더 알아보고 싶었다. 취재가 성과를 낸다면, 나중에 모든 증거를 들이밀며 살인 용의자에게서 자백을 받아내려는 경찰 형사처럼 극적인 최후의 대결을 펼칠 생각이었다. 하지만 지금은 그를 편안하게 해주고 유대감을 쌓는 것이 먼저였다.' },
          { type: 'p', text: '백 씨가 한 패널 토론에서 당시 10만 8,000달러 선에서 거래되던 비트코인이 5년에서 10년 안에 "쉽게 100만 달러"에 도달할 것이라고 자신 있게 예측하는 것을 본 뒤 그에게 다가갔다. (어울리게도, 컨퍼런스 주최 측은 그가 연설한 무대를 "나카모토 스테이지"라고 명명했다.) 미리 인터뷰를 약속해두었음에도 그는 약간 놀란 듯 보였다.' },
          { type: 'img', src: 'docs/satoshi/original/Biz-Cypher-qfct-articleLarge.jpg', cap: '카키색 바지와 노란 모자를 쓰고 마이크를 들어 파란색과 흰색 배너가 걸린 무대에서 연설하는 아담 백. 지난해 5월 라스베이거스 컨퍼런스에서. 출처... Ronda Churchill/Bloomberg' },
          { type: 'p', text: '나는 백 씨에게 비트코인의 역사에 관한 기사를 쓰고 있다고만 말했지만, 그가 관여했던 세 회사의 전직 동료 6명에게 이미 연락을 취한 터라 그가 내 진짜 의도를 의심했을 수도 있었다. 의심했다 해도 내색하지는 않았다. 그는 느긋하고 친절했다. 눈에 띄는 경호 조치도 없는 이 조용하고 소박한 중년 너드가 세계 최고 부자 중 한 명일 수도 있다는 사실이 좀처럼 믿기지 않았다. 비트코인 전설에 따르면 사토시는 디지털 통화 초창기에 110만 개의 코인을 채굴했으며, 컨퍼런스 당시 그 가치는 1,180억 달러에 달했다.' },
          { type: 'p', text: '비트코인 얘기를 할 때는 수다스러운 백 씨였지만, 화제를 그의 어린 시절로 돌리자 말수가 줄었다. 그로부터 끌어낸 이야기는 이랬다. 그는 1970년 런던에서 태어났다. 아버지는 사업가였고 어머니는 법률 비서였다. 이사를 자주 다녔고, 가족들은 주관이 뚜렷했으며 의견 표현을 주저하지 않았다.' },
          { type: 'p', text: '백 씨는 11살 때 팀엑스 싱클레어 개인용 컴퓨터로 코딩을 독학했고 고등학교 때 암호학에 관심을 갖게 됐다고 말했다. 엑서터 대학교에서 컴퓨터 과학 박사 과정을 밟던 그에게 한 동기가 P.G.P.를 소개하면서 그것은 열정으로 발전했다. P.G.P.는 반핵 운동가들과 인권 단체들이 정부 감시로부터 파일과 이메일을 보호하기 위해 쓰던 무료 암호화 프로그램이었다.' },
          { type: 'p', text: '‘Pretty Good Privacy’의 약자인 P.G.P.의 다양한 잠재적 응용 가능성에 깊이 빠져든 나머지, 그는 박사 과정의 대부분을 "암호학 토끼굴 속으로 내려가는 데" 보냈다고 말했다. 너무 딴길로 샌 탓에 대학에서의 마지막 6개월 동안 비행기를 불시착시키는 조종사처럼 논문을 벼락치기로 써야 했다고 회상했다.' },
          { type: 'p', text: '나는 그때쯤 P.G.P.가 공개 키 암호화(public-key cryptography)에 의존한다는 사실을 충분히 이해하고 있었다. 비트코인도 마찬가지다. 비트코인 사용자는 두 개의 키를 갖는다. 디지털 안전 금고 역할을 하는 주소가 파생되는 공개 키(public key)와, 그 금고를 열고 안의 코인을 꺼내 쓰는 데 필요한 비밀 조합인 개인 키(private key)다.' },
          { type: 'p', text: '백 씨의 대학원 시절 취미가 사토시가 용도를 변경해 활용한 바로 그 암호화 기술과 관련이 있다는 사실이 흥미롭게 느껴졌다. 그는 박사 논문 주제가 분산 컴퓨터 시스템이었다고 밝혔다. 컴퓨터 용어로 "노드(nodes)"라고 불리는 독립적인 컴퓨터들의 망에 의존해 소프트웨어를 함께 구동하는 프로그램이다. 이것은 비트코인의 또 다른 핵심 기술적 토대였다.' },
          { type: 'p', text: '그리고 백 씨의 논문 프로젝트는 C++에 초점을 맞췄다. 사토시가 비트코인 소프트웨어 첫 버전을 코딩할 때 사용한 바로 그 프로그래밍 언어다. 거의 2시간이 지나자 백 씨는 그날 저녁 다른 일정이 있다고 정중하게 알렸고, 우리는 화기애애하게 헤어졌다. 다른 질문이 생기면 연락하겠다고 말했다.' },

          { type: 'h3', text: '사이퍼펑크가 되다' },
          { type: 'p', text: '라스베이거스로 떠나기 전, 나는 사토시를 탄생시킨 기이한 지하 세계를 더 깊이 이해하기 위해 사이퍼펑크 메일링 리스트 아카이브에 몰두하기 시작했다. 뉴욕으로 돌아와서는 다시 그 속으로 빠져들었다. 페이스북 같은 소셜 미디어 플랫폼과 달리 사이퍼펑크 리스트는 탈중앙화된 소통의 장이었다. 사생활을 중시하는 암호학 괴짜들이 검열에 대한 두려움 없이 전복적인 아이디어를 자유롭게 나누기 위해 그곳에 모였다. 그 과정에서 그들은 금융 역사의 흐름을 바꿀 혁신의 씨앗을 뿌렸다.' },
          { type: 'p', text: '그들의 메시지는 여러 잘 알려지지 않은 웹사이트에 후세를 위해 보존되었다. 그중 한 곳에는 해골과 엇갈린 뼈다귀 로고와 “일어나라, 잃을 것이라고는 철조망뿐이다!”라는 슬로건이 적혀 있었다. 내가 거의 이해하지 못하는 암호학 전문 용어로 빽빽한 수천 통의 이메일이 눈앞에 펼쳐졌다.' },
          { type: 'p', text: '백 씨는 대학원 생활이 끝나가던 1995년 여름에 리스트에 가입했다. 디지털 프라이버시부터 자신의 알뜰한 소비 습관에 이르기까지 다양한 주제로 글을 쏟아내며 빠르게 존재감을 드러냈다.' },
          { type: 'p', text: '초기 게시물 중 하나에서 그는 P.G.P. 개발에 참여했던 캘리포니아 출신 사이퍼펑크 할 피니(Hal Finney)가 올린 암호학적 난제, 즉 일종의 수학적 수수께끼를 풀어냈다. 이것이 온라인 우정의 시작이었다. 수십 년이 지나 백 씨는 트윗을 통해 피니 씨와 리스트 안팎에서 수없이 교류했으며 그의 집중력과 코딩 실력에 감탄했다고 밝혔다.' },
          { type: 'p', text: '사토시 역시 피니 씨와 친분이 있었다. 사토시가 백서를 공개하자 피니 씨는 칭찬을 보냈다. 나중에 피니 씨는 세계 최초의 비트코인 거래에서 자원해 비트코인을 받았다. 피니 씨가 사토시의 정체를 알았다는 증거는 없었지만, 그들의 교류 중 하나는 사토시가 피니 씨와 인연이 있었음을 시사했다.' },
          { type: 'p', text: '2010년 12월, 피니 씨는 비트코인톡에 비트코인 코드를 칭찬하는 글을 올렸다. 두 시간 후, 사토시가 답글을 달았다. “할, 당신이 그렇게 말해주니 저에겐 큰 의미가 있습니다.”' },
          { type: 'p', text: "사토시와 피니 씨가 과거의 인연을 공유했다고 생각하게 만든 또 다른 단서도 있었다. 말미에게 보낸 이메일 중 하나에서 사토시는 피니 씨가 고안한 전자 현금 시스템인 '재사용 가능한 작업 증명(Reusable Proofs of Work, R.P.O.W.)'을 언급했다. 비트코인처럼 R.P.O.W.도 해시캐시를 설계에 통합했지만, 비트코인과 달리 암호학 커뮤니티의 관심을 거의 끌지 못했다. 사이퍼펑크 및 크립토그래피 리스트에서 이에 대해 언급한 사람은 극소수였다. 그 극소수 중 한 명이 바로 백 씨였다." },

          { type: 'h3', text: '금괴' },
          { type: 'p', text: '사이퍼펑크에서 백 씨는 이념적 동지들을 찾았다. 퇴근 후 런던 집에서 전화 접속 모뎀으로 인터넷에 접속해 지구 반대편의 다른 그룹 멤버들과 철학 논쟁을 벌이며 밤을 지새우는 그의 모습이 눈앞에 그려졌다. 새로운 펜팔들 중 상당수처럼 백 씨도 \'암호 무정부주의(crypto anarchy)\'를 받아들였다. 이는 국가의 간섭으로부터 개인의 삶을 보호하기 위해 암호화를 활용하는 이념이다.' },
          { type: 'email', from: 'Adam Back <aba@dcs.ex.ac.uk>', to: 'cypherpunks@toad.com', date: '월요일, 1996년 9월 23일 08:15:19 +0800', body: '저에게 암호 무정부주의는 더 자유주의적인(libertarian) 정부를 실현하기 위한 수단이자 정부 권력을 줄이고 자유와 프라이버시를 가능케 하는 핵심 도구입니다. 자유주의적 정부란 덜 강력한 정부, 더 낮은 세금, 덜 가혹한 법률, 더 많은 자유를 의미합니다.' },
          { type: 'p', text: '이 글은 사토시가 비트코인을 소개할 때 한 말을 떠올리게 했다.' },
          { type: 'email', from: 'Satoshi Nakamoto', to: 'Martti Malmi (implied)', date: '금요일, 2008년 11월 14일 13:55:35 EST', body: '제대로 설명할 수만 있다면 자유주의적 관점에서 매우 매력적일 겁니다. 저는 글보다는 코드를 다루는 데 더 능숙하지만요. 사토시 나카모토' },
          { type: 'p', text: '클린턴 행정부가 P.G.P. 창시자에 대한 형사 조사를 개시했을 때 자유주의자인 백 씨는 격분했다. 당시 미국 정부는 암호화 프로그램이 국가 안보에 필수적이라고 보았으며, P.G.P.의 소스 코드를 온라인에 공개하는 것은 금지된 군수품을 수출하는 것과 같다고 여겼다. 항의의 표시로, 백 씨는 강력한 암호화 알고리즘이 인쇄된 티셔츠를 만들어 다른 나라의 사이퍼펑크들에게 우편으로 보냈다. 민감한 암호화 기술 수출을 금지한 미국의 조치는 언론의 자유 원칙에 위배되며 집행될 수 없다는 것이 그의 요지였다.' },
          { type: 'p', text: '백 씨의 재치 있는 장난을 즐기다가, 사토시 역시 코드를 통해 정치적 메시지를 전했다는 사실이 떠올랐다. 사토시가 비트코인의 첫 번째 거래 블록에 런던 타임스 헤드라인을 새겨 넣은 것도 당시 맹위를 떨치던 금융 위기 속에 영국 정부의 은행 구제금융을 비판하려는 정치적 메시지였을 것이다.' },
          { type: 'p', text: '사토시는 탈중앙화 기술 애호가들 사이에서 인기 있는 웹사이트에 또 다른 정치적 메시지를 심어두었다. 그는 자신의 생일이 1975년 4월 5일이라고 주장했다. 4월 5일은 1933년 프랭클린 D. 루스벨트 대통령이 대공황 기간 중 달러 가치를 떨어뜨리기 위해 개인의 금 소유를 금지한 날이고, 1975년은 그 금지가 해제된 해였다. 금융 평론가 도미닉 프리스비(Dominic Frisby)는 10여 년 전 이 이스터 에그를 발견하고 그 의미를 간파했다. 비트코인은 국가가 불법화하거나 가치를 떨어뜨릴 수 없는 금의 디지털 버전이라는 것이다.' },
          { type: 'p', text: '그런데 2002년 백 씨가 남긴 이 짧은 게시물은 아무도 눈치채지 못한 것 같았다. "그냥 궁금한 건데, 미국에서 개인의 금 소유를 불법으로 만든 논리가 뭐였나요? 도무지 이해가 안 가네요…"' },

          { type: 'h3', text: '스팸에 대한 집착' },
          { type: 'p', text: '이 기묘한 우연을 곱씹다가 사토시와 백 씨의 또 다른 공통점을 발견했다. 바로 스팸에 대한 기이한 집착이었다. 백 씨의 여러 사이퍼펑크 취미 중에는 리메일러(remailer) 운영이 있었다. 리메일러는 이메일을 전달하기 전 식별 데이터를 제거해 사용자가 익명으로 소통할 수 있도록 해주는 서비스다. 스패머들은 이를 악용해 사람들에게 쓰레기 메일을 퍼부었고, 백 씨는 이에 엄청난 짜증을 느꼈다.' },
          { type: 'p', text: '백 씨는 이에 맞서기 위해 1997년 3월 해시캐시를 발명했다. 아이디어는 리메일러 통해 전송되는 모든 이메일에 우편 요금을 부과하는 것이었다. 우편 요금은 사용자가 많은 계산이 필요한 소규모 수학 문제를 풀어 생성하는 해시캐시로 지불됐다. 수학 문제를 푸는 데 컴퓨터로는 몇 초밖에 걸리지 않지만, 한 번에 수십만 통의 이메일을 보내는 스패머들에게는 엄청난 컴퓨터 자원 부담을 안겨주었다.' },
          { type: 'p', text: '사토시의 글을 두 번, 세 번 읽다 보니 사방에서 "스팸"이라는 단어가 눈에 띄기 시작했다. 헤아려 보니 사토시는 이를 24번 언급했으며, 종종 백 씨와 동일한 아이디어를 표현했다. 해시캐시를 공개한 지 5개월 후, 백 씨는 사이퍼펑크 리스트에서 자신의 발명품이 유명인들의 이메일을 필터링하는 데 유용할 수 있다고 제안했다. 2009년 1월 크립토그래피 리스트에 올린 게시물에서 사토시도 비트코인의 비슷한 활용법을 제안했다.' },
          { type: 'email', from: 'Adam Back <aba@dcs.ex.ac.uk>', date: '토요일, 1997년 8월 9일 06:16:40 +0800', to: 'cypherpunks@cyberpass.net', body: "만약 당신이 어떤 미디어 유명인사이고 이메일을 너무 많이 받는다면 -- 그냥 볼륨을 높이고, 요구되는 우편 요금을 인상한 다음, 원하는 사람들을 무료 발송 목록에 추가하면 됩니다." },
          { type: 'email', from: 'Satoshi Nakamoto <satoshi@vistomail.com>', date: '금요일, 2009년 1월 16일 11:03:14 EST', body: '유명한 사람이 읽을 수 있는 것보다 더 많은 이메일을 받고 있지만 여전히 팬들이 자신에게 연락할 수 있는 방법을 원한다면, 비트코인을 설정하고 웹사이트에 IP 주소를 알려줄 수 있습니다. "이 IP의 제 전용 핫라인으로 X 비트코인을 보내주시면 제가 직접 메시지를 읽겠습니다."' },
          { type: 'p', text: '백 씨처럼 10년 이상 스팸 차단을 머릿속에 담고 살아온 사람이 아니었다면, 사토시의 새로운 전자 화폐의 활용법으로서 자연스럽게 떠올릴 수 없는 아이디어였다. 사토시는 비트코인이 스팸 전반의 감소로 이어질 수 있다고도 믿었다. 백서를 발표한 지 며칠 후, 그는 해커들이 이메일 수신함을 폭주시키기 위해 동원한 좀비 컴퓨터 부대가 자신의 발명품 덕분에 "대신 비트코인을 생성하는" 새로운 목적을 갖게 될 수 있다고 주장했다.' },
          { type: 'p', text: '그의 주장은 큰 호응을 얻지 못했고 스팸은 계속 늘어났다. 하지만 백 씨는 4년 후 비트코인톡에서 똑같은 주장을 펼쳤다. "해시캐시 CPU/GPU 채굴이 스패밍보다 더 수익성 있는 시장이라면 아마도 스팸이 줄어들 수도 있습니다. 제 생각에는 그럴 가능성이 매우 높아 보입니다."라고 썼다.' },

          { type: 'h3', text: '미스터 애버리지(평범한 사람)' },
          { type: 'p', text: '결정적 증거로 이어질 만한 사토시의 철통같은 위장 속 틈새를 찾는 데는 운이 따르지 않았다. 통념상 그는 두 가지 실수를 저질렀다. 첫 번째는 비트코인 소프트웨어를 출시했을 때 그가 남부 캘리포니아에 있었음을 시사하는 유출된 IP 주소였다. 다른 하나는 그의 이메일 계정 중 하나가 해킹된 것이었다. 두 단서를 모두 쫓아 몇 주를 보낸 끝에, 그것들이 막다른 골목일 뿐만 아니라 애초에 실수가 아니었을 가능성이 높다는 결론에 이르렀다. 흔적을 이토록 철저히 지우는 사람을 어떻게 찾을 수 있을까?' },
          { type: 'p', text: '이 문제와 씨름하다 보니, 백 씨 역시 인터넷에서 익명으로 활동하는 데 능숙하다는 사실이 떠올랐다. 정부 감시에 극도로 예민했던 그는 이를 피할 방법을 끊임없이 궁리했다. 사실, 사토시처럼 백 씨도 가명 사용을 매우 즐겼다.' },
          { type: 'p', text: '"레이더망 아래에 있어야 합니다. 사실상 정부에 보이지 않아야 하고, 당신에 대한 정보기관의 파일은 \'미스터 애버리지\'처럼 읽혀야 하며 완전히 무해해야 합니다. 그런 다음 실제 관심사를 위해 하나 이상의 또 다른 자아(alter-egos)를 가져야 합니다."라고 그는 1998년 1월에 썼다.' },
          { type: 'p', text: '사토시가 선택한 또 다른 자아는 일본 출신이었다. 공교롭게도 백 씨는 1997년 한 일본인 사이퍼펑크가 리스트에 일본 최초의 리메일러 개설을 알리는 글을 올렸을 때 일본이라는 나라에 관심을 표명한 적이 있었다.' },
          { type: 'p', text: '백 씨는 이렇게 답했다. "새로운 관할권에서 리메일러를 시작하신 것을 축하합니다! 관할권 쇼핑도 좋은 방법인데, 일본이 관할권 측면에서 어떤 기회를 제공하는지 궁금하네요. 유럽이나 미국에서는 불법이지만 일본에서는 합법인 것들이 있나요?"' },
          { type: 'p', text: '그 일본인 사이퍼펑크는 답하지 않았다. 하지만 그렇다고 백 씨가 나중에 스스로 조사를 해보는 것을 막지는 못했을 것이다. 그랬다면, 익명 이메일과 웹 호스팅을 제공하는 도쿄 주소의 Anonymousspeech L.L.C.라는 회사를 우연히 발견했을지도 모른다. 사토시는 bitcoin.org 웹사이트를 등록하고 추적이 불가능한 두 개의 이메일 계정을 만들기 위해 이 회사의 서비스를 이용했다.' },
          { type: 'p', text: "1999년 백 씨는 프라이버시 소프트웨어 전문 스타트업에 취직하기 위해 몬트리올로 이주했다. 그곳에서 그는 사용자가 익명으로 인터넷을 탐색할 수 있게 해주는 프라이버시 시스템 '자유 네트워크(Freedom Network)'를 구축하는 데 힘을 보탰다. 이것은 인터넷 트래픽을 익명화하는 양파 라우터(Onion Router), 즉 Tor의 전신이었다. 비트코인 커뮤니티에는 사토시가 자신의 발자취를 숨기기 위해 Tor를 사용했다는 데 폭넓은 공감대가 형성되어 있다." },
          { type: 'p', text: '비트코인처럼 자유 네트워크도 분산 컴퓨터 시스템이었다. 백 씨와 그의 동료들은 이를 정부와 기업의 감시에 영향을 받지 않도록 만들려 했다. 그것은 비트코인톡 게시물에서 네트워크 보안과 취약점 방어에 관한 깊은 지식을 드러낸 사토시와 백 씨가 공유하는 또 다른 특성이었다. 비트코인 네트워크가 해킹 시도를 얼마나 잘 버텨냈는지는 널리 칭송받는 사실이다.' },

          { type: 'h3', text: '냅스터 대 그누텔라' },
          { type: 'p', text: '사이퍼펑크 리스트 아카이브 깊숙이 수개월을 파고들다 보니, 이따금 연구가 어디까지 진행됐는지 갈피를 잃고 엉뚱한 단서를 따라 이상한 막다른 골목으로 빠져들기도 했다. 자신의 백서에 대한 첫 번째 비판 중 하나에 답하면서 사토시는 크립토그래피 리스트에 이렇게 썼다. "그 주장을 충분히 강하게 표현하지 못했군요." 나는 그 문구를 전에 본 것 같아, 이미 읽은 수백 개의 1990년대 메일링 리스트 게시물을 다시 뒤지는 데 여러 날 밤을 보냈다. 결국 내가 착각한 것이 분명해졌다.' },
          { type: 'p', text: '하지만 다시 읽는 것이 완전히 헛수고는 아니었다. 백 씨와 사토시 사이의 또 다른 공통점들이 눈에 들어오기 시작했다. 이를테면, 두 사람은 저작권에 대한 반감을 공유했다. "특허와 저작권을 없애라"고 백 씨는 1997년 9월에 썼다. 이 신념에 따라 백 씨는 스팸 차단 소프트웨어인 해시캐시를 오픈소스로 공개했다. 사토시도 마찬가지였다. 비트코인 소프트웨어를 M.I.T.의 오픈소스 라이선스로 배포해 누구나 제한 없이 사용·수정·배포할 수 있도록 했다.' },
          { type: 'p', text: '공공재를 만든다는 정신에 따라, 백 씨와 사토시 모두 자신의 창작물 전용 인터넷 메일링 리스트(해시캐시 리스트와 Bitcoin-dev 리스트)를 개설하고, 놀랍도록 유사한 형식과 문체로 새 기능과 버그 수정 목록을 담은 소프트웨어 업데이트를 게시했다. 사토시의 저작권 반대 성향은 다른 방식으로도 드러났다. 그는 비트코인톡에서 직접 디자인한 비트코인 로고 이미지를 공유할 때 저작권을 명시적으로 포기했으며, 이를 개선하려는 사람들에게 "자신의 그래픽을 퍼블릭 도메인으로 만들 것"을 권장했다.' },
          { type: 'p', text: '2000년대 초, 인기 있는 파일 공유 서비스 냅스터(Napster)가 대형 음반사들에게 소송을 당해 폐쇄되면서 저작권 집행이 주류 뉴스로 떠올랐다. 냅스터는 사용자들이 중개자 없이 서로 직접 콘텐츠를 공유하는 P2P(peer-to-peer) 소프트웨어였다. 백 씨는 경악했다. 그는 지식재산권 변호사가 쓴, P2P 소프트웨어 제작자들이 직면한 모든 법적 위협을 상세히 설명한 논문을 사이퍼펑크 리스트에 공유했다. "이 글을 읽고 내린 결론은," 백 씨는 썼다. "가장 안전하고 간단한 방법은 그런 소프트웨어를 익명으로 배포하는 것입니다."' },
          { type: 'p', text: '비트코인도 냅스터와 마찬가지로 P2P 소프트웨어였다. 음악 산업 자리에 정부를 대입하면 비슷한 시나리오가 벌어질 수 있었다. 창시자의 신원이 드러나면 정부 변호사들은 누구를 겨냥해야 할지 알게 된다. 신원이 숨겨져 있다면 고소할 대상이 없다. 백 씨와 사토시가 동일인이라면, 사토시가 자신을 숨기기로 한 이유가 설명된다. 음반사들은 사업적 이익을 지키려 했다. 정부의 의도는 달랐을 것이다. 화폐에 대한 독점권을 지키는 것이 그들의 목표였을 테니까.' },
          { type: 'p', text: '백 씨처럼 사토시도 냅스터의 몰락을 반면교사로 삼았다.' },
          { type: 'email', from: 'Satoshi Nakamoto <satoshi@vistomail.com>', date: '목요일, 2008년 11월 6일 15:15:40 EST', body: '정부는 냅스터와 같이 중앙에서 통제되는 네트워크의 머리를 자르는 데는 능숙하지만, 그누텔라(Gnutella)나 토르(Tor) 같은 순수 P2P 네트워크는 건재한 것 같습니다.' },
          { type: 'p', text: '그는 냅스터가 사용자들끼리 노래를 직접 교환하면서도 여전히 중앙 서버를 통해 누가 어떤 노래를 보유하고 있는지 목록을 관리했다는 사실을 지적하고 있었다. 반면 또 다른 파일 공유 서비스인 그누텔라는 비트코인처럼 전 세계에 분산된 독립 컴퓨터 네트워크 위에서 작동했다. 여기서 또 하나의 놀라운 우연이 탄생했다. 2000년 5월 게시물에서 백 씨도 냅스터와 그누텔라를 정확히 같은 방식으로 비교했다.' },
          { type: 'email', from: 'Adam Back <adam@cypherspace.org>', subject: 'napster vs gnutella -- why distributed systems win', date: '2000-05-10 16:40:11', body: '냅스터 서버는 중앙화되어 있어 폐쇄될 수 있기 때문에 그누텔라가 성공할 가능성이 훨씬 높습니다. 그누텔라는 기본적으로 폐쇄될 수 없습니다.' },
          { type: 'p', text: '백 씨는 이 비교를 한 번만 한 것이 아니었다. 사이퍼펑크 리스트에서 무려 세 차례나 같은 비교를 했다.' },

          { type: 'h2', text: 'II. 숨겨진 로드맵' },
          { type: 'h3', text: '비트코인 탄생 10년 전에 비트코인의 윤곽을 그리다' },
          { type: 'p', text: '이 모든 유사점은 흥미로웠지만, 아담 백과 비트코인 창조를 직접 연결하는 증거는 없었다. 그러다 비트코인이 출시되기 10년 전인 1997년부터 1999년 사이에 백 씨가 쓴 사이퍼펑크 게시물 묶음을 발견하면서 상황이 달라졌다.' },
          { type: 'p', text: '1997년 4월 30일, 그는 현대 은행 시스템과 "완전히 단절된" 4가지 핵심 속성을 가진 전자 현금 시스템 구축을 제안했다. 지불인과 수취인 모두의 프라이버시를 보존하고, 중단이 어렵도록 컴퓨터 네트워크 전반에 분산시키며, 과도한 인플레이션을 막기 위한 내재적 희소성을 갖추고, 어떤 개인이나 은행도 신뢰할 필요가 없어야 한다는 것이었다. 마지막 목표를 달성하기 위해 이틀 후 다섯 번째 요소인 공개적으로 검증 가능한 프로토콜을 제안했다. 이 5가지 요소는 모두 훗날 비트코인의 핵심이 됐다.' },
          { type: 'p', text: '4개월 후 백 씨는 게임 이론에 뿌리를 둔 새로운 기능을 도입하며 다시 전자 현금 주제로 돌아왔다. "제가 약간 고민해 본 적용 분야는 분산 은행 시스템을 만드는 아이디어입니다."라고 그는 썼다. "이상적으로는 모든 노드가 동등하고, 그 중 n개 중 k개가 공모해야만 은행 운영을 손상시킬 수 있는 시스템입니다."' },
          { type: 'p', text: '백 씨는 탈중앙화 시스템을 괴롭히는 컴퓨터 과학 난제인 비잔틴 장군 문제(Byzantine Generals Problem)를 암시하고 있었다. 비유하자면, "n"명의 장군이 비잔티움과 전쟁 중인 적의 도시를 포위하고 있다. 성공적인 침공을 위해서는 모두 같은 시간에 공격하기로 합의해야 하지만, 그 중 "k"명은 배신자여서 계획을 망칠 수도 있다. 분산 컴퓨터 네트워크에서도 마찬가지다. 네트워크 내 악의적인 참여자, 즉 노드에 의해 파괴될 수 있다.' },
          { type: 'p', text: '백 씨는 너무나 많은 곳에 수많은 노드가 분산되어 있어 시스템을 파괴하려는 자가 충분한 공모자를 찾을 수 없는 전자 현금 네트워크를 만들고자 했다. 이는 11년 후 사토시가 백서에서 설명한 시스템과 놀랍도록 흡사했다. 비트코인은 "네트워크를 공격하기 위해 협력하지 않는 노드들이 CPU 파워의 과반수를 통제하는 한" 작동할 것이라고 사토시는 적었다.' },
          { type: 'p', text: '1997년 사이퍼펑크 리스트 게시물에서 백 씨는 네트워크 운영에 영향을 미치지 않고 "왔다 갔다(come and go)" 할 수 있는 노드에 대해 썼다. 백서에서 사토시는 노드들이 "원할 때 네트워크를 떠났다가 다시 합류할 수 있다(leave and rejoin the network at will)"고 적었다. 표현은 약간 달랐지만, 뛰어난 암호학자가 아니더라도 백 씨와 사토시가 완전히 동일한 개념을 제안했음을 알 수 있었다.' },
          { type: 'p', text: "1998년 12월 6일, 또 다른 사이퍼펑크 웨이 다이(Wei Dai)가 비머니(b-money)라는 자체 아이디어를 내놓자 백 씨는 다시 전자 현금 주제로 돌아왔다. 유튜버 Barely Sociable이 2020년 영상에서 지적했듯, 백 씨는 다이 씨의 제안을 적극 수용했다. 비머니는 백 씨가 구상했던 것처럼 공개 키 암호화를 통해 사용자 계정을 익명화함으로써 지불인과 수취인의 프라이버시를 보존했다. 백 씨가 마음에 들어 한 또 다른 기능도 있었다." },
          { type: 'p', text: '디지털 화폐를 만들려는 사람이라면 누구나 맞닥뜨리는 난제 중 하나는 화폐를 발행하는 방법이다. 다이 씨는 연산 문제를 푼 사용자에게 새로 발행된 비머니 코인을 보상으로 지급하는 시스템을 제안했다. 백 씨의 해시캐시도 이와 매우 유사한 방식으로 작동했다. 연산 문제를 푼 사용자에게 이메일 전송 권한을 보상으로 주었다. 그는 해시캐시를 변용해 다이 씨의 전자 화폐를 발행하는 메커니즘으로 삼을 것을 제안했다.' },
          { type: 'p', text: '이것은 의미심장한 대목이었다. 사토시가 백서에서 다이 씨를 인용했고, 훗날 비트코인을 "웨이 다이의 비머니 제안을 구현한 것"이라고 묘사했기 때문이다. 잠시 멈춰 생각해 보니 정말 경이로웠다. 1998년 백 씨가 제안했던 것과 똑같이, 사토시는 해시캐시와 비머니 개념을 결합해 비트코인을 만들었다. 그런 우연이 일어날 확률이 얼마나 될까?' },
          { type: 'p', text: '이것이 전부가 아니었다. 1998년 12월 비머니를 논하면서 백 씨는 사토시의 인플레이션 해법까지 미리 예견했다. 연산 문제를 풀어 발행되는 모든 전자 화폐는 통제 불능의 인플레이션에 빠질 수밖에 없었다. 컴퓨터 칩이 강력해질수록 문제를 풀고 새 화폐를 주조하기가 더 쉬워지기 때문이다. 이 문제를 피하기 위해 백 씨는 비머니 코인을 주조하는 데 "시간이 지날수록 더 많은 연산 노력"이 필요하도록 해야 한다고 제안했다. 그것이 바로 사토시가 비트코인 소프트웨어를 설계한 방식이었다. 새로운 비트코인 거래 블록을 채굴하는 데 평균 10분이 걸리도록 프로그래밍하고, 더 빠른 컴퓨터 칩이 그 시간 간격을 줄이기 시작하면 문제 해결 난이도를 높이는 알고리즘을 만들었다.' },
          { type: 'p', text: '이 모든 선견지명에서 멈추지 않고, 백 씨는 1999년 4월 또 다른 핵심 개념을 제안했다. 분산 전자 현금이 작동하려면 모든 거래에 공개적이고 변조 불가능한 타임스탬프가 필요했다. 그렇지 않으면 사용자 한 명이 코인 하나를 두 번 써서 시스템 전체를 혼란에 빠뜨릴 수 있었다. 백 씨의 해결책은 해시 트리(대량의 데이터를 단일 디지털 지문으로 압축하는 방식)를 이용하고 그 지문을 뉴욕타임스 광고란에 게재하는 것이었다.' },
          { type: 'p', text: "사토시는 비트코인에 같은 아이디어를 적용했지만, 광고란 게재 방식은 백 씨의 해시캐시로 대체했다. 해시캐시는 거래를 블록으로 묶는 데 사용되는 집약적 연산을 위조하기에 너무 비용이 많이 들고 시간이 걸리도록 만들어 타임스탬프를 구현했다. 백 씨는 나중에 비트코인에 쏟아질 주요 비판 중 하나인 막대한 전력 사용에 대한 사토시의 반응까지 예고했다. 그는 1998년과 1999년에 해시캐시와 비머니의 결합으로 소모되는 에너지는 은행 시스템이 소비하는 것보다 적을 것이라고 주장했다. 10년 후 비트코인 백서의 초기 독자가 이 문제를 제기했을 때 사토시도 비슷한 주장을 펼쳤다." },
          { type: 'email', from: 'Adam Back <aba@dcs.ex.ac.uk>', date: '1999-04-17 17:45:04', body: '낭비가 법정 화폐(fiat money)의 비용보다 적은 한, 그것은 이득입니다.' },
          { type: 'email', from: 'Satoshi Nakamoto <satoshin@gmx.com>', date: '일요일, 2009년 5월 3일, 23:32:26 +0100', to: 'mmalmi@cc.hut.fi', body: '[만약 비트코인이] 상당한 에너지를 소비할 만큼 성장하더라도, 그것이 대체할 노동집약적이고 자원집약적인 전통 은행 활동보다는 덜 낭비적일 것이라고 생각합니다.' },
          { type: 'p', text: '요컨대, 백 씨는 비트코인이 탄생하기 10년 전에 그 거의 모든 면을 구상했을 뿐만 아니라, 비트코인의 가장 큰 결함을 해명하기 위해 사토시와 동일한 논리를 사용했다.' },

          { type: 'h3', text: '무응답' },
          { type: 'p', text: '라스베이거스 만남으로부터 한 달 후, 나는 백 씨에게 그의 경력과 2009년 몰타로 이주한 이유를 묻는 이메일을 보냈다. 질문의 의도는 밝히지 않았지만, 비트코인 커뮤니티 일부 회원들은 이 유럽 조세 도피처가 사토시와 그의 비트코인 재산을 보관하기에 이상적인 장소라고 지적해왔다.' },
          { type: 'p', text: '백 씨는 다음 날 예의 바르게, 하지만 내 질문의 의도를 확실히 간파한 듯한 답장을 보냈다. 생활비, 날씨, 그리고 세금 등 여러 이유로 몰타로 이주했다고 썼다. "비트코인 팬들은 탐정 놀이를 좋아하지만, 우연은 일어나게 마련이고 그것이 반드시 무언가를 의미하지는 않습니다." 그가 내 의도를 알아챘음이 분명했다. 나를 괴롭히던 문제를 꺼내 한 걸음 더 밀어붙일 때가 됐다.' },
          { type: 'p', text: '사토시는 백서에서 해시캐시와 비머니를 모두 인용했다. 그런데 호주 사기꾼 크레이그 라이트의 재판을 위해 백 씨가 제출한 이메일에 따르면, 사토시가 해시캐시 논문 인용이 정확한지 확인하기 위해 백 씨에게 연락했던 2008년 8월 당시 사토시는 아직 비머니를 모르고 있었던 것처럼 보였다. 이메일은 백 씨가 다이 씨의 웹사이트를 알려준 후에야 사토시가 백서에 비머니 인용을 추가했음을 시사했다.' },
          { type: 'p', text: '하지만 앞뒤가 맞지 않았다. 백 씨의 해시캐시 논문은 해시캐시의 응용 분야로 비머니를 구체적으로 논의했다. 사토시가 인용하려던 논문을 읽었다면, 비머니에 대해 알고 있어야 했다. 백 씨는 2020년 이 모순을 인정했다. X에서 사토시가 전자 현금에 대해 게시했던 익명의 사이퍼펑크일 수 있다고 제안하자, 다른 사용자가 이의를 제기했다. 그 익명의 사이퍼펑크는 비머니를 언급했는데, 사토시는 수년 후 백 씨로부터 비머니를 처음 알게 됐다는 것이다.' },
          { type: 'p', text: '맞는 말이지만, 백 씨는 사토시가 자신에게 거짓말하고 비머니를 모르는 척했을 수도 있다고 답했다. "사토시가 매우 생소한 인용(전자 현금 논의 중 사이퍼펑크에 게시된 웹페이지)을 알고 있었다면, 신원 추적을 피하기 위해 그것을 인용하지 않으려 했을 수도 있지 않을까요?"라고 그는 썼다. 사이퍼펑크 및 크립토그래피 리스트에서 비머니를 언급한 실명 사용자 6명 중 한 명이자, 이를 60차례 이상 거론했던 백 씨 같은 사람이라면 이런 종류의 \'신원 추적\'을 특히 피하고 싶었을 것이다.' },
          { type: 'p', text: '생각할수록, 백 씨가 자신으로부터 의심을 돌리기 위해 정교한 속임수로 사토시 이메일을 스스로에게 써서 보냈을 것이라는 의심이 짙어졌다. 그래서 백 씨에게 이메일의 메타데이터를 요청하기로 했다. 메타데이터는 물리적 편지의 봉투·소인·봉인과 같은 것으로, 이메일이 어디서 왔는지, 언제 전송됐는지, 변조됐는지 여부를 보여준다. 라이트 씨의 런던 재판에서 공개된 백 씨와 사토시의 이메일 교환 사본에는 이 정보가 담겨 있지 않았다.' },
          { type: 'p', text: '사토시가 도쿄에 등록된 익명 이메일 서비스를 이용해 자신의 IP 주소를 숨겼을 테니, 메타데이터가 유용한 정보를 줄 것이라는 기대는 크지 않았다. 게다가 사토시는 자신을 더욱 보호하기 위해 Tor를 통해 서비스에 접속했을 가능성이 높았다. 그래도 혹시 모를 단서가 있을까 싶어 확인하고 싶었다. 하지만 백 씨에게 요청 이메일을 보내자 그는 답장하지 않았다. 차단한 것인지 단지 바쁜 것인지 알 수 없었고, 곧바로 재촉해 그를 놀라게 하고 싶지 않아 8일을 기다렸다가 다시 이메일을 보냈다. 역시 묵묵부답이었다. 내가 그의 급소를 건드린 것이 분명했다. 하지만 왜일까? 사토시가 취한 예방 조치들을 감안하면 숨길 것이 있기나 한 걸까? 혹시 사토시가 어떤 실수를 저지른 것은 아닐까?' },

          { type: 'h3', text: '사토시가 나타나고, 백 씨는 사라지다' },
          { type: 'p', text: '2008년 할로윈에 비트코인을 공개한 후, 사토시는 그 뒤 2년 반 동안 소프트웨어 엔지니어링 전문성을 제공한 초기 열광자 무리의 도움을 받아 비트코인을 개선하는 데 힘썼다. 사토시는 훗날 비트코인 코어 개발자로 알려진 이 그룹과 비트코인톡 및 이메일을 통해 긴밀히 소통했다. 그런 다음, 유명하게도 2011년 4월 26일에 그는 자취를 감췄다. 그런데 백 씨도 똑같은 패턴을 보였다. 다만 반대 방향으로.' },
          { type: 'p', text: '10여 년간 사이퍼펑크나 크립토그래피 리스트에서 전자 화폐가 논의될 때마다 백 씨는 거의 빠짐없이 끼어들어 길고 상세한 글을 올렸다. 하지만 자신이 제시했던 비전의 가장 가까운 구현체인 비트코인이 모습을 드러냈을 때, 백 씨는 어디에서도 찾아볼 수 없었다. 몇 년 후인 2013년 12월, 그는 "Let\'s Talk Bitcoin" 팟캐스트에서 전혀 다른 버전의 이야기를 했다. 백 씨는 진행자에게 사토시의 발명품이 나왔을 때 기술적으로 "매우 큰 관심"을 가졌고, 크립토그래피 리스트에서 그것이 불러일으킨 토론에 "참여했다"고 말했다.' },
          { type: 'p', text: '2008년 가을과 2009년 겨울에 그런 참여의 흔적이 있는지 리스트를 샅샅이 뒤졌지만 아무 증거도 찾지 못했다. 사실 백 씨는 2011년 6월 비트코인에 대해 처음으로 공개적인 언급을 할 때까지 비트코인을 완전히 외면했다. 사토시가 사라진 지 6주 후의 일이었다. 비트코인과 거의 동일한 아이디어를 제시했던 전자 현금의 열렬한 지지자가 수년 동안 비트코인에 거의, 혹은 전혀 관심을 보이지 않은 것이다.' },
          { type: 'p', text: '그런데 그가 마침내 본격적으로 개입하기 시작한 시점은 사토시의 주의를 끌기에 충분한 새로운 사건과 겹쳤다. 2013년 4월 17일, 아르헨티나 암호학자 세르지오 데미안 러너(Sergio Demian Lerner)가 사토시의 재산을 폭로하는 블로그 포스트를 올렸다. 바로 그날, 백 씨는 비트코인톡에 가입했다. 러너 씨가 1주일 후 후속 블로그 포스트를 게재하자 백 씨는 댓글란에 이렇게 썼다. "당신이 너무 가까이 다가가고 있다는 생각이 든다면, 나카모토의 이익을 위해 멈추고 싶어질 수도 있겠죠…"' },

          { type: 'h3', text: '갑작스러운 올인' },
          { type: 'p', text: '갑자기 백 씨가 모든 것을 쏟아붓기 시작했다. 비트코인톡에 자신을 소개한 지 불과 몇 시간 만에 복잡한 시스템 개선안을 제안했다. 2주 만에는 삭제되어 비트코인 페이지로 합쳐졌던 사토시 나카모토 독립 위키피디아 페이지를 복구하라고 요구했다. 그리고 18개월 만에 비트코인 네트워크를 더 편리하고, 더 빠르고, 더 사적으로 만들 도구를 구축하기 위해 블록스트림(Blockstream)이라는 스타트업을 설립했다.' },
          { type: 'p', text: '이것은 백 씨가 빠르게 영향력을 쌓아 아직은 소규모였던 비트코인 커뮤니티의 주도적 인물이 되어가는 시대의 시작이었다. 블록스트림 인재를 충원하기 위해 그는 구글과 모질라 같은 기업에서 일하던 최고의 비트코인 코어 개발자들을 빼내어 디지털 화폐에 대한 막강한 영향력을 확보했다. 재산도 크게 불었다. 이후 12년 동안 블록스트림과 계열사들은 10억 달러의 자금을 조달했고 블록스트림의 기업 가치는 32억 달러에 달했다. 이 모든 것은 사토시가 실명으로 다시 나타나 자신의 창작물에 대한 주도권을 되찾기로 했다면 취했을 법한 행동과 일치해 보였다.' },
          { type: 'p', text: '2014년 가을, 백 씨와 블록스트림 동료들은 백 씨가 고안한 "페그드 사이드체인(pegged sidechains)"이라는 혁신에 관한 백서를 발표했다. 백 씨가 제1 저자인 이 백서에는 디지캐시(DigiCash)가 언급되어 있었다. 1980년대 후반 암호학자 데이비드 차움(David Chaum)이 설립한 디지캐시는 비트코인과 달리 자체 소유·운영하는 중앙 서버에 의존하는 선구적인 전자 통화를 만들었다. 1998년 디지캐시가 파산하면서 통화도 함께 사라졌다. 백서의 서론에는 "중앙 서버에 대한 의존이 디지캐시의 아킬레스건이 됐다"고 적혀 있었다. 이것은 5년 전 사토시가 디지캐시의 실패를 설명했던 방식과 정확히 일치했다. "물론 가장 큰 차이점은 중앙 서버의 부재입니다. 그것이 차움식 시스템의 아킬레스건이었습니다"라고 사토시는 썼다.' },
          { type: 'p', text: '이듬해인 2015년, 비트코인 커뮤니티는 블록 크기 확대 제안을 두고 갈라섰다. 개발자 가빈 안드레센(Gavin Andresen)과 마이크 헌(Mike Hearn)이 이끄는 진영은 더 많은 거래를 처리하기 위해 블록을 훨씬 크게 늘리려 했다. 하지만 이는 논란이 됐다. 블록이 커지면 비트코인 노드를 운영하는 사용자들이 더 강력한 하드웨어와 빠른 인터넷 연결을 갖춰야 하기 때문이다. 노드 운영 비용이 너무 높아지면 사용자들은 노드를 꺼버릴 수밖에 없고, 결국 네트워크가 소수의 대형 데이터 센터 손에 넘어가게 된다. 그러면 데이터 센터들이 담합해 네트워크를 장악할 수 있어 보안이 위협받는다. 백 씨는 블록 크기 확대에 강력히 반대했다. Bitcoin-dev 리스트에 연이은 게시물을 올리며 안드레센과 헌의 제안에 점점 더 강한 어조로 경고를 쏟아냈다.' },
          { type: 'p', text: '그러던 중, 난데없이 사토시가 백 씨의 입장과 정확히 맞아떨어지는 이메일을 들고 리스트에 나타났다. 전해에 뉴스위크 기사가 자신의 정체를 밝혔다는 것을 부인하는 다섯 단어짜리 게시물을 올린 것을 제외하면, 4년여 만에 처음 들리는 사토시의 소식이었다. 사토시의 다른 이메일 계정이 이전에 해킹된 적이 있었기에, 비트코인 커뮤니티의 많은 이들은 새 이메일의 진위를 의심했다. 하지만 백 씨는 이메일이 진짜라고 주장했다. 여러 트윗에서 그는 사토시의 관찰이 "정확하고" "내 생각엔 사토시의 견해와 일치한다"고 말하며 이메일을 직접 인용했다.' },
          { type: 'p', text: '백 씨의 판단은 아마 옳았을 것이다. 오늘날까지 그 이메일이 위조됐음을 보여주는 증거는 없으며, 그 계정에서 다른 이메일이 등장한 적도 없다. 사토시의 이메일은—아무도 눈치채지 못했지만—직전 몇 주간 백 씨의 게시물 어조와 매우 유사했다. 백 씨처럼 사토시도 비트코인 네트워크의 심화하는 중앙집중화가 보안을 위협한다고 주장했다. 빅 블록 제안을 매우 "위험하다(dangerous)"고 표현했는데, 이는 백 씨가 반복해서 사용한 단어였다. "widespread consensus", "consensus rules", "technical", "trivial", "robust" 같은 단어와 구절도 백 씨가 써온 것들이었다. 이메일 말미에서 사토시는 안드레센과 헌을 포퓰리즘 전술로 비트코인을 빼앗으려는 무모한 두 개발자로 비난하며 이렇게 덧붙였다. "지금 이 상황이 이렇게 전개되는 것을 지켜보는 것이 매우 실망스럽습니다." 4일 후, 같은 스레드의 게시물 중간에 백 씨는 이렇게 썼다. "가빈과 마이크, 정말 실망스럽네요."' },

          { type: 'h2', text: 'III. 포위망을 좁히며' },
          { type: 'h3', text: '대안 이론들' },
          { type: 'p', text: '나는 내 가설을 검증해볼 필요가 있었다. 밤늦게 침대에 누워서, 혹은 아침에 샤워를 하면서 내가 틀렸을 이유들을 생각해봤다. 언론인 벤저민 월리스가 사토시를 찾아 헤매다 결론을 내리지 못한 긴 여정을 담은 책 "신비로운 미스터 나카모토"에서 읽은 한 가지 주장은, 백 씨는 철저한 프라이버시 옹호자인 반면 비트코인의 프라이버시 기능은 취약하다는 것이었다. 처음에는 그럴듯하게 들렸다. 하지만 백 씨는 다른 프라이버시 지향 사이퍼펑크들처럼 비트코인을 외면하기는커녕, 지난 10년간 블록스트림에서 비트코인의 프라이버시를 강화하는 혁신을 개척하는 데 전념했다. 이는 그 주장의 설득력을 크게 떨어뜨렸다. X에서 백 씨는 자신이 사토시일 수 없는 또 다른 이유를 내세웠다. 처음 커뮤니티에 합류했을 때 #bitcoin-wizards 인터넷 릴레이 채팅(IRC) 채널에서 너무 어리석은 질문을 많이 했다는 것이다.' },
          { type: 'p', text: '#bitcoin-wizards IRC 채널은 비트코인 코어 개발자들, 즉 "마법사들"이 버그 수정과 소프트웨어 개선 방안을 논의하던 인터넷 채팅방이다. 채널 기록을 읽어봤지만 아무것도 모르는 초보자라는 증거는 거의 없었다. 오히려 백 씨가 비트코인의 취약점에 얼마나 정확히 반응했는지, 합류한 지 불과 몇 주 만에 시스템 강화에 얼마나 집중했는지에 놀랐다. 시스템을 개선하려는 그의 아이디어 일부는 너무 정교해서 다른 마법사들도 따라가기 어려울 정도였다. 그가 다른 암호화폐들을 신랄하게 무시하며 언젠가 그것들을 전부 죽이고 싶다고 쓴 것도 눈에 띄었다.' },
          { type: 'p', text: '다른 주요 사토시 용의자들은 어떨까? 백 씨보다 사토시 프로필에 더 잘 맞는 사람이 있을까? 이 신문의 2015년 기사는 1998년에 "비트 골드(bit gold)"라는 비트코인 유사 개념을 제안한 헝가리계 미국인 컴퓨터 과학자 닉 자보(Nick Szabo)가 사토시라는 가설을 제시했다. 자보 씨는 최근까지 많은 이들의 의심 목록 상단에 올라 있었지만, 비트코인 코어 소프트웨어 업데이트 제안을 둘러싸고 X에서 벌어진 격론이 비트코인의 기본적인 기술적 측면에 대한 그의 무지를 드러냈다. 소프트웨어 엔지니어이자 프라이버시 옹호자인 렌 새서먼(Len Sassaman)과 앞서 언급한 피니 씨도 자주 거론되는 용의자들이었다.' },
          { type: 'p', text: '하지만 피니 가설의 문제 중 하나는 사토시가 다른 누군가에게 이메일과 비트코인을 보내던 2009년 4월, 그가 10마일 경주를 뛰는 모습이 사진에 찍혔다는 점이다. 더 큰 문제는 사토시가 2015년 8월 마지막으로 등장했을 때 피니 씨와 새서먼 씨 모두 이미 세상을 떠난 상태였다는 것이다. 피니 씨는 2014년 루게릭병(ALS)으로 사망했고, 새서먼 씨는 2011년 스스로 목숨을 끊었다. HBO가 지목한 피터 토드(Peter Todd)의 경우, 다큐멘터리 증거의 핵심은 토드 씨가 기술적 오류를 지적하며 사토시를 수정한 2010년 비트코인톡 스레드였다. 다큐멘터리는 토드 씨의 게시물이 실제로는 사토시가 자신의 생각을 마무리한 것이라고 추측했다. 그러려면 인터넷 보안 운영의 대가인 사토시가 상상할 수 있는 가장 기초적인 실수—실명으로 잘못 로그인하는 것—를 저질렀다고 믿어야 한다.' },
          { type: 'p', text: '또한 비트코인 백서가 발표됐을 때 토드 씨는 겨우 23세였다. 훨씬 나이 많고 경험 풍부한 암호학자들도 해결하지 못한 난제를 풀기엔 너무 이른 나이였다. 더욱이 다큐멘터리가 방영된 후, 토드 씨는 사토시가 비트코인톡에 글을 올리던 날짜와 시간에 자신이 스키를 타거나 동굴 탐험을 하고 있었음을 보여주는 사진을 와이어드(Wired) 잡지에 제시했다. 비트코인이 한 사람이 아닌 여럿으로 이루어진 그룹에 의해 만들어졌다는 추측도 있다. 그 이론도 믿지 않았다. 비밀을 아는 사람이 많아질수록 유출될 가능성이 높아진다. 사토시의 비밀은 17년간 완벽하게 지켜져 왔다.' },

          { type: 'h3', text: '"글보다는 코드를 다루는 데 더 능숙하다"' },
          { type: 'p', text: '백 씨는 여전히 내게 가장 유력한 후보였다. 하지만 이제는 그것만으로는 부족하다는 느낌이 들었다. 더 법의학적인 증거를 찾아 나섰다. 어느 날 사이퍼펑크 아카이브를 뒤지다가 의자에서 벌떡 일어날 뻔할 만큼 놀라운 유사점을 발견했다. 사토시가 피니 씨에게 "제대로 설명할 수만 있다면" 자유주의자들이 비트코인을 받아들일 것이라고 말했을 때 덧붙인 말이 있었다.' },
          { type: 'email', from: 'Satoshi Nakamoto', date: '금요일, 2008년 11월 14일 13:55:35 EST', body: '저는 글보다는 코드를 다루는 데 더 능숙하지만요.' },
          { type: 'p', text: '백 씨도 익명성과 언론의 자유를 두고 다른 사이퍼펑크와 논쟁하면서 비슷한 말로 똑같은 심정을 표현한 적이 있었다.' },
          { type: 'email', from: 'Adam Back <aba@dcs.ex.ac.uk>', date: '금요일, 1996년 9월 6일 06:34:59 +0800', to: 'mech@eff.org', body: '개인적으로 저는 설득력 있는 주장을 구성하는 것보다 코딩을 더 잘한다고 생각합니다.' },
          { type: 'p', text: '자세히 들여다볼수록 문체적 유사점이 더 많이 발견됐다. 사토시처럼 백 씨도 문장 사이에 공백을 두 번 넣었다. 50세 이상임을 시사하는 시대에 뒤처진 관행이다. 백 씨는 55세다. 사토시는 비트코인톡에서 자신의 발명품을 일반 대중에게 설명하기 어렵다고 불평하면서 영국 속어인 "bloody(빌어먹을)"를 사용한 것으로 유명하다. 2023년 10월 X에 올린 여러 게시물에서 백 씨는 자신이 그 단어를 결코 쓰지 않는다고 주장했다. "구글에서 직접 검색해보세요. 제가 쓰는 단어가 아닙니다."' },
          { type: 'p', text: '그런데 나는 백 씨가 인터넷 배너 광고에 대한 짜증을 표현하면서 "bloody"를 사용한 1998년 사이퍼펑크 리스트 게시물을 찾아냈다. "점점 우스워지고 있네요(ridiculus, 오타). 요즘 내 믿음직한 28.8k 모뎀 대역폭의 대부분이 빌어먹을(bloody) 배너들로 채워집니다!" 숨길 것이 없다면 분명히 사용한 단어를 그렇게까지 완강하게 부인할 이유가 없었다.' },
          { type: 'img', src: 'docs/satoshi/original/Biz-Cypher-02-vtgp-articleLarge.jpg', cap: '희미한 조명 속 컨퍼런스 무대 뒤에 서 있는 아담 백. 오른쪽에 한 여성이 서 있다.' },
          { type: 'p', text: '작가를 식별하는 가장 신뢰할 수 있는 방법은 형태계량학(Stylometry)이다. "the", "and", "of", "to" 같은 기능어의 빈도와 거리를 측정해 작가의 문체적 지문을 확립하는 방법이다. 2022년 프랑스 국립고문서학교(École nationale des chartes)의 전산 언어학자 플로리안 카피에로(Florian Cafiero)는 이 기법을 활용해 뉴욕타임스가 큐어논(QAnon) 운동 뒤에 있는 두 인물을 특정하는 것을 도왔다. 하지만 그는 월리스 씨의 책을 위해 사토시 특정을 시도했다가 실패한 적이 있었다. 뭔가 놓쳤을지도 모른다는 생각에 카피에로 씨에게 다시 한번 시도해달라고 부탁했고, 그는 흔쾌히 응했다.' },
          { type: 'p', text: '백 씨는 카피에로 씨가 처음 검토했던 용의자 중 한 명이었다. 하지만 백 씨의 논문 대부분이 다른 암호학자들과의 공저였기 때문에 누가 실제로 글을 썼는지 파악하기 어려워 분석에 걸림돌이 됐다. 이번에 카피에로 씨는 공저 논문을 제외하고 백 씨의 해시캐시 논문과 박사 논문만 선택했다. 그런 다음 피니 씨, 자보 씨, 새서먼 씨, 토드 씨를 포함한 다른 11명의 사토시 용의자가 쓴 학술 논문 풀에 이것들을 추가했다. 카피에로 씨는 강의와 다른 프로젝트들로 바빴기에 답변을 받기까지 약 6주가 걸렸다. 며칠마다 Signal 앱으로 진행 상황을 확인했다. 기대를 낮추려 애썼지만 흥분은 가라앉지 않았다.' },
          { type: 'p', text: '7월 말 어느 날 아침, 문자로 결과가 도착했다. 12명의 논문을 비트코인 백서와 비교한 결과, 카피에로 씨의 형태계량학 프로그램은 백 씨를 가장 유사한 인물로 지목했다. 하지만 딱 들어맞는 결과는 아니었고, 피니 씨가 아주 근소한 차이로 2위였다고 했다. 사실 두 사람의 차이는 거의 구별하기 어려운 수준이었으며, 전반적인 결과는 결정적이지 않다는 것이 그의 판단이었다.' },
          { type: 'p', text: '믿기지 않는다는 듯 휴대폰 화면을 바라봤다. 누군가 눈앞에 초콜릿 무스를 놓아두고 내가 한 입 맛보기도 전에 낚아채 간 느낌이었다. 내 좌절을 감지한 카피에로 씨는 12명의 텍스트와 비트코인 백서 사이의 거리를 계산하는 방식을 바꿨다. 결과는 기대와 정반대였다. 다른 후보들이 백 씨를 앞질렀다. 카피에로 씨는 이 결과도 결정적이지 않다고 봤다. 8개월간의 취재와 사토시의 정체에 쏟아부은 수많은 시간 끝에, 드디어 미스터리를 풀기 직전이라고 생각했다. 하지만 이제 다시 손이 닿지 않는 곳으로 멀어진 것 같았다.' },

          { type: 'h3', text: '맞춤법과 문법' },
          { type: 'p', text: '모든 실망에도 불구하고, 문제가 무엇인지는 어느 정도 파악하고 있었다. 카피에로 씨는 사토시가 형태계량학의 원리를 안다면 자신을 방어하기 위해 문체를 바꾸기가 쉬웠을 것이라고 여러 차례 말했다. 2020년 한 트윗에서 백 씨가 사토시의 글을 "간결하고 집중력 있다"고 묘사하며 "형태계량학적 위험을 줄이기 위해 감정적 수사, 불필요한 형용사, 주제를 벗어난 잡담을 최소화했다"고 추측한 대목이 눈길을 끌었다. 사토시와 백 씨 모두 형태계량학에 대해 분명히 알고 있었다.' },
          { type: 'p', text: '사실 백 씨는 글쓰기 분석을 무력화하는 방법을 오랫동안 고민해왔다. 1998년 가을, 그는 가명을 쓰는 작가가 실명으로 다작을 한 경우 신원이 노출되기 쉽다고 지적하며 "이 문제를 이따금 생각해 보았다"고 썼다. 그는 작가의 개인적 특성을 알아채기 어렵도록 명사·동사·형용사를 드롭다운 메뉴에서 선택하는 다중 선택 문장 생성기 개발을 제안했다. 이를 염두에 두고, 맞춤법과 문법에 초점을 맞춘 다른 접근법을 시도했다. 백 씨는 메일링 리스트 글쓰기에서 오타가 잦고 두서없는 편이었던 반면, 사토시의 글은 간결하고 대체로 오타가 없었다. 하지만 사토시의 알려진 모든 글을 여러 차례 읽고 백 씨의 게시물 1,000여 개를 샅샅이 뒤진 끝에, 두 사람이 공유하는 몇 가지 글쓰기 버릇을 찾아냈다.' },
          { type: 'p', text: '백 씨는 종종 "it\'s"와 "its"를 혼동했으며, 문장 끝에 "also"를 붙이는 습관이 있었다. 사토시의 글에서도 각각 다섯 차례씩 같은 사례가 발견됐다. 두 사람 모두 하이픈을 올바르게 쓰는 것에 병적으로 무능한 것 같았다. 백 씨처럼 사토시도 불필요할 때 하이픈을 넣고 필요할 때 빼는 경향이 있었다. 예를 들어 복합 명사 "double-spending(이중 지출)"에는 하이픈을 넣었지만, 복합 형용사 "hand tuned", "full blown", "would be", "file sharing"은 백 씨와 마찬가지로 하이픈 없이 썼다.' },
          { type: 'p', text: '사토시와 백 씨 모두 명사에 "based"가 결합된 복합 형용사에는 하이픈을 쓰지 않는 경향이 있었다. 다음 사토시의 인용구처럼 말이다. "In the mint based model, the mint was aware of all transactions and decided which arrived first."(mint-based 대신 mint based로 표기) 두 사람은 특정 단어와 표현에 하이픈을 넣기도 하고 넣지 않기도 했다. 예를 들어 "e-mail"과 "email", "built-in"과 "built in", "off-line"과 "offline", "pre-compiled"과 "precompiled", "to-do list"와 "to do list"를 번갈아 썼다. 두 사람 모두 "electronic cash"라고 풀어 쓰기도 하고 "e-cash"로 줄이기도 했다.' },
          { type: 'p', text: '백 씨처럼 사토시도 영국식 "cheque"와 미국식 "check", 영국식·미국식 "optimize" 표기를 번갈아 사용했다. 그리고 두 사람 모두 "backup"과 "bugfix"를 한 단어로 붙여 쓰기도 하고(전자는 동사로 사용), "half way"와 "down side"는 두 단어로 띄어 쓰기도 했다. 호프스트라 대학교의 법의 언어학 전문가 로버트 레너드(Robert Leonard)에게 이 특이한 버릇들에 대해 물었을 때, 그는 그것들이야말로 작가를 특정할 때 자신이 주목하는 유형이라고 말했다. 그는 이를 작가의 사회적 배경, 지리적 출신, 직업적 훈련을 짚어내는 데 도움이 되는 언어적 지문, 즉 "사회언어학적 변이의 표지(markers of sociolinguistic variation)"라고 불렀다. 소수의 사람에게만 공통되거나 특정 작가에게 고유한 표지들이 가장 많은 것을 드러낸다고 그는 말했다. 사토시의 글에서 그 조건에 맞는 표지를 최소 세 가지 발견했다.' },
          { type: 'p', text: '처음 두 가지는 사토시가 특별한 방식으로 표기한 암호학 개념들이었다. 그중 하나는 "proof of work(작업 증명)"로, 두 암호학자가 1999년 논문에서 해시캐시 같은 퍼즐 해결 프로토콜을 설명하기 위해 만든 용어다. 올바른 문법에 따르면 복합 명사이므로 원저자들은 하이픈을 쓰지 않았다. 하지만 사토시는 달랐다. 비트코인 백서에서 그는 반복해서 "proof-of-work"에 하이픈을 넣었다. 그때까지 사이퍼펑크나 크립토그래피 리스트에서 이를 복합 명사로 쓰면서 하이픈을 넣은 사람은 단 8명뿐이었다.' },
          { type: 'p', text: '그 8명을 좁히기 위한 방법을 찾다가, 사토시가 말미에게 보낸 이메일 중 하나에서 웹머니(WebMoney)라는 낯선 러시아 온라인 화폐를 언급했던 것이 떠올랐다. 조사해보니 사이퍼펑크나 크립토그래피 리스트에서 웹머니를 언급한 사람은 4명뿐이었다. 이 4명의 이름을 "proof-of-work"에 하이픈을 넣은 8명과 대조했다. 겹치는 사람은 단 한 명, 백 씨였다.' },
          { type: 'p', text: '비트코인의 해시캐시 유사 채굴 기능 작동 방식을 설명하기 위해 사토시가 크립토그래피 리스트에서 "partial pre-image"라는 표현을 쓰기 전까지 이 표현을 사용한 사람은 더 적었다. 내가 찾아낸 사람은 해시캐시와 관련해 피니 씨와 백 씨 단 둘뿐이었다. 그런데 결정적인 차이가 있었다. 피니 씨는 "preimage"를 한 단어로 썼지만, 백 씨는 사토시처럼 하이픈을 넣는 경향이 있었다. 내가 주목한 세 번째 언어적 표지는 사토시가 에스크로 기능을 논하며 쓴 "burning the money(돈 태우기)"라는 표현이었다. 비트코인을 소각한다는 의미로 사용한 것이었다. 사토시 이전에 사이퍼펑크나 크립토그래피 리스트에서 전자 화폐를 "태운다(burning)"는 개념을 논의한 사람은 단 한 명, 1999년 4월의 백 씨뿐이었다.' },

          { type: 'h3', text: '34,000명에서 단 한 명으로' },
          { type: 'p', text: '사토시의 글을 더 체계적으로 분석할 방법을 찾고 싶었다. 컴퓨터 텍스트 분석 경험이 있는 뉴욕타임스 인공지능 팀 소속 기자 딜런 프리드먼(Dylan Freedman)에게 도움을 청했다. 내 확신은 이랬다. 사토시는 여러 사이퍼펑크 멤버를 알고 있었고, 크립토그래피 리스트에 백서를 발표했으며, 비트코인에 해시캐시를 통합했다. 따라서 그는 사이퍼펑크·크립토그래피·해시캐시 메일링 리스트에 모였던 암호학 커뮤니티의 일원일 것이다. 우리는 인터넷에서 세 리스트의 아카이브를 모두 수집해 검색 가능한 거대한 데이터베이스 하나로 합치기로 했다. 1992년부터 사토시가 처음 등장하기 전날인 2008년 10월 30일 사이에, 3만 4,000명이 넘는 사용자가 세 리스트에 글을 올렸다. 상당수가 스패머이거나 게시물이 몇 개에 불과한 사용자들이었기에 게시물이 10개 미만인 사람을 모두 제외했다. 그러자 후보군이 1,615명으로 줄었다. 디지털 화폐에 대해 논의한 적 없는 사용자도 걸러냈다. 그러자 620명이라는 더 작은 후보군이 남았다. 이 620명이 작성한 게시물은 총 13만 4,308개였다.' },
          { type: 'p', text: '이상적인 환경이라면 편향이 개입될 위험 없이 이 방대한 자료를 분석할 수 있었을 것이다. 카피에로 씨가 자주 상기시켜주었듯 형태계량학 분야는 이 점을 자부했다. 하지만 형태계량학은 실패했다. 대안적 방법은 사토시의 글에서 동의어가 없는 단어를 모두 찾아내고, 620명의 용의자 중 그 단어들을 가장 많이 사용한 사람을 측정하는 것이었다. 동의어가 없는 단어들은 대체로 전문 기술 용어여서 흔한 단어들을 걸러낼 수 있었다. 또한 동의어가 없는 단어는 쉽게 대체하기 어렵기 때문에, 백 씨가 제안했던 다중 선택 문장 생성기 같은 방어 수단을 무력화하는 부가 효과도 있었다. 이 방법을 시도해봤다. 백 씨가 사토시와 521개의 동의어 없는 단어를 공유하며 1위에 올랐다. 다른 몇몇 사이퍼펑크들도 큰 차이 없이 뒤를 이었지만, 그들은 모두 백 씨보다 훨씬 많은 글을 썼기 때문에 백 씨의 존재감이 더욱 두드러졌다.' },
          { type: 'p', text: '더 결정적인 증거를 찾기 위해 취재 내용을 바탕으로 두 가지 추가 분석을 고안했다. 첫 번째는 사토시의 하이픈 문법 오류를 집중 분석하는 것이었다. 뉴욕타임스 스타일북을 올바른 하이픈 사용의 기준으로 삼고 해당 섹션을 AI 모델에 학습시켰다. 그런 다음 AI로 사토시의 글을 스캔했다. 그 결과 사토시의 하이픈 사용에서 325개의 명확한 오류를 발견했다. 그 오류들을 수백 명의 용의자 글과 비교했을 때 백 씨는 압도적인 이상치(outlier)였다. 사토시의 정확한 하이픈 오류 67개를 그대로 반복했다. 두 번째로 많이 일치한 사람은 38개였다.' },
          { type: 'p', text: '다시 620명의 후보로 돌아와, 내가 사토시의 글에서 확인했던 다른 글쓰기 버릇들을 공유하는 사람이 얼마나 되는지 알아봤다. 먼저 사토시처럼 문장 사이에 이따금 공백을 두 번 넣는 게시자들을 걸러냈다. 58명이 탈락하고 562명이 남았다. 다음으로 영국식 철자를 쓰는 게시자들을 선별해 목록을 434명으로 줄였다. 이어서 "it\'s"와 "its"를 혼동하는 게시자들을 걸러내자 후보가 114명으로 좁혀졌다. 사토시처럼 "also"로 문장을 끝내는 경우가 있는 게시자를 추리자 56명으로 더 줄었다. 그중 "bug fix"를 두 단어로 쓰고 "halfway"와 "downside"를 한 단어로 쓰는 게시자를 제외하자 20명으로 압축됐다. 아직 꽤 많은 후보가 남아 있었지만, 처음 출발점에 비하면 훨씬 다루기 쉬운 숫자였다. 거기서 사토시와 달리 복합 형용사 "noun-based"와 "file-sharing"에 하이픈을 올바르게 넣으면서도 복합 명사 "double spending"에는 하이픈을 넣지 않은 게시자를 제외했다. 그 결과 8명으로 줄었다. 그런 다음 데이터베이스에 물었다. 남은 8명 중 사토시처럼 "e-mail"과 "email", "e-cash"와 "electronic cash", "cheque"와 "check", 그리고 영국식과 미국식 "optimize"를 번갈아 쓰는 사람은 몇 명인가? 답은 단 한 명, 아담 백이었다.' },

          { type: 'h2', text: 'IV. 대면' },
          { type: 'h3', text: '엘살바도르' },
          { type: 'p', text: '여전히 사토시의 신원에 대한 결정적인 증거는 없었다. 오직 사토시 자신만이 비트코인 초기 블록들과 연결된 개인 키를 사용함으로써 이를 증명할 수 있었다. 하지만 이제 나는 방대한 증거를 손에 쥐고 있었다. 11월 중순, 백 씨에게 다시 인터뷰를 요청하는 이메일을 썼다. 이번에는 에둘러 말하지 않았다. 그가 사토시라는 결론에 이르렀으며, 내가 밝혀낸 모든 것을 보여주고 그에게 해명할 기회를 주고 싶다고 썼다. 심지어 몰타까지 직접 날아가겠다고 제안했다. 이번에도 그는 답장하지 않았다. 그래서 두 달 후 그가 엘살바도르의 비트코인 컨퍼런스에서 연설하기로 예정된 자리에서 직접 접근하기로 결심했다.' },
          { type: 'p', text: '1월 하순, 계획을 품고 따뜻한 산살바도르에 도착했다. 백 씨의 패널은 컨퍼런스 둘째 날이었다. 그때 다가갈 생각이었다. 그런데 첫째 날 오후 늦게, 그가 X 피드에 이미 컨퍼런스 무대에 선 사진을 올린 것을 발견했다. 당황해서 기회를 놓쳤을까 봐 걱정된 나는 그를 찾을 수 있을까 싶어 연사 라운지로 달려갔다. 하지만 경호원들이 출입을 막았기에 라운지 입구 근처에 자리를 잡고 문에 시선을 고정했다. 30분 후 백 씨가 나왔다. 다가가 다시 인사를 하고 찾아온 이유를 설명했다. 그는 약간 당황한 기색이었지만, 뜻밖에도 흔쾌히 다음 날 아침 컨퍼런스 장소로도 쓰이는 자신의 호텔 로비에서 만나기로 동의했다.' },
          { type: 'p', text: '약속 시간에 도착하니, 백 씨 옆에는 그가 공동 창업한 새로운 비트코인 재무회사(treasury company)의 임원 두 명이 함께 있었다. 회사가 상장을 앞두고 있어 언론과의 접촉에 더 신중해야 한다고 그는 설명했다. 이 새로운 상황은 전혀 몰랐던 것이었다. 비트코인 재무회사는 자금을 빌려 비트코인을 사들여 투자자에게 암호화폐에 더 공격적으로 베팅할 수 있는 수단을 제공한다. 백 씨는 지난여름 회사를 창업했고, 하워드 루트닉 현 상무부 장관이 과거 이끌었던 월스트리트 회사 캔터 피츠제럴드(Cantor Fitzgerald)가 설립한 상장 페이퍼 컴퍼니와 합병을 추진 중이었다. 합병 법인의 최고경영자로서 백 씨는 미국 증권법에 따라 투자자에게 중대한(material) 정보를 공시할 의무가 있었다. 예컨대 갑작스러운 매도 시 비트코인 시장을 붕괴시킬 수 있는 110만 개의 비밀 코인 보관소는 아마도 중대 정보로 간주될 것이었다. 이 새로운 상황을 머릿속에 담은 채 우리 넷은 백 씨의 호텔 방으로 올라갔다. 검은 티셔츠에 검은 슬랙스를 입은 백 씨는 햇볕에 그을린 편안한 모습이었다.' },
          { type: 'p', text: '그 후 2시간 동안 증거를 하나씩 제시했다. 백 씨는 부드러운 영국 억양으로 자신이 사토시가 아니라고 우기며 모든 것을 일련의 우연으로 치부했다. 하지만 때로 그의 몸짓이 다른 이야기를 했다. 설명하기 어려운 것들에 맞닥뜨릴 때 그의 얼굴이 붉어졌고 자리에서 불편하게 몸을 뒤틀었다. 예를 들어, 백 씨는 일이 바빴다는 핑계 외에 사토시가 활동하던 시기에 크립토그래피 리스트에서 자신이 자취를 감춘 이유를 제대로 설명하지 못했다. "Let\'s Talk Bitcoin" 팟캐스트에서 참여했다고 주장했지만 실제 참여 흔적이 전혀 없는 2008년 말 리스트 토론에 대해서도 납득할 만한 답을 내놓지 못했다. 두 가지를 모두 밀어붙이자 백 씨는 방어적으로 변했다. "궁극적으로 그것은 아무것도 증명하지 못합니다. 그리고 분명히 말씀드리지만, 정말로 제가 아닙니다."라고 날카로운 어조로 말했다. 글쓰기 분석 결과를 꺼내자 백 씨는 해명을 더듬거렸지만 찾지 못했다. "모르겠습니다. 제가 아닌 건 맞지만, AI가 데이터를 바탕으로 그렇게 결론을 냈다는 건 이해합니다. 하지만 여전히 제가 아닙니다."' },
          { type: 'p', text: '백 씨는 없는 것을 증명하기란 어렵다고 주장했다. 그러면서 자신이 사토시가 아니라는 증거 한 가지를 제시했다. #bitcoin-wizards IRC 채널에 처음 합류했을 때 비트코인에 대해 너무 무지해서 비트코인 주소가 변동하는 은행 잔고처럼 작동한다고 착각했다는 것이다. (비트코인 주소는 달러 지폐가 들어 있는 실제 지갑에 가깝다. 거래 후 받는 거스름돈은 완전히 새로운 디지털 코인으로 이루어진다.) 문제는 채널 기록에 그런 오해의 흔적이 전혀 없었다는 점이다. 이를 지적하자 백 씨는 가볍게 넘겼다. "내가 헛것을 본 거라면 진짜 웃기겠네요." (후속 이메일에서 그는 기록되지 않은 다른 IRC 채널에서 일어난 일이었을 수도 있다고 했다.) 백 씨는 반다스 번 넘게 자신이 사토시가 아니라고 부인했다. 하지만 비트코인이 발명되기 수년 전에 그가 비트코인의 거의 모든 측면을 구상했음을 지적했을 때 나온 부인 한마디가 꽤 많은 것을 드러냈다고 느꼈다. "분명히 저는 사토시가 아닙니다. 그것이 제 입장(position)입니다." 사실에 근거한 진술이라기보다는 수사적 스탠스처럼 들렸다. 백 씨는 재빨리 말을 수습하며 덧붙였다. "그리고 그것은 또한 사실이기도 합니다, 그 말이 어떤 가치를 지니든 간에요."' },
          { type: 'p', text: '몇 가지는 백 씨도 내 생각에 동의했다. 사토시가 될 만한 배경과 역량을 자신이 갖추고 있음을 인정했다. 사토시가 50세 이상의 영국인이며 사이퍼펑크 멤버였을 것이라는 데도 동의했다. 그는 또한 내가 눈치챈 이메일 속 모순에 대해서도 인정했다. 사토시가 백 씨의 해시캐시 논문을 읽었다면 비머니에 대해 알고 있어야 했을 것이라고 백 씨도 수긍했다. 하지만 그는 그 이메일들이 자신으로부터 의심을 돌리기 위한 속임수라는 주장은 부인했다. 메타데이터 제공에 동의했다면 더 설득력 있었을 것이다. 하지만 그는 내 요청을 계속 무시했다. 아직 따져 묻고 싶은 것이 몇 가지 남아 있었지만, 그의 측근들이 다른 회의가 있다고 알렸다. 우리는 엘리베이터를 타고 로비로 내려갔고, 치열한 승부를 마친 두 체스 선수처럼 악수를 나눴다.' },
          { type: 'p', text: '유쾌한 컨퍼런스 참가자들 속으로 백 씨가 사라지는 것을 지켜보며 무언가가 마음에 걸렸다. 찰나의 순간이었지만, 그가 무심코 자신이 사토시인 것처럼 무언가를 말한 것 같았다. 하지만 무엇인지 기억나지 않았다. 뉴욕의 집에 돌아와 녹음 파일에서 그것을 찾아냈다. 내가 백 씨와 사토시의 글 사이의 유사점을 짚어주고 있을 때였다. 사토시의 인용문을 꺼내려 했는데, 내가 그 이유를 설명하기도 전에 백 씨가 말을 끊었다. 나: 앞서 언급한 사토시의 말이 있는데요, "저는 글보다는 코드를 다루는 데 더 능숙합니다."라고요. 아담 백: 그래도 누군가치고는 말을 꽤 많이 했죠, 내 말은… 제가 말주변이 좋다는 건 아닌데, 사실 이 메일링 리스트에서 수다(yakking)를 꽤 많이 떨었거든요. 내 귀에는, 코드를 더 선호하는 사람치고는 확실히 말을 많이 했다는 인정처럼 들렸다. 그 이면에는 자신이 그 인용문의 주인공이라는 고백이 담겨 있었다. 다시 말해, 몇 초 동안 백 씨는 가면을 내려놓고 사토시가 됐던 것이다.' },
          { type: 'p', text: '며칠 후 이 대목을 따져 묻는 이메일을 보냈다. 그는 말실수가 아니라고 부인했다. "기술자들이 산문보다 코드로 아이디어를 표현하는 것을 더 편하게 여기는 경우가 많다는 일반적인 관찰에 대해 일상적으로 답한 것뿐입니다."라고 그는 썼다. 하지만 나는 아주 명확하게 물었었다. 특정 사토시 인용문에 대한 질문이었고, 백 씨도 그 사실을 알고 있었을 것이라 확신한다. 10년 전 사토시가 백 씨가 블록 크기 논쟁에서 이기도록 돕기 위해 은신처에서 나왔던 일이 떠올랐다. 그리고 여기, 엘살바도르의 고급 호텔에 사토시가 다시 나타나 있었다. 다만 이번에는 백 씨에게 별로 도움이 되지 않았다. 내 마음속에 남아 있던 마지막 의심까지 지워버렸기 때문이다.' },

          { type: 'takeaways', title: '비트코인 창시자 추적에서 얻은 4가지 핵심 발견', items: [
            '1. 아담 백이 비트코인의 거의 모든 기능을 먼저 구상했다. 백 씨는 1990년대 후반 메일링 리스트를 통해 탈중앙화 네트워크와 비트코인 설계의 청사진이 될 개념들을 이미 제안했다.',
            '2. 백 씨와 사토시를 연결하는 놀라운 유사점들이 있다. 백 씨는 분산 컴퓨터 시스템을 전공해 박사 학위를 받았고, 비트코인과 동일한 프로그래밍 언어를 사용했으며, 컴퓨터 보안의 대가였다.',
            '3. 사토시가 나타나자 백 씨가 사라졌다. 백 씨는 10여 년간 전자 화폐 논의에 열정적으로 참여했다. 하지만 2008년 말 비트코인이 등장하자 종적을 감췄다가, 사토시가 사라진 지 6주 후에 다시 나타났다.',
            '4. 백 씨와 사토시는 같은 글쓰기 버릇을 공유했다. 이중 공백 사용, 영국식 철자, 독특한 하이픈 오류 등 사토시의 글쓰기 버릇을 모두 충족하는 사람은 데이터베이스 수백 명 중 아담 백 한 명뿐이었다.'
          ]},

          { type: 'h2', text: '아담 백, 뉴욕타임스 보도에 사토시 부인' },
          { type: 'p', text: '"아담 백 박사는 자신이 사토시 나카모토가 아니라고 일관되게 밝혀왔다"고 그의 회사는 성명을 통해 말했다. "추측이 아닌 것이 있다면, 그것은 아담의 비트코인에 대한 근본적인 공헌이다."' },
          { type: 'p', text: '영국 컴퓨터 과학자 아담 백은 2026년 4월 8일 수요일, 자신이 사토시 나카모토임을 시사하는 증거를 제시한 뉴욕타임스 보도가 나온 직후, 자신이 비트코인의 가명 발명가가 아니라고 밝혔다. "저는 사토시가 아닙니다"라고 백 씨는 소셜 미디어 플랫폼 X에 올렸다. 자신은 비트코인 같은 것을 만들기에 "너무 가까웠지만 아쉽게 실패한" 개발자 중 한 명일 뿐이라고 덧붙였다.' },
          { type: 'p', text: '세계 최초의 암호화폐 창시자의 진짜 정체는 17년간 베일에 싸여 있었다. 기자 존 캐레이루가 주도한 타임스의 취재는 백 씨가 비공개 이메일들을 통해 사토시보다 10년 앞서 비트코인의 거의 모든 기능을 구상했음을 보여줬다. 또한 사토시가 2년 반 동안 온라인 포럼에 활발히 활동하는 동안 백 씨가 해당 포럼에서 대체로 자취를 감췄다가 사토시가 2011년 유명하게 사라진 직후 재등장했음을 밝혔다. 아울러 백 씨와 사토시의 온라인 게시물 및 이메일 간의 두드러진 유사점도 발견했다.' },
          { type: 'p', text: '백 씨는 비트코인 중심 회사 블록스트림(Blockstream)을 운영하고 있으며, 이 회사의 가치는 최고 32억 달러로 평가됐다. "오늘자 뉴욕타임스 기사는 선별된 세부 사항의 정황적 해석과 추측에 기반한 것으로, 결정적인 암호학적 증거가 아닙니다"라고 블록스트림 대변인은 수요일 성명에서 말했다. "아담 백 박사는 자신이 사토시 나카모토가 아니라고 일관되게 밝혀왔습니다. 추측이 아닌 것이 있다면, 그것은 아담의 비트코인에 대한 근본적인 공헌입니다."' }
        ]
      },
      en: {
        title: "Finding Satoshi Nakamoto",
        subtitle: "THE NEW YORK TIMES TECHNOLOGY REPORT",
        author: "By John Carreyrou (With Dylan Freedman)",
        body: [
          { type: 'p', text: 'One evening in the fall of 2024, my wife and I were sitting in traffic on the Long Island Expressway when, tired of listening to the jazz-funk station I often played on our drives, she switched to a podcast.', dropCap: true },
          { type: 'p', text: 'It was “Hard Fork,” the New York Times tech show, and the hosts were discussing a new HBO documentary claiming to have unmasked Bitcoin’s pseudonymous inventor, Satoshi Nakamoto.' },
          { type: 'p', text: 'I was instantly riveted. I had long considered the question of Satoshi’s true identity one of our age’s great enigmas and had poked at it before without success. Two years earlier, I had even spent several months researching a book on the subject. But I soon realized I was out of my depth and reluctantly gave up.' },
          { type: 'p', text: 'Hearing that someone else might have finally identified the shadowy figure who had revolutionized finance, spawned a $2.4 trillion industry and amassed one of the world’s biggest fortunes in one stroke of staggering genius aroused in me a mixture of admiration and envy. I couldn’t wait to watch the film. As soon as we got home that night, I logged in to the HBO Max app and pressed play.' },
          { type: 'p', text: 'In the end, I found the conclusion of “Money Electric: The Bitcoin Mystery” unconvincing: HBO singled out a Canadian software developer based on what seemed like very thin evidence. But as I watched what was an otherwise entertaining romp through the world of crypto, one scene caught my attention.' },
          { type: 'p', text: 'Adam Back, a British cryptographer and leading figure in the Bitcoin movement, sat on a park bench in Riga, Latvia, his shirt untucked under a brown coat. The filmmaker casually rattled off the names of several Satoshi suspects. At the mention of his own name, Mr. Back tensed up, strenuously denied he was Satoshi and asked that the conversation be kept off the record.' },
          { type: 'p', text: 'Having encountered my share of liars and developed something of an expertise in their tells, Mr. Back’s demeanor — his shifty eyes, his awkward chuckle, the jerky movement of his left hand — struck me as fishy. When the credits rolled up, I replayed the sequence several times on my TV.' },
          { type: 'img', src: 'docs/satoshi/original/00cypher-bars-02-articleLarge.jpg', cap: 'Adam Back, dressed in a black shirt, jacket and pants, stepping onto the base of a sculpture at a park.' },
          { type: 'img', src: 'docs/satoshi/original/Biz-Cypher-01-vtgp-articleLarge.jpg', cap: 'Adam Back, the British cryptographer, in Miami in February. Credit... Amir Hamja for The New York Times' },
          { type: 'p', text: 'While I pondered Mr. Back’s reaction, another thought occurred to me. An Australian impostor had been sued for falsely claiming he was Satoshi. What if the evidence disclosed in that court case, which had been tried in London a few months earlier, could help me unravel the mystery?' },
          { type: 'p', text: 'As anyone steeped in Bitcoin lore will tell you, Satoshi was a master at the art of maintaining anonymity on the internet, leaving few, if any, digital footprints behind.' },
          { type: 'p', text: 'But Satoshi did leave behind a corpus of texts, including a nine-page white paper outlining his invention and his many posts on the Bitcointalk forum, an online message board where users gathered to discuss the digital currency’s software, economics and philosophy. And that corpus, it turned out, had expanded significantly during the impostor’s civil trial when Martti Malmi, a Finnish programmer who collaborated with Satoshi in Bitcoin’s early days, released a trove of hundreds of emails he had exchanged with him. Emails Satoshi sent to other early Bitcoin adopters had surfaced before, but none came close in volume to the Malmi dump. If Satoshi was ever going to be found, I was convinced the key lay somewhere in these texts.' },
          { type: 'p', text: 'Then again, others must have gone down this road before me. Journalists, academics and internet sleuths had been trying to identify Satoshi for 16 years. During that span, more than 100 names had been put forward, including those of an Irish cryptography student, an unemployed Japanese American engineer, a South African criminal mastermind and the mathematician portrayed in the movie “A Beautiful Mind.”' },
          { type: 'p', text: 'The most alluring theories had focused on coincidences that aligned with what little was known about Satoshi: a particular code-writing style, a mysterious work history, an expertise in Bitcoin’s key technical concepts, an anti-government worldview. But they had run aground under the weight of an alibi or some other piece of inconsistent or contrary evidence. Each failure had been met with glee by many members of the Bitcoin community. As they liked to point out, only Satoshi could definitively prove his identity by moving some of his coins. Any evidence short of that would be circumstantial.' },
          { type: 'p', text: 'It seemed foolish to think that I could somehow crack a case that had confounded so many others. But I craved the thrill of a big, challenging story. So I decided to try once more to unmask Bitcoin’s mysterious creator.' },

          { type: 'h2', text: 'I. A Series of Clues' },
          { type: 'h3', text: 'Two Thin Leads' },
          { type: 'p', text: 'I started by looking for ways to narrow the field.' },
          { type: 'p', text: 'One thing that jumped out in Satoshi’s emails to Mr. Malmi and in his other writings was that he mixed British spelling and idioms with American expressions. Since many Satoshi suspects are American, some have speculated that he disguised his prose with Britishisms. But I never bought that theory because of a clue Satoshi left us.' },
          { type: 'p', text: 'In Bitcoin’s first block of transactions, Satoshi embedded text from a newspaper headline: “The Times 03/Jan/2009 Chancellor on brink of second bailout for banks.” The headline in question appeared in The Times of London’s British print edition. This felt like a sign that Satoshi really was British.' },
          { type: 'p', text: 'Satoshi was also very likely a member of the Cypherpunks, a group of anarchists formed in the early 1990s who wanted to use cryptography, the art of securing communications through code, to free individuals from government surveillance and censorship. The Cypherpunks interacted mostly through something called an internet mailing list. Ancestors of today’s message boards, mailing lists were large group emails in old typewriter font that subscribers received in their inbox. To communicate, respondents replied-all.' },
          { type: 'p', text: 'It’s hard to picture in the age of Venmo and Apple Pay, but one of the Cypherpunks’ biggest concerns was the digitization of financial transactions. When you hand someone a 20-dollar bill, no one knows where it came from. But when you pay for something with a check or a credit card, banks keep computer records. Cypherpunks worried that governments would use those records to track people’s lives. On their mailing list, they brainstormed about how to create “electronic cash”: digital money that would preserve the anonymity of physical currency. Some even came up with their own electronic cash systems, but none caught on — until Bitcoin.' },
          { type: 'p', text: 'Besides their shared interest in digital cash, there were other indications Satoshi belonged to the group. He announced his white paper on an offshoot of the Cypherpunks mailing list called the Cryptography list, and he seemed familiar with two of the group’s members.' },
          { type: 'p', text: 'At its peak in the late 1990s, the Cypherpunks counted some 2,000 followers, so that still left a wide pool of candidates. Armed with these admittedly thin leads, I pored over Satoshi’s body of writing, especially the emails released by Mr. Malmi, and made a list of words and phrases that stood out to me. It felt like trying to decipher a foreign dialect. More than once, I wondered whether I was engaging in a useless exercise.' },
          { type: 'p', text: 'My list eventually grew to more than a hundred words and phrases, taking up several pages in my notebook. Among those that caught my eye: “dang”; “backup,” used as a verb in one word; “human friendly”; “on principle”; “burning the money”; “abandonware”; “hand tuned”; and “partial pre-image.”' },
          { type: 'p', text: 'One phrase — “a menace to the network” — sounded like a line from a science fiction movie. The rest hinted at a weird combination of upper-class Brit, American redneck, computer geek and cryptographer. Using the advanced search function on the social media platform X, I did a cursory search to see if any of the dozen or so people most often suspected of being Satoshi used the terms I had highlighted. Not all Satoshi suspects have X accounts, so this wasn’t meant to be scientific. But, just as I had hoped, one person was a match for nearly all of my words and phrases: Mr. Back.' },
          { type: 'p', text: 'Staring at a long column of check marks I’d jotted in my notebook under his name, I felt a rush of adrenaline. My hunch now seemed at least partially founded. Mr. Back’s use of many of the same terms as Satoshi might not prove anything to a community that had been consumed with this topic for many years, but I doubted it was just chance.' },
          { type: 'p', text: 'As I took a closer look at Mr. Back, I realized he had several attributes that were consistent with Satoshi. For starters, he was British and he was a Cypherpunk. More important, Mr. Back had invented Hashcash, a statistical puzzle-solving system that Satoshi borrowed for the mining of bitcoins. Satoshi had cited Mr. Back and Hashcash in his white paper.' },
          { type: 'p', text: 'But Mr. Back had produced emails during the Australian impostor’s trial showing that Satoshi had contacted him in August 2008 before publishing the Bitcoin white paper to check his citation of Mr. Back’s Hashcash paper. Those emails seemed like proof that Mr. Back couldn’t be Satoshi. As I thought about it, however, I glimpsed a different possibility: Mr. Back could just as well have sent those emails to himself as a cover story.' },

          { type: 'h3', text: '‘Down the Cryptography Rabbit Hole’' },
          { type: 'p', text: 'With his wire-rimmed glasses, thinning gray hair and goatee, Mr. Back, 55, looks like a disheveled mathematician. Over the past dozen years, he has built a mini empire of Bitcoin-related companies and become one of the community’s most influential members. Mr. Back has long been among the top Satoshi candidates. But, unlike some other leading suspects, he hasn’t been the subject of close journalistic scrutiny, other than in a 2020 video by an anonymous YouTuber who goes by the handle “Barely Sociable.”' },
          { type: 'p', text: 'A year ago, I flew to Las Vegas to meet him. He was scheduled to speak at the Bitcoin2025 conference at the Venetian Resort. I wasn’t sure I had the right person, so I wasn’t planning on confronting him yet. I just wanted to get to know him and learn more about his background. If my reporting bore out, I envisioned cornering him with all of my evidence later in a final, dramatic showdown, like a police detective trying to extract a confession from a murder suspect. But for now, I wanted to put him at ease and establish a rapport.' },
          { type: 'p', text: 'I approached Mr. Back after watching him confidently predict on a panel that Bitcoin, then trading around $108,000, would reach “a million easy” in five to 10 years. (Fittingly, conference organizers had christened the stage he spoke on the “Nakamoto Stage.”) He seemed slightly startled even though I had arranged an interview ahead of time.' },
          { type: 'img', src: 'docs/satoshi/original/Biz-Cypher-qfct-articleLarge.jpg', cap: 'Adam Back, in khakis, a yellow cap and using a microphone, speaking on a stage with a blue and white banner behind him. Mr. Back spoke at the Bitcoin2025 conference in Las Vegas last May. Credit... Ronda Churchill/Bloomberg' },
          { type: 'p', text: 'I told Mr. Back only that I was working on a story about the history of Bitcoin, but he may have suspected what I was really up to because I had already contacted six former colleagues from three companies he had been involved with. If he did, he didn’t show it. He was patient and friendly. It was hard to fathom that this soft-spoken, middle-aged nerd who took no visible security precautions might be one of the world’s richest people. According to Bitcoin lore, Satoshi had mined 1.1 million coins in the digital currency’s early days, a hoard worth $118 billion at the time of the conference.' },
          { type: 'p', text: 'I found Mr. Back talkative when it came to Bitcoin but more reticent when I shifted the conversation to his early life. I eventually elicited the following from him: He was born in London in 1970. His father was an entrepreneur and his mother was a legal secretary. They moved around a lot, and family members had strong opinions and weren’t shy about voicing them.' },
          { type: 'p', text: 'Mr. Back said he taught himself how to code on a Timex Sinclair personal computer at age 11 and took interest in cryptography in high school. That became a passion at the University of Exeter when a fellow student turned Mr. Back, who was pursuing a Ph.D. in computer science, onto P.G.P., a free encryption program used by antinuclear activists and human rights groups to shield their files and emails from government surveillance.' },
          { type: 'p', text: 'Mr. Back was so taken with the many potential applications of P.G.P., which stands for Pretty Good Privacy, that he said he spent most of his Ph.D. “diving down the cryptography rabbit hole.” He got so sidetracked, he recalled, that he had to cram his thesis into his last six months at the university, comparing himself to a pilot crash-landing a plane.' },
          { type: 'p', text: 'I’d learned enough by then to know that P.G.P. relies on public-key cryptography. So does Bitcoin. A Bitcoin user has two keys: a public key, from which an address is derived that acts as a digital safe deposit box; and a private key, which is the secret combination used to unlock that box and spend the coins it contains. How interesting, I thought, that Mr. Back’s grad-school hobby involved the same cryptographic technique that Satoshi had repurposed. The topic of Mr. Back’s Ph.D. thesis, he told me, was distributed computer systems: Programs that rely on a web of independent computers known in computer parlance as “nodes” to work together to run their software. This was another technological pillar of Bitcoin.' },
          { type: 'p', text: 'And Mr. Back’s thesis project focused on C++ — the same programming language Satoshi used to code the first version of the Bitcoin software. After nearly two hours, Mr. Back politely signaled that he had other commitments that evening, so we cordially parted ways. I told him I would be in touch if I had other questions.' },

          { type: 'h3', text: 'Becoming a Cypherpunk' },
          { type: 'p', text: 'Before my trip to Las Vegas, I had begun to immerse myself in the archives of the Cypherpunks mailing list to learn more about the strange underground world that had produced Satoshi. When I returned to New York, I plunged back in. Unlike a social-media platform like Facebook, the Cypherpunks list was a decentralized communication forum. Privacy-minded cryptography geeks gathered there to bat around subversive ideas without fear of being censored. In the process, they planted the seeds for innovations that would change the course of financial history.' },
          { type: 'p', text: 'Their messages were preserved for posterity on several obscure websites. One of them greeted me with a skull-and-crossbones logo and the slogan, “Arise, you have nothing to lose but your barbed wire fences!” I found myself staring at thousands of emails dense with crypto speak I barely grasped. Mr. Back joined the list in the summer of 1995, toward the end of his graduate studies. He quickly became a vocal participant, churning out posts on topics ranging from digital privacy to his miserly spending habits.' },
          { type: 'p', text: 'In one of his first posts, he solved a cryptographic challenge, a sort of mathematical riddle, posted by Hal Finney, a Cypherpunk from California who had worked on P.G.P. It marked the beginning of an online friendship: Decades later, Mr. Back tweeted that he and Mr. Finney had interacted numerous times on and off the list and he admired Mr. Finney’s focus and coding chops.' },
          { type: 'p', text: 'Satoshi, too, was friendly with Mr. Finney. When Satoshi unveiled his white paper, Mr. Finney complimented it. Later, Mr. Finney volunteered to receive some bitcoins in what became the world’s first Bitcoin transaction. There was no evidence that Mr. Finney knew who Satoshi was, but one of their interactions suggested Satoshi was familiar with Mr. Finney. In December 2010, Mr. Finney wrote a post on Bitcointalk praising the Bitcoin code. Two hours later, Satoshi responded, “That means a lot coming from you, Hal.”' },
          { type: 'p', text: "There was something else that made me think Satoshi and Mr. Finney shared a history. In one of his emails to Mr. Malmi, Satoshi made a reference to an electronic cash system Mr. Finney had invented called Reusable Proofs of Work. Like Bitcoin, R.P.O.W. incorporated Hashcash into its design but, unlike Bitcoin, it had attracted virtually no interest from the cryptographic community. Only a handful of people had commented on it on the Cypherpunks and Cryptography lists. One of the few who had was Mr. Back." },

          { type: 'h3', text: 'A Gold Nugget' },
          { type: 'p', text: 'In the Cypherpunks, Mr. Back had found his ideological soul mates. I pictured him in his home in London logging onto the internet with a dial-up modem after work and whiling the nights away in philosophical arguments with other group members half a world away. Like many of his new pen pals, Mr. Back embraced “crypto anarchy,” an ideology that essentially meant using cryptography to shield individuals’ lives from state encroachment.' },
          { type: 'email', from: 'Adam Back <aba@dcs.ex.ac.uk>', to: 'cypherpunks@toad.com', date: 'Mon, 23 Sep 1996 08:15:19 +0800', body: 'To me, crypto anarchy is a means to achieve a more libertarian government, it is a pivotal tool to reduce government power, and enable freedom and privacy. A libertarian government means a less powerful government, less taxes, less onerous laws, more freedoms.' },
          { type: 'p', text: 'That reminded me of what Satoshi said when he introduced Bitcoin.' },
          { type: 'email', from: 'Satoshi Nakamoto <satoshi@vistomail.com>', date: 'Fri Nov 14 13:55:35 EST 2008', body: "It's very attractive to the libertarian viewpoint if we can explain it properly. I'm better with code than with words though. Satoshi Nakamoto" },
          { type: 'p', text: 'As a Libertarian, Mr. Back was incensed when the Clinton administration opened a criminal investigation into P.G.P.’s founder. At the time, the U.S. government considered encryption programs vital to national security and believed that the release of P.G.P.’s source code online was tantamount to exporting banned munitions. In protest, Mr. Back made T-shirts with a strong encryption algorithm printed on them and mailed them to Cypherpunks in other countries. His point was that the U.S. ban on the export of sensitive cryptography violated free-speech principles and couldn’t be enforced.' },
          { type: 'p', text: 'As I delighted in the cleverness of Mr. Back’s prank, it dawned on me that Satoshi, too, had used code to send political messages. Satoshi had likely embedded that Times of London headline in the first block of transactions in part to decry the British government’s bank bailouts during the financial crisis, which was raging at the time. Satoshi had planted another political message on a website popular with fans of decentralized technologies. He claimed that his date of birth was April 5, 1975. April 5 was the day in 1933 when President Franklin D. Roosevelt had banned the private ownership of gold to allow the government to devalue the dollar during the Great Depression, and 1975 was the year the ban had ended.' },
          { type: 'p', text: 'The financial commentator Dominic Frisby had spotted this Easter egg more than a decade ago and recognized its meaning: Bitcoin was a digital version of gold that the state could neither outlaw nor devalue. But no one seemed to have noticed this short post from Mr. Back in 2002: “Just curious, but what was the rationale under which private possession of gold was made illegal in the US? It boggles the mind ...”' },

          { type: 'h3', text: 'Spam on the Brain' },
          { type: 'p', text: 'As I chewed on this odd coincidence, I noticed something else Satoshi and Mr. Back had in common: a weird preoccupation with spam. Among his various Cypherpunk hobbies, Mr. Back ran a remailer, a service that enabled its users to communicate anonymously by stripping identifying data from their emails before forwarding them on. To his great annoyance, spammers took advantage of it to bombard people with garbage. Mr. Back invented Hashcash in March 1997 as a way to fight back. The idea was to impose a postage fee on every email sent through his remailer. The postage fees were paid in Hashcash, which users generated by solving little mathematical problems requiring lots of calculations. The math problems took a computer only a few seconds to solve, but they imposed a costly computer-resource burden on spammers who were sending hundreds of thousands of emails at a time.' },
          { type: 'p', text: 'While reading through the Satoshi corpus a second and then a third time, I began seeing the word “spam” everywhere. By my count, Satoshi mentioned it 24 times, and he often expressed ideas identical to Mr. Back’s. Five months after unveiling Hashcash, Mr. Back suggested on the Cypherpunks list that his invention could be useful to celebrities as a way to filter their emails. In a January 2009 post to the Cryptography list, Satoshi proposed a similar use for Bitcoin.' },
          { type: 'email', from: 'Adam Back <aba@dcs.ex.ac.uk>', date: 'Sat, 9 Aug 1997 06:16:40 +0800', to: 'cypherpunks@cyberpass.net', body: "If you're some media celebrity and you get too much email -- just turn up the squech, increase the postage required rate, and add people you do want to your no-postage list." },
          { type: 'email', from: 'Satoshi Nakamoto <satoshi@vistomail.com>', date: 'Fri Jan 16 11:03:14 EST 2009', body: "If someone famous is getting more e-mail than they can read, but would still like to have a way for fans to contact them, they could set up Bitcoin and give out the IP address on their website. 'Send X bitcoins to my priority hotline at this IP and I’ll read the message personally.'" },
          { type: 'p', text: 'It wasn’t an obvious use case for Satoshi’s new electronic money unless filtering junk email was on your brain, as it had been on Mr. Back’s for more than a decade. Satoshi also believed that Bitcoin could lead to an overall reduction in spam. Days after releasing his white paper, he argued that his creation might give the armies of zombie computers commandeered by hackers to flood email inboxes a new purpose: “generating bitcoins instead.”' },
          { type: 'p', text: 'His argument didn’t gain any traction and spam continued to proliferate. Yet Mr. Back would make the very same point on Bitcointalk four years later: “Maybe spam would even fall if Hashcash CPU/GPU mining is a more profitable market than spamming. It seems to me highly likely that it would be,” he wrote.' },

          { type: 'h3', text: 'Mr. Average' },
          { type: 'p', text: 'I was having less luck finding cracks in Satoshi’s deep cover that might lead to a true smoking gun. Conventional wisdom was that he had made two mistakes. The first one involved a leaked I.P. address that appeared to place him in Southern California when he launched the Bitcoin software. The other involved a hack of one of his email addresses. After weeks pursuing both leads, I concluded that not only were they dead ends, they probably weren’t mistakes in the first place. How was I going to find someone so good at hiding his tracks?' },
          { type: 'p', text: 'As I wrestled with this question, it occurred to me that Mr. Back, too, was adept at operating anonymously on the internet. Deeply paranoid about government monitoring, he constantly gamed out ways to elude it. In fact, like Satoshi, Mr. Back was a big fan of using pseudonyms. “You must be below the radar belt, you must be essentially invisible to the government, the spooks dossier on you must read Mr Average and be entirely wholesome. Then you must have one or more alter-egos, for your real interests,” he wrote in January 1998.' },
          { type: 'p', text: 'Satoshi’s chosen alter ego was from Japan. As it happened, Mr. Back had expressed interest in the country in 1997, when a Japanese Cypherpunk posted to the list about the creation of Japan’s first remailer. “Congrats on starting a remailer in a new jurisdiction!” Mr. Back responded. “Jurisdiction shopping is good, too — wonder what Japan offers as a jurisdiction opportunity — are there things legal in Japan which are not legal in Europe, or US?”' },
          { type: 'p', text: 'The Japanese Cypherpunk didn’t answer. But that wouldn’t have prevented Mr. Back from later conducting a little research on his own. If he did, he might have come across a company with a Tokyo address called Anonymousspeech L.L.C. that offered anonymous email and web hosting. Satoshi used its services to register the bitcoin.org website and to create two untraceable email accounts. In 1999, Mr. Back moved to Montreal to take a job with a start-up that specialized in privacy software. There, he helped build a privacy system called the Freedom Network that allowed its users to browse the internet anonymously. It was a precursor to the Onion Router, better known as Tor.' },
          { type: 'p', text: 'Like Bitcoin, the Freedom Network was a distributed computer system. Mr. Back and his colleagues tried to make it impervious to government and corporate monitoring. That was another trait he shared with Satoshi, whose Bitcointalk posts displayed a deep knowledge of network security and how to guard against vulnerabilities. The Bitcoin network is widely admired for how well it has withstood hacking attempts.' },

          { type: 'h3', text: 'Napster vs. Gnutella' },
          { type: 'p', text: 'After several months in the depths of the Cypherpunks list archives, I sometimes lost track of where I was in my research and followed false leads down bizarre cul-de-sacs. While responding to one of the first criticisms of his white paper on the Cryptography list, Satoshi had written: “I didn’t really make that statement as strong as I could have.” I thought I had seen that phrase before and spent several evenings wading through hundreds of 1990s mailing-list posts I’d already read. It soon became clear I had imagined it.' },
          { type: 'p', text: 'But my rereading wasn’t all in vain. Other parallels between Mr. Back and Satoshi started to become apparent. For instance, Mr. Back and Satoshi shared a dislike for copyright. “Scrap patents and copyright,” Mr. Back wrote in September 1997. In keeping with this belief, Mr. Back made his Hashcash spam-throttling software open source. Satoshi did a similar thing. He released the Bitcoin software under M.I.T.’s open-source license, which allowed anyone to use, modify and distribute it without restrictions.' },
          { type: 'p', text: 'In the spirit of building something in the public domain, Mr. Back and Satoshi also both created internet mailing lists dedicated to their creations — the Hashcash list and the Bitcoin-dev list — where they posted software updates listing new features and bug fixes in a format and style that looked strikingly similar. Satoshi’s Back-like bias against copyright surfaced in other ways. He expressly waived copyright when he shared images of a Bitcoin logo he had designed on Bitcointalk, and he encouraged people who wanted to improve upon it to “make their graphics public domain.”' },
          { type: 'p', text: 'In the early 2000s, copyright enforcement became mainstream news when the popular file-sharing service Napster shut down after being sued by the big music companies. Napster was what’s known as peer-to-peer software, where users share content with one another directly, eliminating the need for a corporate middleman. Mr. Back was appalled. He shared with the Cypherpunks list a paper written by an intellectual property lawyer that detailed all the legal threats that makers of peer-to-peer software now faced. “My conclusion after reading this,” Mr. Back wrote, “is that the safest and simplest thing to do is to just publish such software anonymously.”' },
          { type: 'p', text: 'Bitcoin, like Napster, was peer-to-peer software. Substitute the government for the music industry and a similar scenario could unfold. If its creator’s identity became known, government lawyers would know whom to go after. If it stayed concealed, there would be no one to sue. If Mr. Back and Satoshi were the same person, that would help explain why Satoshi chose to hide. The music companies were protecting their business interests. The government would have had a different agenda — protecting its monopoly over money. Like Mr. Back, Satoshi considered Napster’s demise a cautionary tale.' },
