<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 서울 야외 웨딩 베뉴 가이드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:       #2D5A27;
  --green-light: #4A7C43;
  --gold:        #8B6914;
  --gold-light:  #C49A1E;
  --bg:          #FAFAF7;
  --card-bg:     #FFFFFF;
  --text:        #1A1A1A;
  --sub:         #6B7280;
  --border:      #E5E7EB;
  --shadow:      0 2px 8px rgba(0,0,0,.08);
  --shadow-lg:   0 8px 32px rgba(0,0,0,.16);
  --radius:      12px;
  --radius-sm:   8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

/* ── Hero ── */
.hero {
  background: linear-gradient(135deg, #1a3a17 0%, #2D5A27 50%, #3d7a35 100%);
  color: #fff;
  padding: 48px 24px 40px;
  text-align: center;
}
.hero h1 { font-family: 'Noto Serif KR', Georgia, serif; font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 700; margin-bottom: 8px; }
.hero p  { font-size: .95rem; opacity: .8; margin-bottom: 24px; }
.hero-stats { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; }
.stat { text-align: center; }
.stat-num { font-size: 1.8rem; font-weight: 700; color: #C9E88C; }
.stat-label { font-size: .75rem; opacity: .75; }

/* ── Filter Bar ── */
.filter-bar {
  position: sticky; top: 0; z-index: 100;
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap input {
  width: 100%; padding: 8px 12px 8px 36px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .9rem; outline: none; transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--green); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--sub); font-size: 1rem; }
.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.chip {
  padding: 5px 12px; border-radius: 20px; font-size: .8rem; cursor: pointer;
  border: 1.5px solid var(--border); background: #fff;
  transition: all .2s; user-select: none; white-space: nowrap;
}
.chip:hover { border-color: var(--green); color: var(--green); }
.chip.active { background: var(--green); color: #fff; border-color: var(--green); }
.chip.fav-chip.active { background: #e74c3c; border-color: #e74c3c; }

.sort-select {
  padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .85rem; outline: none; cursor: pointer;
  background: #fff; color: var(--text);
}

.view-toggle { display: flex; gap: 4px; }
.view-btn {
  padding: 6px 10px; border: 1.5px solid var(--border); background: #fff;
  border-radius: 8px; cursor: pointer; font-size: 1rem; transition: all .2s;
}
.view-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

.result-count { font-size: .82rem; color: var(--sub); white-space: nowrap; }

/* ── Card Grid ── */
#card-view { padding: 24px 20px; }
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}
.venue-card {
  background: var(--card-bg); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 20px;
  cursor: pointer; transition: transform .2s, box-shadow .2s;
  border: 1.5px solid transparent; position: relative;
  display: flex; flex-direction: column; gap: 10px;
}
.venue-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--green); }

.card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.badge {
  font-size: .7rem; font-weight: 600; padding: 3px 8px; border-radius: 12px;
}
.badge-공공장소  { background: #D1FAE5; color: #065F46; }
.badge-호텔      { background: #DBEAFE; color: #1E40AF; }
.badge-전문웨딩홀{ background: #FEF3C7; color: #92400E; }
.badge-가든\/하우스{ background: #FCE7F3; color: #9D174D; }
.badge-한옥\/전통 { background: #F3F4F6; color: #374151; }
.badge-기타      { background: #F3F4F6; color: #374151; }

.card-actions { display: flex; gap: 6px; align-items: center; }
.fav-btn {
  background: none; border: none; font-size: 1.2rem; cursor: pointer;
  transition: transform .2s; line-height: 1;
}
.fav-btn:hover { transform: scale(1.2); }
.compare-btn {
  width: 22px; height: 22px; border-radius: 4px; border: 1.5px solid var(--border);
  background: #fff; cursor: pointer; font-size: .7rem; display: flex; align-items: center;
  justify-content: center; transition: all .2s; font-weight: 700;
}
.compare-btn:hover { border-color: var(--green); color: var(--green); }
.compare-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

.card-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
.card-tagline {
  font-size: .82rem; color: var(--sub); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: .82rem; color: var(--sub); }
.card-meta span { display: flex; align-items: center; gap: 4px; }

.card-rating { display: flex; align-items: center; gap: 4px; }
.stars { color: #F59E0B; font-size: .9rem; }
.rating-num { font-weight: 700; font-size: .9rem; color: var(--text); }

.card-district { font-size: .75rem; color: var(--sub); }
.card-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 8px; border-top: 1px solid var(--border); margin-top: auto;
}
.card-footer .detail-link {
  font-size: .8rem; color: var(--green); font-weight: 600; text-decoration: none;
}
.no-detail-badge { font-size: .7rem; color: #9CA3AF; background: #F3F4F6; padding: 2px 8px; border-radius: 8px; }

/* ── Table View ── */
#table-view { padding: 20px; overflow-x: auto; display: none; }
.venue-table {
  width: 100%; border-collapse: collapse; font-size: .85rem; background: #fff;
  border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow);
}
.venue-table th {
  background: var(--green); color: #fff; padding: 12px 14px; text-align: left;
  font-weight: 600; cursor: pointer; user-select: none; white-space: nowrap;
}
.venue-table th:hover { background: var(--green-light); }
.venue-table th .sort-arrow { margin-left: 4px; opacity: .6; }
.venue-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.venue-table tr:hover td { background: #F9FFF9; cursor: pointer; }
.venue-table tr:last-child td { border-bottom: none; }
.table-name { font-weight: 600; color: var(--green); }

/* ── Modal ── */
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 1000; overflow-y: auto; padding: 20px;
  backdrop-filter: blur(4px);
}
.overlay.open { display: flex; align-items: flex-start; justify-content: center; }
.modal {
  background: #fff; border-radius: 16px; max-width: 720px; width: 100%;
  box-shadow: var(--shadow-lg); overflow: hidden; margin: auto;
}
.modal-header {
  padding: 24px 28px 20px;
  background: linear-gradient(135deg, #1a3a17, var(--green));
  color: #fff; position: relative;
}
.modal-header h2 { font-family: 'Noto Serif KR', Georgia, serif; font-size: 1.4rem; margin-bottom: 6px; }
.modal-header .modal-badges { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.modal-close {
  position: absolute; top: 16px; right: 20px; background: rgba(255,255,255,.2);
  border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%;
  cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.modal-close:hover { background: rgba(255,255,255,.35); }
.modal-tagline {
  font-style: italic; opacity: .9; font-size: .9rem;
  border-left: 3px solid rgba(255,255,255,.5); padding-left: 12px; margin-top: 8px;
}
.modal-meta {
  display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; font-size: .85rem; opacity: .85;
}
.modal-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }
.modal-section h3 {
  font-size: .8rem; font-weight: 700; color: var(--sub); text-transform: uppercase;
  letter-spacing: .08em; margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.modal-section ul { padding-left: 18px; }
.modal-section li { margin-bottom: 6px; font-size: .9rem; }
.modal-section p { font-size: .9rem; color: #374151; margin-bottom: 6px; }
.modal-section strong { color: var(--text); }

.pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.pros-box, .cons-box { padding: 12px; border-radius: 8px; font-size: .85rem; line-height: 1.6; }
.pros-box { background: #F0FDF4; border: 1px solid #BBF7D0; }
.cons-box { background: #FFF7ED; border: 1px solid #FED7AA; }
.pros-box h4 { color: #166534; margin-bottom: 6px; font-size: .85rem; }
.cons-box h4 { color: #9A3412; margin-bottom: 6px; font-size: .85rem; }

.tip-box {
  background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 8px;
  padding: 14px 16px; font-size: .88rem; line-height: 1.6; color: #78350F;
  position: relative;
}
.tip-box::before { content: "💡 "; }

.links-list { display: flex; flex-direction: column; gap: 6px; }
.link-item {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--green); font-size: .85rem; text-decoration: none; font-weight: 500;
}
.link-item:hover { text-decoration: underline; }

.no-detail-notice {
  background: #F9FAFB; border: 1px dashed var(--border); border-radius: 8px;
  padding: 20px; text-align: center; color: var(--sub); font-size: .9rem;
}

/* ── Compare Bar ── */
.compare-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: #1a3a17; color: #fff; padding: 12px 20px;
  display: none; align-items: center; gap: 12px; flex-wrap: wrap;
  box-shadow: 0 -4px 16px rgba(0,0,0,.2);
}
.compare-bar.open { display: flex; }
.compare-previews { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
.compare-preview {
  background: rgba(255,255,255,.15); border-radius: 6px; padding: 4px 10px;
  font-size: .82rem; display: flex; align-items: center; gap: 6px;
}
.compare-preview .rm { cursor: pointer; opacity: .6; }
.compare-preview .rm:hover { opacity: 1; }
.compare-action-btn {
  padding: 8px 18px; background: var(--gold); color: #fff; border: none;
  border-radius: 8px; cursor: pointer; font-weight: 600; font-size: .88rem;
}
.compare-clear { background: none; border: 1px solid rgba(255,255,255,.3); color: #fff; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: .82rem; }

/* ── Compare Modal ── */
.compare-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
.compare-table th { background: var(--green); color: #fff; padding: 10px 14px; text-align: left; }
.compare-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
.compare-table tr:nth-child(even) td { background: #F9FFF9; }
.compare-table .label { font-weight: 600; color: var(--sub); white-space: nowrap; }

/* ── Empty State ── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--sub); }
.empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .filter-bar { gap: 8px; }
  .pros-cons { grid-template-columns: 1fr; }
  .modal-body { padding: 16px; }
  .modal-header { padding: 16px; }
  .hero-stats { gap: 20px; }
  #table-view { font-size: .78rem; }
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #f1f1f1; }
::-webkit-scrollbar-thumb { background: #aaa; border-radius: 3px; }

/* ── 인쇄 ── */
@media print {
  .filter-bar, .compare-bar, .card-actions { display: none !important; }
  .venue-card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
  .overlay { display: none !important; }
}
</style>
</head>
<body>

<!-- Hero -->
<section class="hero">
  <h1>🌿 서울 야외 웨딩 베뉴 가이드</h1>
  <p>공원·호텔·가든·한옥 총 74개소 심층 분석 리포트</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num" id="stat-filtered">74</div><div class="stat-label">검색 결과</div></div>
    <div class="stat"><div class="stat-num">74</div><div class="stat-label">총 베뉴</div></div>
    <div class="stat"><div class="stat-num">4.56</div><div class="stat-label">평균 평점</div></div>
  </div>
  <div class="hero-stats" id="category-stats" style="margin-top:16px"></div>
</section>

<!-- Filter Bar -->
<div class="filter-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="베뉴명, 지역, 특징으로 검색...">
  </div>
  <div class="filter-chips">
    <button class="chip active" data-cat="all">전체</button><button class="chip" data-cat="가든/하우스">가든/하우스</button><button class="chip" data-cat="공공장소">공공장소</button><button class="chip" data-cat="기타">기타</button><button class="chip" data-cat="전문웨딩홀">전문웨딩홀</button><button class="chip" data-cat="한옥/전통">한옥/전통</button><button class="chip" data-cat="호텔">호텔</button>
    <button class="chip fav-chip" id="fav-chip">❤️ 즐겨찾기</button>
  </div>
  <select class="sort-select" id="sort-select">
    <option value="rating">평점 높은순</option>
    <option value="cost_asc">견적 낮은순</option>
    <option value="cost_desc">견적 높은순</option>
    <option value="meal">식대 낮은순</option>
    <option value="guests">인원 적은순</option>
  </select>
  <div class="view-toggle">
    <button class="view-btn active" data-view="card" title="카드뷰">⊞</button>
    <button class="view-btn" data-view="table" title="테이블뷰">≡</button>
  </div>
  <span class="result-count"></span>
</div>

<!-- Card View -->
<div id="card-view">
  <div class="card-grid"></div>
</div>

<!-- Table View -->
<div id="table-view"></div>

<!-- Venue Detail Modal -->
<div class="overlay" id="venue-modal">
  <div class="modal" id="modal-content"></div>
</div>

<!-- Compare Modal -->
<div class="overlay" id="compare-modal">
  <div class="modal" id="compare-content"></div>
</div>

<!-- Compare Bar -->
<div class="compare-bar" id="compare-bar">
  <span style="font-size:.85rem;font-weight:600;white-space:nowrap">비교 중:</span>
  <div class="compare-previews" id="compare-previews"></div>
  <button class="compare-action-btn" onclick="openCompare()">비교하기</button>
  <button class="compare-clear" onclick="clearCompare()">초기화</button>

  view: 'card',
  favOnly: false,
  favorites: new Set(JSON.parse(localStorage.getItem('wv_favs') || '[]')),
  compare: [],
  sortDir: { col: 'rating', asc: false },
};

function saveFavs() {
  localStorage.setItem('wv_favs', JSON.stringify([...state.favorites]));
}

// ─── Filter & Sort ───────────────────────────────────────────────────────────
function filteredVenues() {
  let vs = VENUES.slice();
  const q = state.search.toLowerCase();
  if (q) vs = vs.filter(v =>
    v.name.toLowerCase().includes(q) ||
    v.district.toLowerCase().includes(q) ||
    v.tagline.toLowerCase().includes(q) ||
    v.notes.toLowerCase().includes(q) ||
    v.type_raw.toLowerCase().includes(q)
  );
  if (state.category !== 'all') vs = vs.filter(v => v.category === state.category);
  if (state.favOnly) vs = vs.filter(v => state.favorites.has(v.id));

  // Sort
  const { col, asc } = state.sortDir;
  vs.sort((a, b) => {
    let av, bv;
    if (col === 'rating')      { av = a.rating;    bv = b.rating; }
    else if (col === 'cost')   { av = a.cost_min;  bv = b.cost_min; }
    else if (col === 'meal')   { av = a.meal_min;  bv = b.meal_min; }
    else if (col === 'guests') { av = a.guests_min;bv = b.guests_min; }
    else if (col === 'name')   { return asc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name); }
    else { av = a.rating; bv = b.rating; }
    return asc ? av - bv : bv - av;
  });
  return vs;
}

// ─── Render Cards ─────────────────────────────────────────────────────────────
function renderStars(r) {
  const full = Math.floor(r), half = (r % 1 >= 0.5) ? 1 : 0, empty = 5 - full - half;
  return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
}

function renderCard(v) {
  const isFav = state.favorites.has(v.id);
  const inCompare = state.compare.includes(v.id);
  const badgeClass = 'badge-' + v.category.replace('/', '\\/');
  return `
  <div class="venue-card" data-id="${v.id}" onclick="openModal('${v.id}')">
    <div class="card-header">
      <div class="card-badges">
        <span class="badge ${badgeClass}">${v.category}</span>
        <span class="card-district">${v.district}</span>
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="fav-btn" title="즐겨찾기" onclick="toggleFav('${v.id}', this)">${isFav ? '❤️' : '🤍'}</button>
        <button class="compare-btn ${inCompare ? 'active' : ''}" title="비교 추가" onclick="toggleCompare('${v.id}', this)">비교</button>
      </div>
    </div>
    <div class="card-rating">
      <span class="stars">${renderStars(v.rating)}</span>
      <span class="rating-num">${v.rating.toFixed(1)}</span>
    </div>
    <div class="card-name">${v.name}</div>
    ${v.tagline ? `<div class="card-tagline">"${v.tagline}"</div>` : ''}
    <div class="card-meta">
      <span>👥 ${v.guests_str}</span>
      <span>💰 ${v.cost_str}</span>
      <span>🍽️ ${v.meal_str}/인</span>
    </div>
    ${v.notes ? `<div style="font-size:.75rem;color:#9CA3AF;margin-top:2px">${v.notes}</div>` : ''}
    <div class="card-footer">
      <span style="font-size:.78rem;color:var(--sub)">${v.type_raw}</span>
      ${v.has_detail
        ? `<span class="detail-link">상세 보기 →</span>`
        : `<span class="no-detail-badge">정보 준비중</span>`}
    </div>
  </div>`;
}

// ─── Render Table ─────────────────────────────────────────────────────────────
function renderTable(vs) {
  const cols = [
    {key:'name',   label:'베뉴명'},
    {key:'category',label:'유형'},
    {key:'district',label:'지역'},
    {key:'guests', label:'인원'},
    {key:'cost',   label:'총 견적'},
    {key:'meal',   label:'식대'},
    {key:'rating', label:'평점'},
  ];
  const arrow = (key) => {
    if (state.sortDir.col !== key) return '<span class="sort-arrow">↕</span>';
    return state.sortDir.asc ? '<span class="sort-arrow">↑</span>' : '<span class="sort-arrow">↓</span>';
  };
  const head = cols.map(c =>
    `<th onclick="tableSort('${c.key}')">${c.label}${arrow(c.key)}</th>`
  ).join('');
  const rows = vs.map(v => `
    <tr onclick="openModal('${v.id}')">
      <td><span class="table-name">${v.name}</span></td>
      <td><span class="badge badge-${v.category.replace('/', '\\/')}">${v.category}</span></td>
      <td>${v.district}</td>
      <td>${v.guests_str}</td>
      <td>${v.cost_str}</td>
      <td>${v.meal_str}</td>
      <td>⭐ ${v.rating.toFixed(1)}</td>
    </tr>`).join('');
  return `<table class="venue-table"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>`;
}

// ─── Main Render ──────────────────────────────────────────────────────────────
function render() {
  const vs = filteredVenues();
  document.querySelector('.result-count').textContent = `${vs.length}개 결과`;

  // Update stats
  document.getElementById('stat-filtered').textContent = vs.length;

  if (state.view === 'card') {
    document.getElementById('card-view').style.display = 'block';
    document.getElementById('table-view').style.display = 'none';
    const grid = document.querySelector('.card-grid');
    if (vs.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="emoji">🔍</div><p>검색 결과가 없습니다.</p></div>`;
    } else {
      grid.innerHTML = vs.map(renderCard).join('');
    }
  } else {
    document.getElementById('card-view').style.display = 'none';
    document.getElementById('table-view').style.display = 'block';
    document.getElementById('table-view').innerHTML = vs.length === 0
      ? `<div class="empty-state"><div class="emoji">🔍</div><p>검색 결과가 없습니다.</p></div>`
      : renderTable(vs);
  }
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(id) {
  const v = VENUES.find(x => x.id === id);
  if (!v) return;

  const badgeClass = 'badge-' + v.category.replace('/', '\\/');
  const isFav = state.favorites.has(v.id);

  let body = '';

  if (v.has_detail) {
    // 견적
    if (v.cost_detail_html) body += `
      <div class="modal-section">
        <h3>💰 견적 상세</h3>
        ${v.cost_detail_html}
      </div>`;

    // 공간
    if (v.capacity_html) body += `
      <div class="modal-section">
        <h3>📍 공간 & 교통</h3>
        ${v.capacity_html}
      </div>`;

    // 장단점
    if (v.pros || v.cons) body += `
      <div class="modal-section">
        <h3>✅ 장단점</h3>
        <div class="pros-cons">
          <div class="pros-box"><h4>👍 장점</h4>${v.pros || '-'}</div>
          <div class="cons-box"><h4>👎 단점</h4>${v.cons || '-'}</div>
        </div>
      </div>`;

    // 예약 팁
    if (v.tip) body += `
      <div class="modal-section">
        <h3>💡 예약 팁</h3>
        <div class="tip-box">${v.tip}</div>
      </div>`;

    // 예약 방법
    if (v.reservation_html) body += `
      <div class="modal-section">
        <h3>📞 예약 방법</h3>
        ${v.reservation_html}
      </div>`;

    // 링크
    if (v.links && v.links.length) body += `
      <div class="modal-section">
        <h3>🔗 참고 링크</h3>
        <div class="links-list">
          ${v.links.map(l => `<a class="link-item" href="${l.url}" target="_blank">↗ ${l.text}</a>`).join('')}
        </div>
      </div>`;
  } else {
    body = `<div class="no-detail-notice">상세 리포트가 아직 작성되지 않았습니다.<br>마스터 테이블 기본 정보를 참고하세요.</div>`;
  }

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-header">
      <div class="modal-badges">
        <span class="badge ${badgeClass}">${v.category}</span>
        <span class="badge" style="background:rgba(255,255,255,.2);color:#fff">${v.district}</span>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <h2>${v.name}</h2>
      ${v.tagline ? `<div class="modal-tagline">"${v.tagline}"</div>` : ''}
      <div class="modal-meta">
        <span>⭐ ${v.rating.toFixed(1)}</span>
        <span>👥 ${v.guests_str}</span>
        <span>💰 ${v.cost_str}</span>
        <span>🍽️ ${v.meal_str}/인</span>
      </div>
    </div>
    <div class="modal-body">
      ${v.notes ? `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;font-size:.85rem;color:#166534">📝 ${v.notes}</div>` : ''}
      ${body}
    </div>`;

  document.getElementById('venue-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('venue-modal').classList.remove('open');
  document.body.style.overflow = '';
}

// ─── Favorites ────────────────────────────────────────────────────────────────
function toggleFav(id, btn) {
  if (state.favorites.has(id)) {
    state.favorites.delete(id);
    btn.textContent = '🤍';
  } else {
    state.favorites.add(id);
    btn.textContent = '❤️';
  }
  saveFavs();
  if (state.favOnly) render();
}

// ─── Compare ──────────────────────────────────────────────────────────────────
function toggleCompare(id, btn) {
  const idx = state.compare.indexOf(id);
  if (idx === -1) {
    if (state.compare.length >= 3) {
      alert('최대 3개까지 비교할 수 있습니다.');
      return;
    }
    state.compare.push(id);
    btn.classList.add('active');
  } else {
    state.compare.splice(idx, 1);
    btn.classList.remove('active');
  }
  updateCompareBar();
}

function updateCompareBar() {
  const bar = document.getElementById('compare-bar');
  if (state.compare.length === 0) {
    bar.classList.remove('open');
    return;
  }
  bar.classList.add('open');
  const previews = state.compare.map(id => {
    const v = VENUES.find(x => x.id === id);
    return `<div class="compare-preview">${v.name} <span class="rm" onclick="removeCompare('${id}')">✕</span></div>`;
  }).join('');
  document.getElementById('compare-previews').innerHTML = previews;
}

function removeCompare(id) {
  state.compare = state.compare.filter(x => x !== id);
  updateCompareBar();
  render();
}

function openCompare() {
  const vs = state.compare.map(id => VENUES.find(x => x.id === id));
  const rows = [
    ['유형', v => v.type_raw],
    ['지역', v => v.district],
    ['권장 인원', v => v.guests_str],
    ['총 견적', v => v.cost_str],
    ['식대', v => v.meal_str + '/인'],
    ['평점', v => '⭐ ' + v.rating.toFixed(1)],
    ['비고', v => v.notes || '-'],
    ['한줄평', v => v.tagline ? `"${v.tagline}"` : '-'],
    ['장점', v => v.pros ? v.pros.substring(0,120) + '…' : '-'],
    ['단점', v => v.cons ? v.cons.substring(0,120) + '…' : '-'],
    ['예약 팁', v => v.tip ? v.tip.substring(0,120) + '…' : '-'],
  ];
  const headCells = ['항목', ...vs.map(v => `<span style="color:#C9E88C">${v.name}</span>`)].map(c => `<th>${c}</th>`).join('');
  const bodyRows = rows.map(([label, fn]) =>
    `<tr><td class="label">${label}</td>${vs.map(v => `<td>${fn(v)}</td>`).join('')}</tr>`
  ).join('');

  document.getElementById('compare-content').innerHTML = `
    <div class="modal-header" style="padding:20px 24px">
      <button class="modal-close" onclick="closeCompare()">✕</button>
      <h2>베뉴 비교</h2>
    </div>
    <div style="padding:16px;overflow-x:auto">
      <table class="compare-table">
        <thead><tr>${headCells}</tr></thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>`;
  document.getElementById('compare-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCompare() {
  document.getElementById('compare-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function clearCompare() {
  state.compare = [];
  updateCompareBar();
  render();
}

// ─── Table Sort ───────────────────────────────────────────────────────────────
function tableSort(col) {
  if (state.sortDir.col === col) {
    state.sortDir.asc = !state.sortDir.asc;
  } else {
    state.sortDir = { col, asc: col === 'name' };
  }
  render();
}

// ─── Category Stats ───────────────────────────────────────────────────────────
function buildStats() {
  const cats = {};
  VENUES.forEach(v => { cats[v.category] = (cats[v.category] || 0) + 1; });
  return cats;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Search
  document.getElementById('search-input').addEventListener('input', e => {
    state.search = e.target.value;
    render();
  });

  // Category chips
  document.querySelectorAll('.chip[data-cat]').forEach(chip => {
    chip.addEventListener('click', () => {
      state.category = chip.dataset.cat;
      document.querySelectorAll('.chip[data-cat]').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      render();
    });
  });

  // Fav chip
  document.getElementById('fav-chip').addEventListener('click', function() {
    state.favOnly = !state.favOnly;
    this.classList.toggle('active', state.favOnly);
    render();
  });

  // Sort
  document.getElementById('sort-select').addEventListener('change', e => {
    const val = e.target.value;
    const dirMap = { rating: false, cost_asc: true, cost_desc: false, meal: true, guests: true };
    const colMap = { rating: 'rating', cost_asc: 'cost', cost_desc: 'cost', meal: 'meal', guests: 'guests' };
    state.sortDir = { col: colMap[val] || 'rating', asc: dirMap[val] !== undefined ? dirMap[val] : false };
    render();
  });

  // View toggle
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.view = btn.dataset.view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // Modal ESC
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeCompare(); }
  });
  document.getElementById('venue-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('venue-modal')) closeModal();
  });
  document.getElementById('compare-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('compare-modal')) closeCompare();
  });

  // Category stats in hero
  const stats = buildStats();
  const statHtml = Object.entries(stats).map(([cat, cnt]) =>
    `<div class="stat"><div class="stat-num">${cnt}</div><div class="stat-label">${cat}</div></div>`
  ).join('');
  document.getElementById('category-stats').innerHTML = statHtml;

  render();
});
</script>
</body>
</html>
