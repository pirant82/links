<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇦🇷 멘도자 와이너리 견학 & 재회 카운트다운</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:       #2D5A27;
  --green-light: #4A7C43;
  --gold:        #8B6914;
  --arg-blue:    #74ACDF;
  --bg:          #FAFAF7;
  --card-bg:     #FFFFFF;
  --text:        #1A1A1A;
  --sub:         #6B7280;
  --border:      #E5E7EB;
  --shadow:      0 4px 12px rgba(0,0,0,.08);
  --radius:      16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.4;
  padding-bottom: 60px;
}

header {
  background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
  color: #fff;
  padding: 30px 24px;
  text-align: center;
}

main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

/* ── Clocks & Countdown ── */
.top-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: 30px;
}
.clock-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.clock-card {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.clock-time { font-size: 1.4rem; font-weight: 700; font-family: monospace; color: var(--green); }

.reunion-box {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: var(--shadow);
  border: 1px solid var(--arg-blue);
  text-align: center;
}
.track-container {
  position: relative;
  height: 50px;
  background: #f1f5f9;
  border-radius: 25px;
  margin: 20px 0;
  overflow: hidden;
}
.track-icon { position: absolute; top: 50%; transform: translateY(-50%); font-size: 1.8rem; transition: all 0.5s; }
.d-day-counter { font-size: 1.3rem; font-weight: 700; color: #e11d48; }

/* ── Timetable Grid ── */
.timetable-wrapper {
  background: #fff;
  border-radius: 12px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  overflow-x: auto;
  position: relative;
}

.timetable {
  display: grid;
  grid-template-columns: 90px repeat(9, minmax(130px, 1fr)); /* 시간축 + 9일치 */
  border-collapse: collapse;
  min-width: 1000px;
}

.tt-cell {
  border: 0.5px solid var(--border);
  padding: 8px;
  font-size: 0.75rem;
  min-height: 55px;
  position: relative;
}
.tt-header {
  background: var(--green);
  color: #fff;
  text-align: center;
  font-weight: 700;
  position: sticky;
  top: 0;
  z-index: 10;
  height: 65px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.tt-sidebar {
  background: #f8fafc;
  color: var(--arg-blue); /* 메인은 아르헨티나 시간 */
  font-weight: 700;
  text-align: center;
  position: sticky;
  left: 0;
  z-index: 5;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-right: 2px solid var(--border);
}

.time-kst-sub { font-size: 0.65rem; color: var(--gold); font-weight: 600; }

/* Event Styles */
.event {
  position: absolute;
  left: 3px;
  right: 3px;
  top: 3px;
  bottom: 3px;
  border-radius: 6px;
  padding: 6px;
  font-size: 0.75rem;
  font-weight: 600;
  overflow: hidden;
  z-index: 2;
  box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.event-flight { background: #eff6ff; color: #1d4ed8; border-left: 4px solid #1d4ed8; }
.event-wine   { background: #fdf2f8; color: #be185d; border-left: 4px solid #be185d; }
.event-past   { filter: grayscale(0.8) opacity(0.5); text-decoration: line-through; }
.event-current { 
  outline: 2.5px solid var(--green); 
  z-index: 3;
  animation: tt-pulse 2s infinite;
}

@keyframes tt-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

.back-btn {
  display: block; width: fit-content; margin: 30px auto; padding: 12px 24px;
  background: var(--green); color: #fff; text-decoration: none; border-radius: 30px; font-weight: 600;
}
</style>
</head>
<body>

<header>
  <h1>🇦🇷 아르헨티나 견학 타임테이블</h1>
  <p>모든 시간은 <b>아르헨티나 현지 시각(ART)</b> 기준입니다.</p>
</header>

<main>
  <div class="top-info">
    <div class="clock-row">
      <div class="clock-card">
        <div style="font-size:0.75rem; color:var(--arg-blue)">🇦🇷 멘도자 (ART)</div>
        <div id="art-time" class="clock-time">--:--:--</div>
      </div>
      <div class="clock-card">
        <div style="font-size:0.75rem; color:var(--sub)">🇰🇷 서울 (KST)</div>
        <div id="kst-time" class="clock-time">--:--:--</div>
      </div>
    </div>
    
    <div class="reunion-box">
      <div id="d-day" class="d-day-counter">D-Day --일 --:--:--</div>
      <div class="track-container">
        <div id="man" class="track-icon">🙋‍♂️</div>
        <div id="woman" class="track-icon">🙋‍♀️</div>
        <div style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); font-size:0.7rem; opacity:0.3">📍 인천공항 재회</div>
      </div>
    </div>
  </div>

  <div class="timetable-wrapper">
    <div class="timetable" id="timetable-grid">
      <!-- JS로 생성됨 -->
    </div>
  </div>

  <a href="index.html" class="back-btn">← 메인 대시보드로 돌아가기</a>
</main>

<script>
// 아르헨티나(ART) 날짜 기준 (UTC-3)
const DATES = [
  '2026-04-25', '2026-04-26', '2026-04-27', '2026-04-28', '2026-04-29', 
  '2026-04-30', '2026-05-01', '2026-05-02', '2026-05-03'
];
const REUNION_TS = new Date('2026-05-03T17:00:00-03:00').getTime(); // 아르헨티나 5/3 17시 = 한국 5/4 05시

const EVENTS = [
  // 모든 시간은 ART(아르헨티나) 기준
  { date: '2026-04-25', hour: 2, duration: 12, task: '✈️ KE017 한국출발', type: 'flight' },
  { date: '2026-04-25', hour: 14, duration: 6, task: '🇺🇸 LAX 대기', type: 'flight' },
  { date: '2026-04-25', hour: 20, duration: 11, task: '✈️ LA603 미국출발', type: 'flight' },
  { date: '2026-04-26', hour: 7, duration: 3, task: '🇨🇱 SCL 대기', type: 'flight' },
  { date: '2026-04-26', hour: 10, duration: 2, task: '✈️ LA434 산티아고발', type: 'flight' },
  { date: '2026-04-26', hour: 12, duration: 1, task: '🍷 멘도자 도착!', type: 'wine' },
  
  { date: '2026-04-27', hour: 9, duration: 9, task: '🍇 Day 1: 까테나 자파타', type: 'wine' },
  { date: '2026-04-28', hour: 9, duration: 9, task: '🍇 Day 2: 까테나 자파타', type: 'wine' },
  { date: '2026-04-29', hour: 9, duration: 9, task: '🍇 Day 3: 까테나 자파타', type: 'wine' },
  { date: '2026-04-30', hour: 9, duration: 9, task: '🍇 Day 4: 아차발 페레', type: 'wine' },
  { date: '2026-05-01', hour: 9, duration: 9, task: '🍇 Day 5: 아차발 페레', type: 'wine' },
  
  { date: '2026-05-02', hour: 7, duration: 4, task: '✈️ LA2434 멘도자출발', type: 'flight' },
  { date: '2026-05-02', hour: 13, duration: 7, task: '✈️ LA2476 리마출발', type: 'flight' },
  { date: '2026-05-02', hour: 20, duration: 7, task: '🇺🇸 LAX 대기', type: 'flight' },
  { date: '2026-05-03', hour: 3, duration: 14, task: '✈️ KE012 미국출발', type: 'flight' },
  { date: '2026-05-03', hour: 17, duration: 1, task: '❤️ 인천 도착/재회!', type: 'flight' }
];

function initTimetable() {
  const grid = document.getElementById('timetable-grid');
  let html = '<div class="tt-cell tt-header" style="position:sticky; left:0; z-index:15;">ART / KST</div>';
  
  DATES.forEach(d => {
    const day = new Date(d).toLocaleDateString('ko-KR', {weekday:'short'});
    html += `<div class="tt-cell tt-header">${d.substring(5)} (${day})</div>`;
  });

  for (let h = 0; h < 24; h++) {
    const artTimeStr = h.toString().padStart(2, '0') + ':00';
    const kstH = (h + 12) % 24; // 한국은 아르헨티나보다 12시간 빠름
    const kstTimeStr = kstH.toString().padStart(2, '0') + ':00';
    
    html += `<div class="tt-cell tt-sidebar">🇦🇷 ${artTimeStr}<br><span class="time-kst-sub">🇰🇷 ${kstTimeStr}</span></div>`;
    
    DATES.forEach(d => {
      html += `<div class="tt-cell" id="cell-${d}-${h}"></div>`;
    });
  }
  grid.innerHTML = html;

  const now = Date.now();
  EVENTS.forEach(ev => {
    const cell = document.getElementById(`cell-${ev.date}-${ev.hour}`);
    if (cell) {
      const evDiv = document.createElement('div');
      // ART 기준으로 타임스탬프 계산 (UTC-3)
      const evTime = new Date(`${ev.date}T${ev.hour.toString().padStart(2,'0')}:00:00-03:00`).getTime();
      const evEndTime = evTime + (ev.duration * 3600000);
      
      let statusClass = '';
      if (now > evEndTime) statusClass = 'event-past';
      else if (now >= evTime && now <= evEndTime) statusClass = 'event-current';

      evDiv.className = `event event-${ev.type} ${statusClass}`;
      evDiv.style.height = `calc(${ev.duration * 100}% + ${(ev.duration - 1) * 1}px)`;
      evDiv.innerHTML = `<div>${ev.task}</div><div style="font-size:0.65rem;opacity:0.8">${ev.duration}h</div>`;
      cell.appendChild(evDiv);
    }
  });
}

function updateUI() {
  const now = new Date();
  
  document.getElementById('kst-time').textContent = now.toLocaleTimeString('ko-KR', {timeZone:'Asia/Seoul', hour12:false});
  document.getElementById('art-time').textContent = now.toLocaleTimeString('ko-KR', {timeZone:'America/Argentina/Mendoza', hour12:false});

  const timeLeft = REUNION_TS - now.getTime();
  if (timeLeft > 0) {
    const days = Math.floor(timeLeft / 86400000);
    const h = Math.floor((timeLeft % 86400000) / 3600000);
    const m = Math.floor((timeLeft % 3600000) / 60000);
    const s = Math.floor((timeLeft % 60000) / 1000);
    document.getElementById('d-day').textContent = `재회까지 D-Day ${days}일 ${h}:${m}:${s}`;
    
    // 출국(4/25 14:30 KST)부터 입국(5/4 05:00 KST)까지
    const start = new Date('2026-04-25T14:30:00+09:00').getTime();
    const end = new Date('2026-05-04T05:00:00+09:00').getTime();
    const progress = Math.max(0, Math.min(1, (now.getTime() - start) / (end - start)));
    
    document.getElementById('man').style.left = (progress * 45) + '%';
    document.getElementById('woman').style.right = (progress * 45) + '%';
  } else {
    document.getElementById('d-day').textContent = "❤️ 드디어 만났습니다! ❤️";
    document.getElementById('man').textContent = "💏";
    document.getElementById('woman').style.display = "none";
  }
}

initTimetable();
setInterval(updateUI, 1000);
updateUI();
</script>
</body>
</html>
