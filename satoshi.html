          { type: 'email', from: 'Satoshi Nakamoto <satoshi@vistomail.com>', date: 'Thu Nov 6 15:15:40 EST 2008', body: 'Governments are good at cutting off the heads of a centrally controlled networks like Napster, but pure P2P networks like Gnutella and Tor seem to be holding their own.' },
          { type: 'p', text: 'He was alluding to the fact that, even though its users exchanged songs directly, Napster still used a central server to keep a list of who had what songs. By contrast, Gnutella ran on a network of independent computers, just like Bitcoin. This made for yet another fascinating coincidence. In a May 2000 post, Mr. Back had drawn the exact same comparison:' },
          { type: 'email', from: 'Adam Back <adam@cypherspace.org>', subject: 'napster vs gnutella -- why distributed systems win', date: '2000-05-10 16:40:11', body: 'Gnutella stands a much better chance of success because Napster servers being central can be closed down. Gnutella basically can’t be shutdown.' },
          { type: 'p', text: 'Mr. Back hadn’t made this comparison just once. He had made it three separate times on the Cypherpunks list.' },

          { type: 'h2', text: 'II. Buried Road Map' },
          { type: 'h3', text: 'Outlining Bitcoin a Decade Before Bitcoin' },
          { type: 'p', text: 'All these similarities were intriguing, but I didn’t have anything that tied Mr. Back directly to the creation of Bitcoin. That changed when I discovered a cluster of Cypherpunks posts Mr. Back had written between 1997 and 1999, a decade before Bitcoin was launched.' },
          { type: 'p', text: 'On April 30, 1997, he suggested creating an electronic cash system “entirely disconnected” from modern banking that would have four key attributes: It would preserve the privacy of both payer and payee; it would be distributed across a network of computers to make it hard to shut down; it would have some built-in scarcity to prevent excessive inflation; and it wouldn’t require trust in any individual or bank. To achieve the latter, he suggested a fifth component two days later: a publicly verifiable protocol. All five of these elements later became core to Bitcoin.' },
          { type: 'p', text: 'Four months later, Mr. Back returned to the topic of electronic cash, introducing a new feature rooted in game theory. “An application I have put a bit of thought into is the idea of creating a distributed banking system,” he wrote. “Ideally it is a system where all nodes are equivalent, and k of n of those nodes have to collude before they can compromise the operation of the bank.”' },
          { type: 'p', text: 'Mr. Back was alluding to the Byzantine Generals Problem, a computer science problem that bedevils decentralized systems. In the analogy, “n” number of generals surround an enemy city at war with Byzantium. To invade successfully, they must all agree to attack at the same time, but a subset of “k” generals may be traitors. This is also true of distributed computer networks: They can be sabotaged by malicious participants, or nodes, in the network. Mr. Back wanted to create an electronic cash network with so many nodes in so many different places that no one in the mood to sabotage it would be able to find enough conspirators.' },
          { type: 'p', text: 'That sounded a lot like the system Satoshi described in his white paper 11 years later: Bitcoin would work, Satoshi wrote, “as long as a majority of CPU power is controlled by nodes that are not cooperating to attack the network.” In his 1997 Cypherpunks list post, Mr. Back wrote of nodes that could “come and go” without affecting the network’s operations. In his white paper, Satoshi wrote that nodes could “leave and rejoin the network at will.” The phrasing was slightly different, but it didn’t require a crack cryptographer to see that Mr. Back and Satoshi had proposed the exact same concepts.' },
          { type: 'p', text: "On Dec. 6, 1998, Mr. Back returned once more to the topic of electronic cash after another Cypherpunk, Wei Dai, floated his own idea, called b-money. As the YouTuber Barely Sociable pointed out in his 2020 video, Mr. Back seized on Mr. Dai’s proposal. B-money used public-key cryptography to anonymize users’ accounts, preserving the privacy of payer and payee as Mr. Back had envisioned. And it had another feature Mr. Back liked. One problem that confronts anyone trying to create a digital currency is how to mint coins. Mr. Dai proposed a system in which users who solved a computational problem would be rewarded with newly minted b-money coins." },
          { type: 'p', text: 'Mr. Back’s Hashcash invention did something very similar: It rewarded users who solved computational problems with permission to send emails. He suggested repurposing Hashcash and making it the mechanism to mint Mr. Dai’s electronic coins. This was significant because Satoshi had cited Mr. Dai in his white paper and later described Bitcoin as “an implementation of Wei Dai’s b-money proposal.” When I stopped to think about it, it was uncanny: Just like Mr. Back proposed to do in 1998, Satoshi combined the Hashcash and b-money concepts to create Bitcoin. What were the chances of that?' },
          { type: 'p', text: 'That wasn’t all. In the comments he made about b-money in December 1998, Mr. Back anticipated Satoshi’s inflation solution. Any electronic coin minted by solving computational problems was bound to suffer from runaway inflation because, as computer chips got more powerful, it would become easier for computers to solve the problems and mint new coins. To get around this issue, Mr. Back suggested that minting a b-money coin should “require more computational effort over time.” That’s exactly how Satoshi designed the Bitcoin software.' },
          { type: 'p', text: 'As if all these prescient insights were not enough, Mr. Back proposed another crucial concept in April 1999. For distributed electronic cash to work, there needed to be a public, immutable time stamp of every transaction. Mr. Back’s solution involved using hash trees — which condense large amounts of data into a single digital fingerprint — and publishing those fingerprints in New York Times classified ads. Satoshi used the same idea for Bitcoin but replaced the classified ads component with Mr. Back’s Hashcash, which time-stamped transactions by making the computations used to forge them too expensive. Mr. Back even foreshadowed Satoshi’s response to electricity use concerns.' },
          { type: 'email', from: 'Adam Back <aba@dcs.ex.ac.uk>', date: '1999-04-17 17:45:04', body: "As long as the wastage is lower than the costs of fiat money it's a win." },
          { type: 'email', from: 'Satoshi Nakamoto <satoshin@gmx.com>', date: 'Sun, 03 May 2009, 23:32:26 +0100', to: 'mmalmi@cc.hut.fi', body: '[If Bitcoin] did grow to consume significant energy, I think it would still be less wasteful than the labour and resource intensive conventional banking activity it would replace.' },
          { type: 'p', text: 'In short, Mr. Back envisioned nearly every facet of Bitcoin — and used the same rationalization as Satoshi to excuse its main flaw — a decade before Bitcoin was created.' },

          { type: 'h3', text: 'Radio Silence' },
          { type: 'p', text: 'A month after our meeting in Vegas, I emailed Mr. Back some questions about his work history, and about why he had moved to Malta in 2009. I didn’t say why I was asking, but some members of the Bitcoin community had pointed out that the European tax haven would make an ideal home for Satoshi and his trove of bitcoins. Mr. Back replied the next day — politely, but seemingly with a firm grasp of the implication of my question. He moved to Malta for several reasons, including cost of living, weather and, yes, taxes, he wrote. “Bitcoiners love sleuthing but coincidences do happen and don’t necessarily mean anything.”' },
          { type: 'p', text: 'Satoshi had cited both Hashcash and b-money in his white paper. But the emails Mr. Back produced for the trial of Craig Wright, the Australian impostor, made it seem like Satoshi wasn’t yet aware of b-money as of August 2008. It was only after Mr. Back referred him to Mr. Dai’s website that Satoshi added the b-money citation to his white paper, the emails suggested. But it didn’t add up to me. Mr. Back’s Hashcash paper specifically discussed b-money as an application for Hashcash. Presuming Satoshi read the paper he was planning to cite, he would have had to know about b-money.' },
          { type: 'p', text: 'Mr. Back acknowledged this contradiction in 2020. After he suggested on X that Satoshi might be an anonymous Cypherpunk, another user questioned his theory, noting that the anonymous Cypherpunk had mentioned b-money and that Satoshi had only learned about b-money many years later, from Mr. Back. Yes, Mr. Back responded, but Satoshi could have lied to him and pretended not to know about b-money. “if Satoshi knew some very obscure citation maybe he would not cite it to avoid triangulation?” he wrote. Someone like Mr. Back, who was one of only six named users to have discussed b-money on the mailing lists, might especially want to avoid this sort of triangulation.' },
          { type: 'p', text: 'The more I had mulled it over, the more suspicious I had become that Mr. Back had written the Satoshi emails to himself in an elaborate ruse to divert suspicion away from himself. So I decided to ask Mr. Back for the emails’ metadata. Metadata is to an email what an envelope, postmark and seal are to a physical letter. But when I emailed Mr. Back my request, he did not reply. I wasn’t sure if he was ghosting me or just busy. Again, radio silence. I had clearly touched a nerve.' },

          { type: 'h3', text: 'Satoshi Appears, Mr. Back Disappears' },
          { type: 'p', text: 'After unveiling Bitcoin on Halloween 2008, Satoshi spent the next two and a half years improving it. Then, famously, he disappeared on April 26, 2011. Mr. Back, it turned out, followed that same pattern — but in reverse. For more than a decade, whenever electronic money was discussed on the Cypherpunks or the Cryptography list, Mr. Back had almost always chimed in. But when Bitcoin arrived, Mr. Back was nowhere to be found.' },
          { type: 'p', text: 'Years later, in December 2013, he gave a very different version of events on the “Let’s Talk Bitcoin” podcast. Mr. Back told its host that he had been “very interested technically” in Satoshi’s invention when it came out and had “participated” in the discussion it sparked. I combed through the list for any trace of such participation in the fall of 2008 and the winter of 2009 and found no evidence of it. In fact, Mr. Back continued to ignore Bitcoin entirely until June 2011, when he made his first public comment about it. That was six weeks after Satoshi vanished.' },
          { type: 'p', text: 'But when he finally did get fully involved, it coincided with a new development that was sure to get Satoshi’s attention. On April 17, 2013, Sergio Demian Lerner published a blog item revealing Satoshi’s fortune. That very day, Mr. Back joined Bitcointalk. After Mr. Lerner published a follow-up blog post a week later, Mr. Back wrote in the comments section: “I suppose if it seems to you that you’re getting too close you might want to stop in Nakamoto’s interests…”' },

          { type: 'h3', text: 'Suddenly All In' },
          { type: 'p', text: 'Suddenly, Mr. Back was all in. Within hours of introducing himself on Bitcointalk, he was proposing complicated system improvements. Within two weeks, he was demanding that Wikipedia restore its stand-alone Satoshi Nakamoto page. And within 18 months, he had founded a start-up called Blockstream. To staff Blockstream, he poached the top Bitcoin Core developers from their day jobs at companies like Google and Mozilla, giving him tremendous sway over the digital currency. He also became very wealthy: Over the next dozen years, Blockstream and its affiliates would raise $1 billion in funding and Blockstream would reach a valuation of $3.2 billion.' },
          { type: 'p', text: 'In the fall of 2014, Mr. Back and his Blockstream colleagues published a white paper about an innovation Mr. Back had conceived called “pegged sidechains.” The paper mentioned DigiCash. “The requirement for a central server became the Achilles’ heel of” DigiCash, the paper’s introduction said. That was exactly how Satoshi had described DigiCash’s failings five years earlier: “Of course, the biggest difference is the lack of a central server. That was the Achilles heel of Chaumian systems,” Satoshi wrote.' },
          { type: 'p', text: "Then, out of the blue, Satoshi appeared on the list with an email that neatly dovetailed with Mr. Back’s position on block size. It was the first time Satoshi had been heard from in more than four years. Many in the Bitcoin community questioned the new email’s authenticity. But Mr. Back argued that the email sounded real. In a series of tweets, he called Satoshi’s observations “spot on” and took to quoting from the email. The Satoshi email sounded a lot like Mr. Back had in his posts during the preceding weeks. Like Mr. Back, Satoshi called the big block proposal very “dangerous” — the same term Mr. Back had used repeatedly. He also used other words and phrases Mr. Back had used: “widespread consensus,” “consensus rules,” “technical,” “trivial” and “robust.”" },

          { type: 'h2', text: 'III. Closing In' },
          { type: 'h3', text: 'Alternative Theories' },
          { type: 'p', text: 'I needed to stress test my theory. Late at night in bed or in the shower first thing in the morning, I tried to think of reasons I might be wrong. One argument I’d read was that Mr. Back was a privacy absolutist and Bitcoin’s privacy features were weak. But rather than write Bitcoin off, Mr. Back had spent the past decade at Blockstream pioneering innovations to strengthen Bitcoin’s privacy. On X, Mr. Back has cited another argument: He asked too many dumb questions on the #bitcoin-wizards channel when he first joined. I read through the channel’s logs and saw little evidence of a clueless beginner. If anything, I was struck by how attuned Mr. Back was to Bitcoin’s vulnerabilities.' },
          { type: 'p', text: 'What about other leading Satoshi suspects? A 2015 article put forward the thesis that Satoshi was Nick Szabo. Mr. Szabo remained at the top of many people’s lists until recently, but a heated debate on X exposed his ignorance of basic technical aspects of Bitcoin. Mr. Finney and Len Sassaman were two other oft-cited suspects. One problem with the Finney hypothesis, however, was that he was photographed running a 10-mile race in April 2009 at the same time as Satoshi was sending emails and bitcoins to someone else. A bigger problem was that Mr. Finney and Mr. Sassaman were both dead when Satoshi made his final appearance in August 2015.' },
          { type: 'p', text: 'As for HBO’s pick, Peter Todd, the crux of the documentary’s evidence was a 2010 Bitcointalk thread in which Mr. Todd corrected Satoshi on a technical point. This required us to believe that Satoshi had made the most basic blunder imaginable: accidentally logging in under his real name. There was also the fact that Mr. Todd would have been just 23 when the Bitcoin white paper was published. Some have speculated that Bitcoin wasn’t created by one person but by a group. I didn’t buy that theory, either. Satoshi’s secret had remained airtight for 17 years.' },

          { type: 'h3', text: '‘Better With Code Than With Words’' },
          { type: 'p', text: 'Mr. Back still stood out to me as the likeliest candidate. I went searching for more forensic evidence. Browsing the Cypherpunks archive one day, I noticed a resemblance that made me nearly jump out of my chair.' },
          { type: 'email', from: 'Satoshi Nakamoto <satoshi@vistomail.com>', date: 'Fri Nov 14 13:55:35 EST 2008', body: "I'm better with code than with words though." },
          { type: 'email', from: 'Adam Back <aba@dcs.ex.ac.uk>', date: 'Fri, 6 Sep 1996 06:34:59 +0800', to: 'mech@eff.org', body: 'Personally I think I\'m better at coding, than constructing convincing arguments.' },
          { type: 'p', text: 'The closer I looked, the more writing similarities I spotted. Like Satoshi, Mr. Back used two spaces between sentences. Satoshi had famously used the British expletive “bloody” on Bitcointalk. In October 2023, Mr. Back insisted that he had never used that term. But I found a 1998 Cypherpunks list post in which Mr. Back used “bloody” to express his growing irritation with internet banner ads: “it is getting ridiculus (sic) most of the bandwidth through my trusty 28.8k modem is bloody banners these days!”' },
          { type: 'p', text: 'The most reliable way to identify writers is stylometry. In 2022, Florian Cafiero used the technique to help The New York Times identify the people behind QAnon. I asked Mr. Cafiero to try again for Satoshi. The verdict arrived by text one morning in late July: After comparing papers from 12 suspects to the Bitcoin white paper, Mr. Cafiero’s program showed Mr. Back as the closest match. But he said it wasn’t a snug fit and that Mr. Finney was a very close second.' },

          { type: 'h3', text: 'Spelling and Grammar' },
          { type: 'p', text: 'I tried a different approach focused on spelling and grammar. Mr. Back made a lot of typos and had a rambling style, while Satoshi’s writing was crisp. But I had detected some writing tics they nonetheless shared. Mr. Back often confused “it’s” and “its,” and he had a habit of putting “also” at the end of sentences. There were five instances of each in Satoshi’s own writing. Both also seemed pathologically incapable of using hyphens correctly. Like Mr. Back, Satoshi tended to add hyphens when they were unnecessary and to omit them when they were needed. For example, he wrote “double-spending” with a hyphen but the compound adjectives “hand tuned,” “full blown,” “would be” and “file sharing” without hyphens — just like Mr. Back.' },
          { type: 'p', text: 'The first two cryptographic linguistic markers were “proof of work” and “partial pre-image.” SatoshiRepeatedly wrote “proof-of-work” with hyphens. Until that point, only eight people had hyphenated it on the mailing lists. I now compared those eight names with the users who mentioned WebMoney. Only one overlapped: Mr. Back. The third linguistic marker I zeroed in on was the phrase “burning the money,” which Satoshi employed while discussing an escrow feature. Before Satoshi, only one person had discussed “burning” an electronic coin: Mr. Back, in April 1999.' },

          { type: 'h3', text: 'From 34,000 Down to One' },
          { type: 'p', text: 'We collecting archives of all three lists and merged them into one huge database. We eliminated anyone with fewer than 10 posts and those who never discussed digital money. That left us with a pool of 620 candidates. We asks our database: How many of those remaining eight suspects alternated between using “e-mail” and “email,” “e-cash” and “electronic cash,” “cheque” and “check” and the British and American forms of the word “optimize” like Satoshi did? The answer was just one: Mr. Back.' },

          { type: 'h2', text: 'IV. Confrontation' },
          { type: 'h3', text: 'El Salvador' },
          { type: 'p', text: 'In mid-November, I wrote to Mr. Back to request another interview. I even offered to fly to Malta. Once again, he didn’t reply. So I decided to approach him in person at a Bitcoin conference in El Salvador. Thirty minutes after I reintroduced myself, Mr. Back came out. He agreed to meet with me the next morning. Over the next two hours, I presented my evidence piece by piece. In his soft British lilt, Mr. Back insisted he wasn’t Satoshi and chalked it all up to a series of coincidences.' },
          { type: 'p', text: 'When I got home to New York, I found a slip in the recording. Me: There’s a quote that I mentioned earlier where Satoshi says, “I’m better with code than with words.” Adam Back: I did a lot of talking though for somebody, I mean … I mean, I’m not saying I’m good with words but I sure did a lot of yakking on these lists actually. To my ears, it sounded like he was saying that for someone who preferred code over words, he sure had written a lot of words. Implicit in that was an acknowledgment that he had been the one who wrote the quote. In other words, for a few seconds, Mr. Back had let the mask fall and turned into Satoshi.' },

          { type: 'takeaways', title: '4 Takeaways From Our Search for Bitcoin’s Creator', items: [
            '1. Mr. Back came up with almost every feature of Bitcoin first. He outlined a decentralized network of computers that would keep functioning even if a few tried to collude.',
            '2. Striking similarities link Mr. Back and Satoshi. He got his doctorate in distributed computer systems and used the same programming language as Satoshi.',
            '3. When Satoshi appeared, Mr. Back disappeared. For more than a decade, Mr. Back almost always chimed in. But when Bitcoin arrived, he was nowhere to be found.',
            '4. Mr. Back and Satoshi shared many of the same writing tics. Only one among hundreds of subscribers matched all those writing quirks according to our analysis: Mr. Back.'
          ]},

          { type: 'h2', text: 'Adam Back Denies He Is Satoshi Nakamoto in Response to Times Investigation' },
          { type: 'p', text: '“Dr. Adam Back has consistently stated that he is not Satoshi Nakamoto,” his company said in a statement. “What is not speculative is Adam’s foundational contribution to Bitcoin.” The British computer scientist Adam Back said on Wednesday that he is not the pseudonymous inventor of Bitcoin after a New York Times investigation presented evidence that he is. “I’m not satoshi,” Mr. Back said on the social media platform X. He added that he is merely one of a number of developers who came “so close yet so far” to building something like Bitcoin.' },
          { type: 'profiles', title: 'The Bitcoin Heroes', list: [
            { name: 'Hal Finney', desc: 'First receiver of Bitcoin and P.G.P. developer.', img: 'docs/satoshi/original/finney.png' },
            { name: 'Nick Szabo', desc: 'Cryptographer who proposed "Bit Gold" in 1998.', img: 'docs/satoshi/original/szabo.png' },
            { name: 'Len Sassaman', desc: 'Core activist of the Cypherpunk mailing list.', img: 'docs/satoshi/original/sassaman.png' }
          ]}
        ]
      }
    };

    function render(lang) {
      const data = content[lang];
      document.getElementById('article-header').innerHTML = `
        <div class="meta">${data.subtitle}</div>
        <h1>${data.title}</h1>
        <div class="meta" style="margin-top:20px;">${data.author}</div>
      `;

      let html = '';
      data.body.forEach(item => {
        if (item.type === 'p') html += `<p class="${item.dropCap ? 'drop-cap' : ''}">${item.text}</p>`;
        else if (item.type === 'h2') html += `<h2>${item.text}</h2>`;
        else if (item.type === 'h3') html += `<h3>${item.text}</h3>`;
        else if (item.type === 'email') {
          html += `<div class="email-block"><div class="email-header">`;
          if (item.from) html += `<div><b>From:</b> ${item.from}</div>`;
          if (item.to) html += `<div><b>To:</b> ${item.to}</div>`;
          if (item.date) html += `<div><b>Date:</b> ${item.date}</div>`;
          if (item.subject) html += `<div><b>Subject:</b> ${item.subject}</div>`;
          html += `</div><div>${item.body}</div></div>`;
        }
        else if (item.type === 'img') html += `<figure><img src="${item.src}" alt="Article Image"><figcaption>${item.cap}</figcaption></figure>`;
        else if (item.type === 'takeaways') html += `<div class="takeaways"><h4>${item.title}</h4><ul>${item.items.map(li => `<li>${li}</li>`).join('')}</ul></div>`;
        else if (item.type === 'profiles') {
          let profilesHtml = `<h2>${item.title}</h2><div class="profiles-grid">`;
          item.list.forEach(p => {
            profilesHtml += `<div class="profile-card"><img src="${p.img}" alt="${p.name}"><b>${p.name}</b><span>${p.desc}</span></div>`;
          });
          profilesHtml += `</div>`;
          html += profilesHtml;
        }
      });
      document.getElementById('article-content').innerHTML = html;
    }

    function setLang(lang) {
      document.body.className = 'lang-' + lang;
      document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      render(lang);
      localStorage.setItem('satoshi-lang', lang);
      window.scrollTo(0, 0);
    }

    setLang(localStorage.getItem('satoshi-lang') || 'ko');
  </script>
</body>
</html>
